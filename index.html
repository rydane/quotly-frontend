<style>
  *,*::before,*::after{box-sizing:border-box}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const API = 'https://quotly-backend.onrender.com/api';
const PLANS = { starter:'Starter', pro:'Pro ✦', team:'Équipe ◆' };

// Pro templates list (must match backend)
const PRO_TPLS = ['moderne','artisan','minimal','bold','blue_corp','tech','nature','luxe','sante','immobilier','event','restaurant','auto','beaute','juridique','archi','photo','transport','formation','nettoyage','it','mode'];

async function api(path, method='GET', body=null) {
  const token = localStorage.getItem('qToken');
  const res = await fetch(API+path, {
    method,
    headers: {'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})},
    body: body ? JSON.stringify(body) : null,
  });
  const json = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(json.error||`Erreur ${res.status}`);
  return json;
}

// Toast system
let _setToasts=null;
function toast(msg, type='success') {
  if(!_setToasts) return;
  const id=Date.now();
  _setToasts(p=>[...p,{id,msg,type}]);
  setTimeout(()=>_setToasts(p=>p.filter(t=>t.id!==id)), 4500);
}

function Toasts() {
  const [toasts, setToasts] = useState([]);
  useEffect(()=>{ _setToasts=setToasts; },[]);
  return <div id="toasts">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>)}</div>;
}

function Spinner({light}) { return <span className={`spinner ${light?'spinner-light':''}`} />; }

function fmtMoney(n) { return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0); }
function fmtDate(d) { return new Date(d).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }

// ── All 22 templates definition
// Template preview colors (matching PDF service)
const TPL_COLORS = {
  classique:{bg:'#2d4a2d',text:'#ffffff',accent:'#4a7c4a'},
  minimal:{bg:'#222222',text:'#ffffff',accent:'#555555'},
  bold:{bg:'#111111',text:'#ffffff',accent:'#ff3c00'},
  blue_corp:{bg:'#1a3d6b',text:'#ffffff',accent:'#2e6dc1'},

  transport:{bg:'#003380',text:'#ff6b00',accent:'#ff6b00'},
  formation:{bg:'#1976d2',text:'#ffffff',accent:'#42a5f5'},

};

const ALL_TEMPLATES = [
  {id:'classique',label:'Classique',icon:'📋',sector:'Universel',pro:false},
  {id:'moderne',label:'Moderne',icon:'✦',sector:'Agence',pro:true},
  {id:'artisan',label:'Artisan',icon:'🔨',sector:'BTP',pro:true},
  {id:'minimal',label:'Minimal',icon:'◻',sector:'Freelance',pro:true},
  {id:'bold',label:'Bold',icon:'◆',sector:'Créatif',pro:true},
  {id:'blue_corp',label:'Corporate',icon:'🏢',sector:'Entreprise',pro:true},
  {id:'tech',label:'Tech',icon:'💻',sector:'IT/Dev',pro:true},
  {id:'nature',label:'Nature',icon:'🌿',sector:'Éco',pro:true},
  {id:'luxe',label:'Luxe',icon:'◈',sector:'Premium',pro:true},
  {id:'sante',label:'Santé',icon:'⚕',sector:'Médical',pro:true},
  {id:'immobilier',label:'Immo',icon:'🏠',sector:'Immobilier',pro:true},
  {id:'event',label:'Événement',icon:'🎪',sector:'Événementiel',pro:true},
  {id:'restaurant',label:'Restaurant',icon:'🍽',sector:'Restauration',pro:true},

// ── PDF generation (client-side fallback / preview)
function generatePDF(quote, user, sigDataUrl=null) {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const W=210, M=18;
  let y=M;

  const tpl = (quote.template_id||'classique').toLowerCase();
  const items = typeof quote.items==='string'?JSON.parse(quote.items):(quote.items||[]);

  // Colors per template
  const colors = {
    classique:[14,13,11], moderne:[17,14,56], artisan:[124,75,42], minimal:[34,34,34],
    bold:[17,17,17], blue_corp:[26,61,107], tech:[15,15,26], nature:[58,92,58],
    luxe:[26,26,26], sante:[21,101,160], immobilier:[44,62,80], event:[139,26,107],
    restaurant:[139,46,12], auto:[44,44,44], beaute:[247,197,213], juridique:[92,10,20],
    archi:[232,228,222], photo:[26,26,26], transport:[0,51,128], formation:[25,118,210],
    nettoyage:[0,151,167], it:[13,17,23], mode:[212,191,160], default:[14,13,11]
  };
  const accentRgb = colors[tpl]||colors.default;
  const accentHex = `#${accentRgb.map(x=>x.toString(16).padStart(2,'0')).join('')}`;

  // Determine if header bg is light (for text contrast)
  const isLightBg = accentRgb.reduce((s,v)=>s+v,0)>500;
  const headerTextRgb = isLightBg?[30,25,20]:[255,255,255];
  const headerSubRgb = isLightBg?[100,80,40]:[220,200,150];

  // Header
  doc.setFillColor(...accentRgb);
  doc.rect(0,0,W,46,'F');

  // Gold accent line
  doc.setFillColor(201,168,76);
  doc.rect(0,44,W,2,'F');

  doc.setTextColor(...headerTextRgb);
  doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text(quote.company_name||user?.name||'Votre Entreprise', M, 20);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.setTextColor(...headerSubRgb);
  doc.text('Devis professionnel · DEFACT', M, 29);

  doc.setTextColor(...headerTextRgb);
  doc.setFontSize(13); doc.setFont('helvetica','bold');
  doc.text(quote.number||'DEV-001', W-M, 20, {align:'right'});
  doc.setFontSize(8); doc.setFont('helvetica','normal');
  doc.setTextColor(220,200,150);
  doc.text(new Date().toLocaleDateString('fr-FR'), W-M, 28, {align:'right'});

  y=58;

  // Info blocks
  const blockH=38;
  doc.setDrawColor(230,225,215);
  doc.setFillColor(250,248,242);
  doc.roundedRect(M, y, W/2-M-3, blockH, 3,3,'FD');
  doc.setTextColor(150,140,120); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('CLIENT', M+6, y+8);
  doc.setTextColor(30,25,20); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text(quote.client_name||'—', M+6, y+17);
  if(quote.client_address){ doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(100,90,70); const lines=doc.splitTextToSize(quote.client_address,W/2-M-16); doc.text(lines,M+6,y+24); }
  if(quote.client_email){ doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(100,90,70); doc.text(quote.client_email,M+6,y+31); }

  const rx=W/2+3;
  doc.setFillColor(250,248,242);
  doc.roundedRect(rx, y, W-rx-M, blockH, 3,3,'FD');
  doc.setTextColor(150,140,120); doc.setFontSize(7); doc.setFont('helvetica','bold');
  doc.text('INFORMATIONS', rx+6, y+8);
  doc.setFont('helvetica','normal'); doc.setTextColor(30,25,20); doc.setFontSize(9);
  doc.text(`Émis le : ${new Date().toLocaleDateString('fr-FR')}`, rx+6, y+17);
  doc.text(`Validité : ${quote.validity_days||30} jours`, rx+6, y+25);
  const exp=new Date(); exp.setDate(exp.getDate()+(quote.validity_days||30));
  doc.text(`Expire le : ${exp.toLocaleDateString('fr-FR')}`, rx+6, y+33);

  y+=blockH+10;

  // Table header
  doc.setFillColor(...accentRgb);
  doc.roundedRect(M, y, W-2*M, 10, 2,2,'F');
  doc.setFillColor(201,168,76);
  doc.rect(M+W-2*M-2, y+1, 2, 8,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
  const colW=[W-2*M-62,18,22,22];
  const colX=[M+3, M+colW[0]+3, M+colW[0]+colW[1]+5, M+colW[0]+colW[1]+colW[2]+5];
  doc.text('DÉSIGNATION', colX[0], y+7);
  doc.text('QTÉ', colX[1], y+7,{align:'center'});
  doc.text('P.U. HT', colX[2]+colW[2]-1, y+7,{align:'right'});
  doc.text('TOTAL HT', colX[3]+colW[3]-1, y+7,{align:'right'});
  y+=10;

  let ht=0;
  items.forEach((item,i)=>{
    const total=(item.qty||0)*(item.unit_price||0);
    ht+=total;
    if(i%2===0){ doc.setFillColor(249,248,244); doc.rect(M,y,W-2*M,9,'F'); }
    doc.setTextColor(30,25,20); doc.setFontSize(9); doc.setFont('helvetica','normal');
    const desc=doc.splitTextToSize(item.description||'',colW[0]-4);
    doc.text(desc[0], colX[0], y+6.5);
    doc.text(String(item.qty||0), colX[1], y+6.5,{align:'center'});
    doc.setTextColor(80,70,50);
    doc.text(fmtMoney(item.unit_price), colX[2]+colW[2]-1, y+6.5,{align:'right'});
    doc.setTextColor(30,25,20); doc.setFont('helvetica','bold');
    doc.text(fmtMoney(total), colX[3]+colW[3]-1, y+6.5,{align:'right'});
    y+=9;
  });

  // Gold separator
  doc.setFillColor(201,168,76); doc.rect(M,y,W-2*M,0.5,'F'); y+=8;

  const tva=(quote.tva_rate||20)/100;
  const tvaAmt=ht*tva;
  const ttc=ht+tvaAmt;
  const totalX=W-M-70;

  const drawRow=(label,val,bold,big,accent)=>{
    doc.setFont('helvetica',bold?'bold':'normal');
    doc.setFontSize(big?12:9);
    if(accent){ doc.setFillColor(...accentRgb); doc.roundedRect(totalX-6,y-5,W-M-totalX+6,13,2,2,'F'); doc.setTextColor(255,255,255); }
    else { doc.setTextColor(bold?30:100,bold?25:90,bold?20:70); }
    doc.text(label, totalX, y);
    doc.text(fmtMoney(val), W-M, y,{align:'right'});
    y+=big?9:6;
  };

  drawRow('Total HT', ht, false, false);
  drawRow(`TVA ${quote.tva_rate||20}%`, tvaAmt, false, false);
  y+=2;
  drawRow('TOTAL TTC', ttc, true, true, true);
  y+=6;

  if(quote.conditions){
    doc.setDrawColor(201,168,76); doc.setLineWidth(0.4); doc.line(M,y,W-M,y); y+=6;
    doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(150,140,120);
    doc.text('CONDITIONS & MENTIONS LÉGALES', M, y); y+=5;
    doc.setFont('helvetica','normal'); doc.setTextColor(60,55,45); doc.setFontSize(8);
    const lines=doc.splitTextToSize(quote.conditions, W-2*M);
    doc.text(lines, M, y); y+=lines.length*4+4;
  }

  if(sigDataUrl){
    y+=4;
    doc.setDrawColor(201,168,76); doc.setLineWidth(0.4); doc.line(M,y,W-M,y); y+=6;
    doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(150,140,120);
    doc.text('SIGNATURE CLIENT', M, y); y+=4;
    doc.setFillColor(250,248,242); doc.roundedRect(M,y,65,28,2,2,'F');
    try{ doc.addImage(sigDataUrl,'PNG',M+2,y+2,61,24); } catch(e){}
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(150,140,120);
    doc.text('Signé électroniquement le '+new Date().toLocaleDateString('fr-FR'), M, y+31);
    y+=36;
  }

  // Footer
  doc.setFillColor(...accentRgb);
  doc.rect(0,284,W,13,'F');
  doc.setFillColor(201,168,76);
  doc.rect(0,284,W,1,'F');
  doc.setFontSize(7); doc.setTextColor(180,170,150); doc.setFont('helvetica','normal');
  doc.text('Genere avec DEFACT · Document confidentiel', M, 291);
  doc.setTextColor(201,168,76);
  doc.text('defact.fr', W-M, 291,{align:'right'});

  return doc;
}

function AuthModal({onClose, onLogin, defaultTab='login'}) {
  const [tab, setTab] = useState(defaultTab);
  const [loading, setLoading] = useState(false);
  const [form, setForm] = useState({name:'',email:'',password:'',password2:''});
  const [otpStep, setOtpStep] = useState(false);
  const [otpEmail, setOtpEmail] = useState('');
  const [otpCode, setOtpCode] = useState('');
  const [forgot, setForgot] = useState({step:1,email:'',code:'',password:'',password2:''});
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));

  async function handleLogin(e){
    e.preventDefault(); setLoading(true);
    try{
      const data=await api('/auth/login','POST',{email:form.email,password:form.password});
      if(data.require_otp){ setOtpEmail(data.email||form.email); setOtpStep(true); toast(`Code envoyé à ${data.email||form.email}`, 'info'); }
      else if(data.token){ localStorage.setItem('qToken',data.token); localStorage.setItem('qUser',JSON.stringify(data.user)); onLogin(data.user); toast(`Bienvenue ${data.user.name} ✦`); onClose(); }
    } catch(err){ toast(err.message,'error'); }
    finally{ setLoading(false); }
  }

  async function handleVerifyOtp(e){
    e.preventDefault();
    if(otpCode.length!==6){ toast('Code à 6 chiffres requis','error'); return; }
    setLoading(true);
    try{
      const data=await api('/auth/verify-otp','POST',{email:otpEmail,otp:otpCode});
      localStorage.setItem('qToken',data.token); localStorage.setItem('qUser',JSON.stringify(data.user));
      onLogin(data.user); toast(`Bienvenue ${data.user.name} ✦`); onClose();
    } catch(err){ toast(err.message,'error'); }
    finally{ setLoading(false); }
  }

  async function handleRegister(e){
    e.preventDefault();
    if(form.password!==form.password2){ toast('Mots de passe différents','error'); return; }
    if(form.password.length<6){ toast('Mot de passe trop court (min. 6 car.)','error'); return; }
    setLoading(true);
    try{
      const data=await api('/auth/register','POST',{name:form.name.trim(),email:form.email.toLowerCase().trim(),password:form.password});
      localStorage.setItem('qToken',data.token); localStorage.setItem('qUser',JSON.stringify(data.user));
      onLogin(data.user); toast(`Compte créé ! Bienvenue ${data.user.name} ✦`); onClose();
    } catch(err){ toast(err.message,'error'); }
    finally{ setLoading(false); }
  }

  async function handleForgot(e){
    e.preventDefault(); setLoading(true);
    try{
      if(forgot.step===1){
        await api('/auth/forgot-password','POST',{email:forgot.email});
        setForgot(p=>({...p,step:2}));
        toast('Code envoyé par email ✦','info');
      } else if(forgot.step===2){
        if(forgot.code.length!==6){ toast('Code à 6 chiffres requis','error'); setLoading(false); return; }
        setForgot(p=>({...p,step:3}));
      } else {
        if(forgot.password!==forgot.password2){ toast('Mots de passe différents','error'); setLoading(false); return; }
        if(forgot.password.length<6){ toast('Mot de passe trop court','error'); setLoading(false); return; }
        await api('/auth/reset-password','POST',{email:forgot.email,code:forgot.code,password:forgot.password});
        toast('Mot de passe réinitialisé ✅ Connectez-vous.');
        setTab('login'); setOtpStep(false); setForgot({step:1,email:'',code:'',password:'',password2:''});
      }
    } catch(err){ toast(err.message,'error'); }
    finally{ setLoading(false); }
  }

  const inputClass = "inp-light";

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{background:'#faf8f3',borderColor:'rgba(201,168,76,.3)'}}>
        {/* Logo */}
        <div style={{textAlign:'center',marginBottom:24}}>
          <img src="data:image/png;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYAAQAAAADTLQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAlkZXNjAAAA8AAAACRyWFlaAAABFAAAABRnWFlaAAABKAAAABRiWFlaAAABPAAAABR3dHB0AAABUAAAABRyVFJDAAABZAAAAChnVFJDAAABZAAAAChiVFJDAAABZAAAAChjcHJ0AAABjAAAADxtbHVjAAAAAAAAAAEAAAAMZW5VUwAAAAgAAAAcAHMAUgBHAEJYWVogAAAAAAAAb6IAADj1AAADkFhZWiAAAAAAAABimQAAt4UAABjaWFlaIAAAAAAAACSgAAAPhAAAts9YWVogAAAAAAAA9tYAAQAAAADTLXBhcmEAAAAAAAQAAAACZmYAAPKnAAANWQAAE9AAAApbAAAAAAAAAABtbHVjAAAAAAAAAAEAAAAMZW5VUwAAACAAAAAcAEcAbwBvAGcAbABlACAASQBuAGMALgAgADIAMAAxADb/2wBDAAUDBAQEAwUEBAQFBQUGBwwIBwcHBw8LCwkMEQ8SEhEPERETFhwXExQaFRERGCEYGh0dHx8fExciJCIeJBweHx7/2wBDAQUFBQcGBw4ICA4eFBEUHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh7/wAARCALCBAADASIAAhEBAxEB/8QAHQABAQEAAgMBAQAAAAAAAAAAAAECBwgEBQYDCf/EAGIQAQABAgUBAwILEA4HBgUFAAABAgMEBQYRMQcSIUFR0ggTImFxgZGUpNHTFBYyNjdCRlZ0dYKVobGysxUjRVJVYnJzhIWSk6XBJDM0Q0SDohdjo8Lh8BgmJ1PiNVRkw/H/xAAaAQEAAgMBAAAAAAAAAAAAAAAABAUBAwYC/8QALBEBAAIBAgUEAwADAQEBAQAAAAECAwQREhQVMVEFEyFSMjNBIkJxYSM0Yv/aAAwDAQACEQMRAD8A6itMtQA0yscAoALHARwAsKkKAsIsAAA0EALCpCgLHCRyscALHKLHIKACwEADTLUALCLTyCgAscBHACxyqRyoCwiwAADQALTyqU8qAscIscALHKLHIKACwEADTLQC08otPIKACxwEcALHKpHKgLCLAAANAAtPKpTyoCxwixwAACxwoAsCRyoDUcMtRwARyEcg0ACxwEcALHKpHKgLCLAAANAALHCRyscApARyCgAscKkKBHKpHKwA0y1AC08oRyDQALHAQAscqy0AAChHACxyqRyoCxwiwCgAoRwA0JHCg4wahlqAGmVjgFABY4CAFhUhQFhFgAAGoCAFp5VIUCOVjhFjgBY5QBoAFgIAGoZagAjkI5BoAFjgIAWOVZaAWEWAAAagIAI5aZjloBY4RYAWOUAaABYCABqOGWo4AI5COQaABY4EhQWOVZaAWEWAAAagI4AI5aZjloBYRYAABY4UAI5VI5UBqOGVgFI5COQaABYEhQGmWgFhFp5AABqOAjgAWOEWOAUCOQUAFhUhQI5WOEWOAGo4ZWAUjkAaAAhUjlQGoZWAUAFjgKeQBplqOACOQBoSOFAhUUFjlWVgHGLUcMtRwA1DKxwCgAsCQoLCp4KAtPKLTyAADUcBHACwrMctALHCLHAAANAAtPIU8gDUcMtRwARyEcg0ACwJCgNMtALTyi08gAA1HARwARy0zHLQBTwEAoANBAC08iRyoDUcMtRwARyANAAQqQoDTKxwCrTyhHIKADUcCQoEctMtAEBAKACxwqQoEcrHCRyoCwiwCgAscKkcKB           <div style={{fontFamily:'Cormorant Garamond,serif',fontSize:28,fontWeight:700,color:'#0e0d0b',letterSpacing:'0.15em',display:'none'}}>DEFACT</div>
          <div style={{width:40,height:2,background:'linear-gradient(90deg,transparent,#c9a84c,transparent)',margin:'4px auto 0'}}/>
        </div>

        {tab!=='forgot'&&!otpStep&&(
          <div style={{display:'flex',gap:4,marginBottom:24,background:'rgba(0,0,0,.06)',borderRadius:10,padding:4}}>
            {['login','register'].map(t=>(
              <button key={t} onClick={()=>{setTab(t);setOtpStep(false);}} style={{flex:1,padding:'8px 0',border:'none',borderRadius:8,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:13,fontWeight:600,background:tab===t?'#fff':'transparent',color:tab===t?'#0e0d0b':'#84817b',boxShadow:tab===t?'0 1px 4px rgba(0,0,0,.1)':'none',transition:'all .2s'}}>
                {t==='login'?'Connexion':'Inscription'}
              </button>
            ))}
          </div>
        )}

        {tab==='login'&&!otpStep&&(
          <form onSubmit={handleLogin}>
            <h2 style={{margin:'0 0 20px',fontSize:20,fontWeight:700,color:'#0e0d0b',fontFamily:'Cormorant Garamond,serif'}}>Bon retour</h2>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div><label style={{color:'#636059'}}>Email</label><input className={`inp ${inputClass}`} type="email" placeholder="vous@email.com" value={form.email} onChange={set('email')} required /></div>
              <div><label style={{color:'#636059'}}>Mot de passe</label><input className={`inp ${inputClass}`} type="password" placeholder="••••••••" value={form.password} onChange={set('password')} required /></div>
              <button type="button" onClick={()=>setTab('forgot')} style={{textAlign:'left',fontSize:13,color:'#c9851a',background:'none',border:'none',cursor:'pointer',padding:0,fontFamily:'Plus Jakarta Sans,sans-serif',fontWeight:500}}>Mot de passe oublié ?</button>
              <button className="btn btn-gold" type="submit" disabled={loading} style={{width:'100%',marginTop:4}}>
                {loading?<Spinner light/>:'Continuer →'}
              </button>
            </div>
          </form>
        )}

        {tab==='login'&&otpStep&&(
          <form onSubmit={handleVerifyOtp}>
            <button type="button" onClick={()=>setOtpStep(false)} className="btn btn-ghost" style={{padding:'4px 0',marginBottom:16,color:'#636059',fontSize:13}}>← Retour</button>
            <h2 style={{margin:'0 0 8px',fontSize:20,fontWeight:700,color:'#0e0d0b',fontFamily:'Cormorant Garamond,serif'}}>Vérification</h2>
            <p style={{margin:'0 0 20px',color:'#636059',fontSize:14}}>Code à 6 chiffres envoyé à <strong style={{color:'#0e0d0b'}}>{otpEmail}</strong>. Valide 10 min.</p>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div>
                <label style={{color:'#636059'}}>Code de vérification</label>
                <input className={`inp ${inputClass}`} type="text" inputMode="numeric" maxLength={6} placeholder="000000"
                  value={otpCode} onChange={e=>setOtpCode(e.target.value.replace(/\D/g,''))}
                  style={{fontSize:24,letterSpacing:8,textAlign:'center',fontWeight:700}} autoFocus required />
              </div>
              <div style={{background:'#fdf8ed',border:'1px solid rgba(201,168,76,.3)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#7e470e'}}>
                Vérifiez vos spams si vous ne recevez pas le code.
              </div>
              <button className="btn btn-gold" type="submit" disabled={loading||otpCode.length!==6} style={{width:'100%'}}>
                {loading?<Spinner light/>:'Valider le code ✓'}
              </button>
            </div>
          </form>
        )}

        {tab==='register'&&(
          <form onSubmit={handleRegister}>
            <h2 style={{margin:'0 0 4px',fontSize:20,fontWeight:700,color:'#0e0d0b',fontFamily:'Cormorant Garamond,serif'}}>Créer un compte</h2>
            <p style={{margin:'0 0 20px',color:'#636059',fontSize:13}}>Gratuit · Sans carte bancaire</p>
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div><label style={{color:'#636059'}}>Prénom & Nom</label><input className={`inp ${inputClass}`} placeholder="Jean Dupont" value={form.name} onChange={set('name')} required /></div>
              <div><label style={{color:'#636059'}}>Email</label><input className={`inp ${inputClass}`} type="email" placeholder="vous@email.com" value={form.email} onChange={set('email')} required /></div>
              <div><label style={{color:'#636059'}}>Mot de passe</label><input className={`inp ${inputClass}`} type="password" placeholder="6 caractères minimum" value={form.password} onChange={set('password')} required /></div>
              <div><label style={{color:'#636059'}}>Confirmer</label><input className={`inp ${inputClass}`} type="password" placeholder="••••••••" value={form.password2} onChange={set('password2')} required /></div>
              <button className="btn btn-gold" type="submit" disabled={loading} style={{width:'100%',marginTop:4}}>
                {loading?<Spinner light/>:'Créer mon compte gratuit'}
              </button>
            </div>
          </form>
        )}

        {tab==='forgot'&&(
          <form onSubmit={handleForgot}>
            <button type="button" onClick={()=>{setTab('login');setForgot({step:1,email:'',code:'',password:'',password2:''});}} className="btn btn-ghost" style={{padding:'4px 0',marginBottom:16,color:'#636059',fontSize:13}}>← Retour</button>
            <h2 style={{margin:'0 0 4px',fontSize:20,fontWeight:700,color:'#0e0d0b',fontFamily:'Cormorant Garamond,serif'}}>
              {forgot.step===1?'Mot de passe oublié':forgot.step===2?'Entrez le code':'Nouveau mot de passe'}
            </h2>
            <p style={{margin:'0 0 20px',color:'#636059',fontSize:13}}>
              {forgot.step===1?'Entrez votre email pour recevoir un code à 6 chiffres.':forgot.step===2?`Code envoyé à ${forgot.email} — valable 15 min.`:'Choisissez votre nouveau mot de passe.'}
            </p>
            {forgot.step===1&&(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div><label style={{color:'#636059'}}>Email du compte</label><input className={`inp ${inputClass}`} type="email" placeholder="vous@email.com" value={forgot.email} onChange={e=>setForgot(p=>({...p,email:e.target.value}))} required /></div>
                <button className="btn btn-gold" type="submit" disabled={loading} style={{width:'100%'}}>{loading?<Spinner light/>:'Envoyer le code →'}</button>
              </div>
            )}
            {forgot.step===2&&(
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                <div>
                  <label style={{color:'#636059'}}>Code à 6 chiffres</label>
                  <input className={`inp ${inputClass}`} type="text" inputMode="numeric" maxLength={6} placeholder="000000"
                    value={forgot.code} onChange={e=>setForgot(p=>({...p,code:e.target.value.replace(/\D/g,'')}))}
                    style={{fontSize:24,letterSpacing:8,textAlign:'center',fontWeight:700}} autoFocus required />
                </div>
                <div style={{background:'#fdf8ed',border:'1px solid rgba(201,168,76,.3)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#7e470e'}}>
                  Vérifiez vos spams si vous ne recevez pas le code.

// SIGNATURE MODAL
// ═══════════════════════════════════
function SignatureModal({onClose, onSign}) {
  const canvasRef=useRef(null);
  const [drawing, setDrawing]=useState(false);
  const [hasSig, setHasSig]=useState(false);
  const [mode, setMode]=useState('draw'); // 'draw' | 'upload'
  const lastPos=useRef(null);

  useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas) return;
    const resize=()=>{ canvas.width=canvas.offsetWidth; canvas.height=canvas.offsetHeight; initCtx(canvas); };
    resize();
    const ro=new ResizeObserver(resize);
    ro.observe(canvas.parentElement);
    return ()=>ro.disconnect();
  },[]);

  function initCtx(canvas){
    const ctx=canvas.getContext('2d');
    ctx.strokeStyle='#0e0d0b'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  }

  function getPos(e,canvas){
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return {x:src.clientX-r.left,y:src.clientY-r.top};
  }

  function startDraw(e){ e.preventDefault(); setDrawing(true); lastPos.current=getPos(e,canvasRef.current); }
  function draw(e){
    e.preventDefault();
    if(!drawing) return;
    const canvas=canvasRef.current;
    const ctx=canvas.getContext('2d');
    const pos=getPos(e,canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x,lastPos.current.y); ctx.lineTo(pos.x,pos.y); ctx.stroke();
    lastPos.current=pos; setHasSig(true);
  }
  function endDraw(e){ e.preventDefault(); setDrawing(false); }
  function clear(){
    const canvas=canvasRef.current;
    canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
    setHasSig(false);
  }
  function validate(){
    if(!hasSig){ toast('Veuillez signer dans le cadre','error'); return; }
    onSign(canvasRef.current.toDataURL('image/png')); onClose();
  }
  function handleUpload(e){
    const file=e.target.files[0];
    if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{ onSign(ev.target.result); onClose(); };
    reader.readAsDataURL(file);
  }

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h3 style={{margin:0,fontSize:18,fontWeight:700,fontFamily:'Cormorant Garamond,serif',color:'#f5f5f4'}}>Signature électronique</h3>
          <button className="btn btn-ghost" onClick={onClose} style={{padding:'4px 10px',fontSize:18,color:'#a8a6a1'}}>✕</button>
        </div>
        <div style={{display:'flex',gap:4,marginBottom:16,background:'rgba(255,255,255,.06)',borderRadius:8,padding:3}}>
          {[['draw','Dessiner'],['upload','Importer']].map(([m,l])=>(
            <button key={m} onClick={()=>setMode(m)} style={{flex:1,padding:'7px 0',border:'none',borderRadius:6,cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif',fontSize:13,fontWeight:600,background:mode===m?'rgba(201,168,76,.2)':'transparent',color:mode===m?'#f5da8a':'#636059',transition:'all .2s'}}>{l}</button>
          ))}
        </div>
        {mode==='draw'?(
          <>
            <p style={{margin:'0 0 12px',color:'#636059',fontSize:13}}>Signez dans le cadre. La signature sera intégrée au PDF en haute qualité.</p>
            <div className="sig-wrap" style={{height:160,marginBottom:14,background:'rgba(250,248,242,.96)'}}>
              <canvas ref={canvasRef} id="sigCanvas" style={{width:'100%',height:'100%',display:'block'}}
                onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw} />
            </div>
            <div style={{display:'flex',gap:10}}>
              <button className="btn btn-ghost" onClick={clear} style={{flex:1,fontSize:13}}>Effacer</button>
              <button className="btn btn-gold" onClick={validate} disabled={!hasSig} style={{flex:2}}>Valider la signature ✓</button>
            </div>
          </>
        ):(
          <>
            <p style={{margin:'0 0 16px',color:'#636059',fontSize:13}}>Importez une image de votre signature (PNG, JPG, SVG)</p>
            <label style={{display:'block',border:'1px dashed rgba(201,168,76,.3)',borderRadius:12,padding:'32px',textAlign:'center',cursor:'pointer',background:'rgba(201,168,76,.04)',transition:'all .2s',textTransform:'none',fontSize:14,color:'#c9a84c',letterSpacing:0,fontWeight:500}}>
              <div style={{fontSize:32,marginBottom:8}}>☁</div>
              <div>Cliquez ou déposez votre signature ici</div>
              <div style={{fontSize:12,color:'#636059',marginTop:4}}>PNG, JPG, SVG — max 2Mo</div>
              <input type="file" accept="image/*" style={{display:'none'}} onChange={handleUpload} />
            </label>
          </>
        )}
      </div>
    </div>
  );
}

function RelanceModal({onClose, quote, user}) {
  const [relances, setRelances]=useState([]);
  const [loading, setLoading]=useState(true);
  const [activating, setActivating]=useState(false);
  const [active, setActive]=useState(false);
  const [nextSend, setNextSend]=useState(null);
  const [countdown, setCountdown]=useState('');
  const [maxRelances, setMaxRelances]=useState(5);
  const [sentCount, setSentCount]=useState(0);
  const [clientEmail, setClientEmail]=useState(quote?.client_email||'');
  const [editingEmail, setEditingEmail]=useState(!quote?.client_email);

  useEffect(()=>{
    loadRelances();
  },[]);

  useEffect(()=>{
    if(!nextSend||!active) return;
    const tick=()=>{
      const diff=new Date(nextSend)-new Date();
      if(diff<=0){ setCountdown('Envoi imminent…'); return; }
      const h=Math.floor(diff/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      setCountdown(`${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m ${String(s).padStart(2,'0')}s`);
    };
    tick();
    const id=setInterval(tick,1000);
    return ()=>clearInterval(id);
  },[nextSend,active]);

  async function loadRelances(){
    setLoading(true);
    try{
      if(quote?.id){
        const d=await api(`/quotes/${quote.id}/relances`);
        setRelances(d.relances||[]);
        setActive(d.active||false);
        setSentCount(d.sent_count||0);
        setMaxRelances(d.max_relances||5);
        if(d.next_send) setNextSend(d.next_send);
      }
    } catch(e){
      // Backend may not have this endpoint yet — use localStorage simulation
      const key=`relance_${quote?.id||'draft'}`;
      const stored=JSON.parse(localStorage.getItem(key)||'{}');
      setActive(stored.active||false);
      setSentCount(stored.sent_count||0);
      setRelances(stored.history||[]);
      if(stored.active&&stored.next_send){
        setNextSend(stored.next_send);
      }
    }
    setLoading(false);
  }

  async function toggleRelance(){
    if(!clientEmail||!clientEmail.includes('@')){ toast('Email client requis pour activer les relances','error'); setEditingEmail(true); return; }
    if(!quote?.id&&!quote?.client_name){ toast('Sauvegardez d\'abord le devis','info'); return; }
    setActivating(true);
    const newActive=!active;
    try{
      if(quote?.id){
        await api(`/quotes/${quote.id}/relances`,'POST',{active:newActive,email:clientEmail,interval_hours:24,max_count:maxRelances});
      }
      // Local simulation
      const key=`relance_${quote?.id||'draft'}`;
      const next=new Date(Date.now()+24*3600*1000).toISOString();
      const stored={
        active:newActive,
        sent_count:sentCount,
        history:relances,
        next_send:newActive?next:null,
        email:clientEmail,
        activated_at:new Date().toISOString(),
      };
      localStorage.setItem(key,JSON.stringify(stored));
      setActive(newActive);
      if(newActive){ setNextSend(next); toast('✦ Relances automatiques activées — 1er envoi dans 24h','success'); }
      else{ setNextSend(null); toast('Relances désactivées','info'); }
    } catch(e){ toast(e.message,'error'); }
    setActivating(false);
  }

  function simulateSend(){
    // Demo: simulate a relance being sent now
    const key=`relance_${quote?.id||'draft'}`;
    const stored=JSON.parse(localStorage.getItem(key)||'{}');
    const newEntry={date:new Date().toISOString(),email:clientEmail,status:'sent',attempt:sentCount+1};
    const newHistory=[newEntry,...(stored.history||[])];
    const next=new Date(Date.now()+24*3600*1000).toISOString();
    const updated={...stored,sent_count:sentCount+1,history:newHistory,next_send:next};
    localStorage.setItem(key,JSON.stringify(updated));
    setSentCount(sentCount+1);
    setRelances(newHistory);
    setNextSend(next);
    toast(`✉ Relance simulée envoyée à ${clientEmail}`,'success');
  }

  const fmtRelanceDate=d=>new Date(d).toLocaleString('fr-FR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
  const progress=Math.min((sentCount/maxRelances)*100,100);

  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{maxWidth:520}}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
          <div>
            <h3 style={{margin:0,fontSize:20,fontWeight:700,fontFamily:'Cormorant Garamond,serif',color:'#f5f5f4'}}>
              ⟳ Relances automatiques
            </h3>
            <p style={{margin:'4px 0 0',fontSize:13,color:'#636059'}}>Plan Équipe ◆ — Envoi toutes les 24h</p>
          </div>
          <button className="btn btn-ghost" onClick={onClose} style={{padding:'4px 10px',fontSize:18,color:'#a8a6a1'}}>✕</button>
        </div>

        {loading?<div style={{textAlign:'center',padding:32}}><Spinner/></div>:(
          <>
            {/* Status card */}
            <div style={{background:active?'rgba(201,168,76,.1)':'rgba(255,255,255,.04)',border:`1px solid ${active?'rgba(201,168,76,.35)':'rgba(255,255,255,.1)'}`,borderRadius:14,padding:'18px 20px',marginBottom:16,transition:'all .3s'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <div style={{width:10,height:10,borderRadius:'50%',background:active?'#c9a84c':'#4d4a44',boxShadow:active?'0 0 8px rgba(201,168,76,.6)':'none',transition:'all .3s'}}/>
                  <span style={{fontWeight:700,fontSize:14,color:active?'#f5da8a':'#a8a6a1'}}>{active?'Relances actives':'Relances inactives'}</span>
                </div>
                <button className={`btn ${active?'btn-danger':'btn-gold'}`} onClick={toggleRelance} disabled={activating} style={{fontSize:13,padding:'7px 16px'}}>
                  {activating?<Spinner light={!active}/>:active?'Désactiver':'Activer'}
                </button>
              </div>

              {/* Email client */}
              {editingEmail?(
                <div style={{display:'flex',gap:8,marginBottom:12}}>
                  <input className="inp" type="email" placeholder="email@client.com" value={clientEmail} onChange={e=>setClientEmail(e.target.value)} style={{flex:1,fontSize:13}} />
                  <button className="btn btn-outline" onClick={()=>setEditingEmail(false)} style={{fontSize:12,padding:'8px 12px'}}>OK</button>
                </div>
              ):(
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12,fontSize:13}}>
                  <span style={{color:'#636059'}}>✉</span>
                  <span style={{color:'#f5da8a',fontWeight:500}}>{clientEmail||'Aucun email'}</span>
                  <button onClick={()=>setEditingEmail(true)} style={{background:'none',border:'none',cursor:'pointer',color:'#636059',fontSize:11,padding:0,fontFamily:'Plus Jakarta Sans,sans-serif'}}>modifier</button>
                </div>
              )}

              {/* Countdown */}
              {active&&nextSend&&(
                <div style={{background:'rgba(0,0,0,.2)',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:12,color:'#84817b'}}>Prochain envoi dans</span>
                  <span style={{fontFamily:'Cormorant Garamond,serif',fontSize:22,fontWeight:700,color:'#c9a84c',letterSpacing:'.05em'}}>{countdown||'…'}</span>
                </div>
              )}
            </div>

            {/* Progress */}
            <div style={{marginBottom:16}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,fontSize:12}}>
                <span style={{color:'#84817b'}}>Relances envoyées</span>
                <span style={{color:'#f5da8a',fontWeight:600}}>{sentCount} / {maxRelances}</span>
              </div>
              <div className="quota-bar">
                <div className={`quota-fill${sentCount>=maxRelances?' danger':''}`} style={{width:`${progress}%`}} />
              </div>
              {sentCount>=maxRelances&&(
                <div style={{fontSize:12,color:'#f09595',marginTop:6}}>Limite de {maxRelances} relances atteinte — le client ne sera plus contacté automatiquement.</div>
              )}
            </div>

            {/* Config */}
            <div style={{background:'rgba(255,255,255,.03)',border:'1px solid rgba(255,255,255,.07)',borderRadius:12,padding:'14px 16px',marginBottom:16,fontSize:13}}>
              <div style={{fontWeight:600,color:'#f5f5f4',marginBottom:10,fontSize:12,textTransform:'uppercase',letterSpacing:'.06em'}}>Paramètres</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:'#636059'}}>Fréquence</span>
                  <span style={{color:'#f5da8a',fontWeight:500}}>Toutes les 24h</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:'#636059'}}>Relances max</span>
                  <select style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.2)',borderRadius:6,color:'#f5da8a',padding:'2px 8px',fontSize:12,fontFamily:'Plus Jakarta Sans,sans-serif'}} value={maxRelances} onChange={e=>setMaxRelances(parseInt(e.target.value))}>
                    {[3,5,7,10].map(n=><option key={n} value={n}>{n} relances</option>)}
                  </select>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{color:'#636059'}}>Arrêt auto si</span>
                  <span style={{color:'#a8a6a1',fontSize:12}}>Devis accepté / refusé</span>
                </div>
              </div>
            </div>

            {/* Demo button */}
            {active&&sentCount<maxRelances&&(
              <button className="btn btn-outline" onClick={simulateSend} style={{width:'100%',marginBottom:12,fontSize:13,borderStyle:'dashed'}}>
                ⚡ Simuler un envoi maintenant (démo)
              </button>
            )}

            {/* History */}
            <div>
              <div style={{fontWeight:600,color:'#84817b',fontSize:11,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Historique</div>
              {!relances.length?(
                <div style={{textAlign:'center',padding:'20px 0',color:'#4d4a44',fontSize:13}}>
                  {active?'La 1ʳᵉ relance sera envoyée dans 24h':'Aucune relance envoyée'}
                </div>
              ):(
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {relances.slice(0,8).map((r,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'rgba(255,255,255,.03)',borderRadius:8,border:'1px solid rgba(255,255,255,.06)'}}>
                      <span style={{fontSize:14}}>{r.status==='sent'?'✉':'✗'}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:600,color:'#f5f5f4'}}>Relance n°{r.attempt||i+1}</div>
                        <div style={{fontSize:11,color:'#636059'}}>{r.email} · {fmtRelanceDate(r.date)}</div>
                      </div>
                      <span className={`badge ${r.status==='sent'?'status-accepted':'status-refused'}`} style={{fontSize:10}}>
                        {r.status==='sent'?'Envoyé':'Échec'}
                      </span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div style={{marginTop:16,padding:'10px 14px',background:'rgba(133,183,235,.06)',border:'1px solid rgba(133,183,235,.15)',borderRadius:10,fontSize:12,color:'#85b7eb'}}>
              ℹ️ Les relances s'arrêtent automatiquement si le client accepte ou refuse le devis.
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function QuotaConfirmModal({onClose, onConfirm, quota}) {
  const remaining=quota?.quotes?.remaining??0;
  return (
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-box" style={{textAlign:'center',maxWidth:420}}>
        <div style={{width:56,height:56,margin:'0 auto 16px',borderRadius:'50%',background:'rgba(201,168,76,.12)',border:'1px solid rgba(201,168,76,.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>◎</div>
        <h3 style={{margin:'0 0 8px',fontSize:18,fontWeight:700,fontFamily:'Cormorant Garamond,serif',color:'#f5f5f4'}}>Créer un devis</h3>
        <p style={{margin:'0 0 20px',color:'#84817b',fontSize:14,lineHeight:1.6}}>
          Vous avez utilisé <strong style={{color:'#f5da8a'}}>{quota?.quotes?.used||0}/{quota?.quotes?.limit||3}</strong> devis ce mois.
          Il vous reste <strong style={{color:remaining<=1?'#f09595':'#c9a84c'}}>{remaining} devis</strong>.
        </p>
        <div style={{background:'rgba(201,168,76,.08)',border:'1px solid rgba(201,168,76,.12)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#f5da8a',marginBottom:20}}>
          Plan gratuit : 3 devis / mois — Passez au Pro pour des devis illimités.
        </div>
        <div style={{display:'flex',gap:10}}>
          <button className="btn btn-ghost" onClick={onClose} style={{flex:1}}>Annuler</button>
          <button className="btn btn-gold" onClick={onConfirm} style={{flex:2}}>Continuer →</button>

      </div>

  );
}

// ═══════════════════════════════════
// QUOTE FORM
// ═══════════════════════════════════
function QuoteForm({user, onShowUpgrade, onShowAuth}) {
  const [template, setTemplate]=useState('classique');
  const [sigData, setSigData]=useState(null);
  const [saving, setSaving]=useState(false);
  const [savedQuote, setSavedQuote]=useState(null);
  const [modal, setModal]=useState(null);
  const [quoteNum, setQuoteNum]=useState('');
  const [items, setItems]=useState([{description:'',qty:1,unit_price:0}]);
  const [form, setForm]=useState({company:'',client_name:'',client_address:'',client_email:'',tva_rate:20,validity_days:30,conditions:''});
  const [preview, setPreview]=useState({ht:0,tva:0,ttc:0});
  const [quota, setQuota]=useState(null);
  const [showQuotaConfirm, setShowQuotaConfirm]=useState(false);
  const [pendingAction, setPendingAction]=useState(null);

  useEffect(()=>{
    const ht=items.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.unit_price)||0),0);
    setPreview({ht,tva:ht*(form.tva_rate/100),ttc:ht*(1+form.tva_rate/100)});
  },[items,form.tva_rate]);

  useEffect(()=>{
    if(!user) return;
    const refresh=()=>api('/quotes/quota/status').then(setQuota).catch(()=>{});
    refresh();
    // Real-time: poll every 30s when tab is active
    const id=setInterval(()=>{ if(!document.hidden) refresh(); },30000);
    return ()=>clearInterval(id);
  },[user]);

  const setF=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const addLine=()=>setItems(p=>[...p,{description:'',qty:1,unit_price:0}]);
  const removeLine=i=>{ if(items.length>1) setItems(p=>p.filter((_,j)=>j!==i)); };
  const setItem=(i,k,v)=>setItems(p=>p.map((it,j)=>j===i?{...it,[k]:v}:it));
  const isPro=()=>user&&(user.plan==='pro'||user.plan==='team');

  function selectTemplate(id){
    setTemplate(id);
    if(PRO_TPLS.includes(id)&&!isPro()) toast('Aperçu activé — Plan Pro requis pour télécharger','info');
  }

  async function saveQuote(){
    if(!form.company||!form.client_name||items.every(i=>!i.description)){ toast('Remplissez entreprise, client et au moins une prestation','error'); return null; }
    if(!user){ toast('Connectez-vous pour sauvegarder','info'); onShowAuth(); return null; }
    try{
      const data=await api('/quotes','POST',{company_name:form.company,client_name:form.client_name,client_address:form.client_address,client_email:form.client_email,items,tva_rate:parseFloat(form.tva_rate),validity_days:parseInt(form.validity_days),conditions:form.conditions,template_id:template});
      api('/quotes/quota/status').then(setQuota).catch(()=>{});
      return data.quote;
    } catch(e){
      if(e.message?.includes('Limite')||e.message?.includes('upgrade')||e.message?.includes('réservé')||e.message?.includes('payante')){
        onShowUpgrade(e.message);
      }
      toast(e.message,'error'); return null;
    }
  }

  async function handleDownload(){
    if(!form.company&&!form.client_name){ toast('Remplissez au moins votre entreprise et le client','error'); return; }
    if(!user){ toast('Connectez-vous pour télécharger le PDF','info'); onShowAuth(); return; }
    if(PRO_TPLS.includes(template)&&user.plan==='starter'){ onShowUpgrade('Ce template est réservé aux plans Pro et Équipe.'); return; }

    // Show quota warning for starter plan
    if(user.plan==='starter'&&quota&&quota.quotes.remaining!==null&&quota.quotes.remaining<=1&&!savedQuote){
      if(quota.quotes.remaining===0){ onShowUpgrade(`Limite de ${quota.quotes.limit} devis atteinte.`); return; }
      setShowQuotaConfirm(true);
      setPendingAction('download');
      return;
    }
    await doDownload();
  }

  async function doDownload(){
    setSaving(true);
    try{
      let quote=savedQuote;
      if(!quote){ const saved=await saveQuote(); if(!saved){ setSaving(false); return; } quote=saved; setSavedQuote(saved); setQuoteNum(saved.number); }
      const token=localStorage.getItem('qToken');
      const res=await fetch(`${API}/quotes/${quote.id}/pdf`,{headers:{Authorization:`Bearer ${token}`}});
      if(!res.ok){ const json=await res.json().catch(()=>({})); if(json.upgrade) onShowUpgrade(json.error); else toast(json.error||'Erreur PDF','error'); setSaving(false); return; }
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=(quote.number||'devis')+'.pdf';
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
      toast('PDF téléchargé ✦');
    } catch(e){ toast(e.message,'error'); }
    setSaving(false);
  }

  async function handleSig(){
    if(!user){ onShowAuth(); return; }
    if(!isPro()){
      try{
        const d=await api('/quotes/quota/status'); setQuota(d);
        if(d.signatures.remaining!==null&&d.signatures.remaining<=0){ onShowUpgrade(`Limite de ${d.signatures.limit} signatures atteinte. Passez au Pro pour des signatures illimitées.`); return; }
      } catch(_){}
    }
    setModal('sig');
  }

  const tpl=ALL_TEMPLATES.find(t=>t.id===template)||ALL_TEMPLATES[0];
  const quotaPercent=quota?((quota.quotes.used/quota.quotes.limit)*100):0;

  return (
    <div style={{maxWidth:1120,margin:'0 auto',padding:'28px 20px'}}>

      {/* Quota banner */}
      {user&&quota&&quota.plan==='starter'&&(
        <div className="card card-gold fade-up" style={{marginBottom:20,padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:10}}>
            <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
              <span style={{fontSize:13,color:quota.quotes.remaining===0?'#f09595':'#f5da8a',fontWeight:500}}>
                Devis : <strong>{quota.quotes.used}/{quota.quotes.limit}</strong>
                {quota.quotes.remaining>0?` · ${quota.quotes.remaining} restant(s)`:' · Limite atteinte'}
              </span>
              <span style={{fontSize:13,color:quota.signatures.remaining===0?'#f09595':'#f5da8a',fontWeight:500}}>
                Signatures : <strong>{quota.signatures.used}/{quota.signatures.limit}</strong>
                {quota.signatures.remaining>0?` · ${quota.signatures.remaining} restante(s)`:' · Limite atteinte'}
              </span>
            </div>
            {(quota.quotes.remaining===0||quota.signatures.remaining===0)&&(
              <button className="btn btn-gold" onClick={()=>onShowUpgrade()} style={{fontSize:12,padding:'6px 14px'}}>✦ Passer au Pro</button>
            )}
          </div>
          <div className="quota-bar">
            <div className={`quota-fill ${quotaPercent>=80?'danger':''}`} style={{width:`${Math.min(100,quotaPercent)}%`}}/>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 360px',gap:24,alignItems:'start'}} className="col-2">

        {/* LEFT */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* Template */}
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:14,color:'#f5f5f4',display:'flex',alignItems:'center',gap:8}}>
                Template
                <span className={`badge ${isPro()?'status-accepted':'status-draft'}`} style={{fontSize:10}}>
                  {isPro()?'22 disponibles':'Aperçu · Pro pour DL'}
                </span>
              </div>
              <button className="btn btn-outline" onClick={()=>setModal('gallery')} style={{fontSize:12,padding:'6px 12px'}}>Voir tous ✦</button>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {ALL_TEMPLATES.slice(0,6).map(t=>(
                <button key={t.id} onClick={()=>selectTemplate(t.id)} className={`tpl-btn ${template===t.id?'active':''}`}>
                  {t.icon} {t.label} {t.pro&&!isPro()&&<span style={{color:'#c9a84c',fontSize:10}}> ✦</span>}
                </button>
              ))}
            </div>
            {tpl&&<div style={{marginTop:10,fontSize:12,color:'#636059'}}>Sélectionné : <strong style={{color:'#c9a84c'}}>{tpl.label}</strong> · {tpl.sector}</div>}
          </div>

          {/* Info */}
          <div className="card">
            <div style={{fontWeight:700,fontSize:14,color:'#f5f5f4',marginBottom:16}}>Informations</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="stack-mobile">
              <div style={{gridColumn:'1/-1'}}>
                <label>Votre entreprise *</label>
                <input className="inp" placeholder="Mon Entreprise SARL" value={form.company} onChange={setF('company')} />
              </div>
              <div>
                <label>Nom du client *</label>
                <input className="inp" placeholder="Jean Martin" value={form.client_name} onChange={setF('client_name')} />
              </div>
              <div>
                <label>Email client</label>
                <input className="inp" type="email" placeholder="client@mail.com" value={form.client_email} onChange={setF('client_email')} />
              </div>
              <div style={{gridColumn:'1/-1'}}>
                <label>Adresse client</label>
                <input className="inp" placeholder="12 rue de la Paix, 75001 Paris" value={form.client_address} onChange={setF('client_address')} />
              </div>
              <div>
                <label>TVA</label>
                <select className="sel" value={form.tva_rate} onChange={setF('tva_rate')}>
                  <option value={20}>20% — Normal</option>
                  <option value={10}>10% — Intermédiaire</option>
                  <option value={5.5}>5.5% — Réduit</option>
                  <option value={0}>0% — Exonéré</option>
                </select>
              </div>
              <div>
                <label>Validité</label>
                <select className="sel" value={form.validity_days} onChange={setF('validity_days')}>
                  <option value={15}>15 jours</option>
                  <option value={30}>30 jours</option>
                  <option value={60}>60 jours</option>
                  <option value={90}>90 jours</option>
                </select>
              </div>
            </div>
          </div>

          {/* Items */}
          <div className="card">
            <div style={{fontWeight:700,fontSize:14,color:'#f5f5f4',marginBottom:14}}>Prestations *</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 36px',gap:6}}>
                {['Désignation','Qté','P.U. HT',''].map((h,i)=><div key={i} style={{fontSize:11,fontWeight:600,color:'#636059',textTransform:'uppercase',letterSpacing:'.05em',padding:'0 2px'}}>{h}</div>)}
              </div>
              {items.map((item,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 36px',gap:6,alignItems:'center'}}>
                  <input className="inp" placeholder={`Prestation ${i+1}`} value={item.description} onChange={e=>setItem(i,'description',e.target.value)} />
                  <input className="inp" type="number" placeholder="1" min="0" step="0.1" value={item.qty} onChange={e=>setItem(i,'qty',e.target.value)} style={{textAlign:'center'}} />
                  <input className="inp" type="number" placeholder="0.00" min="0" step="0.01" value={item.unit_price} onChange={e=>setItem(i,'unit_price',e.target.value)} style={{textAlign:'right'}} />
                  <button onClick={()=>removeLine(i)} style={{width:36,height:40,border:'1px solid rgba(240,149,149,.25)',borderRadius:8,background:'transparent',color:'#f09595',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(240,149,149,.08)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>×</button>
                </div>
              ))}
              <button className="btn btn-ghost" onClick={addLine} style={{justifyContent:'center',border:'1px dashed rgba(255,255,255,.12)',borderRadius:10,marginTop:4,fontSize:13}}>+ Ajouter une ligne</button>
            </div>
          </div>

          {/* Conditions */}
          <div className="card">
            <label>Conditions & Mentions légales</label>
            <textarea className="ta" placeholder="Acompte de 30% à la commande. Délai d'exécution : 5 jours ouvrés..." value={form.conditions} onChange={setF('conditions')} />
          </div>

          {/* Signature display */}
          {sigData&&(
            <div className="card card-gold" style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:40,height:28,borderRadius:6,overflow:'hidden',border:'1px solid rgba(201,168,76,.3)',background:'rgba(250,248,242,.9)',flexShrink:0}}>
                <img src={sigData} alt="sig" style={{width:'100%',height:'100%',objectFit:'contain'}} />
              </div>
              <div>
                <div style={{fontWeight:600,color:'#f5da8a',fontSize:13}}>Signature enregistrée ✦</div>
                <div style={{fontSize:12,color:'#84817b'}}>Sera incluse dans le PDF</div>
              </div>
              <button className="btn btn-ghost" onClick={()=>setSigData(null)} style={{marginLeft:'auto',fontSize:12,color:'#f09595',padding:'4px 8px'}}>Supprimer</button>
            </div>
          )}

          {/* Actions */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button className="btn btn-gold" onClick={handleDownload} disabled={saving} style={{gridColumn:'1/-1',padding:'14px',fontSize:15}}>
              {saving?<><Spinner/> Génération…</>:'⬇ Télécharger le devis PDF'}
            </button>
            <button className="btn btn-outline" onClick={()=>{ if(!user){onShowAuth();return;} if(!isPro()){onShowUpgrade('Envoi email réservé aux plans Pro et Équipe.');return;} setModal('email'); }}>
              ✉ Envoyer par email
            </button>
            <button className="btn btn-outline" onClick={handleSig}>
              ✦ Signer le devis{!isPro()&&<span style={{fontSize:11,color:'#636059'}}> · Pro</span>}
            </button>
            <button className="btn btn-outline" onClick={()=>{ if(!isPro()){onShowUpgrade();return;} if(!savedQuote){toast('Téléchargez d\'abord le devis','info');return;} api(`/invoices/from-quote/${savedQuote.id}`,'POST').then(d=>toast(`Facture ${d.invoice.number} créée ✦`)).catch(e=>toast(e.message,'error')); }}>
              ⟳ Convertir en facture
            </button>
            <button className="btn btn-outline" onClick={()=>{ if(!user){onShowAuth();return;} if(!isPro()){onShowUpgrade();return;} setModal('stats'); }}>
              ◈ Statistiques
            </button>
            <button className="btn btn-outline" style={{gridColumn:'1/-1',borderColor:user?.plan==='team'?'rgba(201,168,76,.4)':'rgba(255,255,255,.1)',position:'relative'}} onClick={()=>{ if(!user){onShowAuth();return;} if(user.plan!=='team'){onShowUpgrade('Les relances automatiques sont réservées au plan Équipe ◆.');return;} setModal('relance'); }}>
              <span>⟳ Relances automatiques</span>
              {user?.plan==='team'?(
                <span style={{marginLeft:6,fontSize:11,background:'rgba(201,168,76,.15)',border:'1px solid rgba(201,168,76,.3)',borderRadius:4,padding:'1px 6px',color:'#c9a84c'}}>◆ Actif</span>
              ):(
                <span style={{marginLeft:6,fontSize:11,color:'#636059'}}> · Plan Équipe</span>
              )}
            </button>
          </div>
        </div>

        {/* RIGHT — Preview */}
        <div style={{position:'sticky',top:80}}>
          <div className="card" style={{padding:0,overflow:'hidden',border:'1px solid rgba(201,168,76,.2)'}}>
            <div style={{background:'linear-gradient(135deg,#1a1512,#2a1f0e)',padding:'14px 18px',borderBottom:'1px solid rgba(201,168,76,.15)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>

function Nav({user, page, onPage, onShowAuth, onLogout}) {
  const [menuOpen, setMenuOpen]=useState(false);
  const [scrolled, setScrolled]=useState(false);
  useEffect(()=>{ const fn=()=>setScrolled(window.scrollY>30); window.addEventListener('scroll',fn); return ()=>window.removeEventListener('scroll',fn); },[]);

  const onLanding=page==='landing';
  const navBg=scrolled||!onLanding?'rgba(14,13,11,.95)':'transparent';

  return (
    <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:900,transition:'all .3s',background:navBg,backdropFilter:(scrolled||!onLanding)?'blur(16px)':'none',borderBottom:(scrolled||!onLanding)?'1px solid rgba(255,255,255,.06)':'none'}}>

function App() {
  const [user, setUser]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('qUser')||'null'); } catch{ return null; } });
  const [page, setPage]=useState('landing');
  const [authModal, setAuthModal]=useState(null);
  const [upgradeModal, setUpgradeModal]=useState(false);
  const [upgradeReason, setUpgradeReason]=useState('');

  useEffect(()=>{
    const token=localStorage.getItem('qToken');
    if(token){ api('/auth/me').then(d=>{ setUser(d.user); localStorage.setItem('qUser',JSON.stringify(d.user)); }).catch(()=>{ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); }); }
    // URL reset token flow removed — now uses email code
  },[]);

  function handleLogin(u){ setUser(u); }
  function handleLogout(){ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); setPage('landing'); toast('Déconnecté','info'); }
  function showAuth(tab='login'){ setAuthModal(tab); }
  function showUpgrade(reason=''){ setUpgradeReason(reason||''); setUpgradeModal(true); }

  return (
    <>
      <Toasts />
      <Nav user={user} page={page} onPage={setPage} onShowAuth={showAuth} onLogout={handleLogout} />

      <div style={{paddingTop:page==='landing'?0:64}}>
        {page==='landing'&&<Landing onShowAuth={showAuth} onGoApp={()=>{ if(!user){showAuth('register');}else{setPage('app');} }} user={user} />}
        {page==='app'&&(
          <div>
            <div style={{background:'rgba(255,255,255,.03)',borderBottom:'1px solid rgba(255,255,255,.06)',padding:'20px 24px'}}>
              <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                <div>
                  <h1 style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'Cormorant Garamond,serif',color:'#f5f5f4',letterSpacing:'.02em'}}>
                    Nouveau devis
                  </h1>
                  <p style={{margin:'4px 0 0',fontSize:13,color:'#636059'}}>
                    {user?`${user.name} · Plan ${PLANS[user.plan]||user.plan}`:'Connectez-vous pour sauvegarder et accéder à toutes les fonctionnalités'}
                  </p>
                </div>
                {!user&&(
                  <button className="btn btn-gold" onClick={()=>showAuth('login')}>Connexion / Inscription →</button>
                )}
              </div>
            </div>
            <QuoteForm user={user} onShowUpgrade={showUpgrade} onShowAuth={()=>showAuth('login')} />
          </div>
        )}
      </div>

      {authModal&&<AuthModal onClose={()=>setAuthModal(null)} onLogin={handleLogin} defaultTab={authModal} />}
      {upgradeModal&&<UpgradeModal onClose={()=>setUpgradeModal(false)} user={user} reason={upgradeReason} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
