// QUOTE FORM
// ═══════════════════════════════════
class QuoteErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err,info){ console.error('[QuoteForm crash]',err,info); }
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{maxWidth:720,margin:'40px auto',padding:24,background:'#fff1f2',border:'1px solid #fecaca',borderRadius:12,fontFamily:'Inter,sans-serif'}},
        React.createElement('div',{style:{fontSize:32,marginBottom:8}},'⚠️'),
        React.createElement('h2',{style:{margin:'0 0 8px',color:'#b91c1c'}},'Une erreur est survenue lors de l\'affichage du devis'),
        React.createElement('p',{style:{color:'#7f1d1d',fontSize:14,margin:'0 0 12px'}},String(this.state.err?.message||this.state.err)),
        React.createElement('button',{onClick:()=>{ try{localStorage.removeItem('qOpenQuote');}catch(_){}; this.setState({err:null}); location.reload(); },style:{padding:'10px 16px',background:'#4f46e5',color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer'}},'Recharger un formulaire vide')
      );
    }
    return this.props.children;
  }
}
function QuoteForm({user, onShowUpgrade, onShowAuth, onRelanceUpdate}) {
  const [template, setTemplate]=useState('classique');
  const [sigData, setSigData]=useState(null);
  const [saving, setSaving]=useState(false);
  // Au mount, on lit UNIQUEMENT un devis explicitement ouvert depuis l'historique
  // (clé éphémère 'qOpenQuote' posée par onOpenQuote). On ne lit JAMAIS qLastQuote :
  // le formulaire repart vide à chaque rechargement de page.
  const _opened=(()=>{ try{
    const raw=localStorage.getItem('qOpenQuote');
    if(!raw) return null;
    localStorage.removeItem('qOpenQuote'); // consommé une seule fois
    const q=JSON.parse(raw);
    if(!q||typeof q!=='object') return null;
    // Normalise items : peut être string JSON, array, objet, null
    let it=q.items;
    if(typeof it==='string'){ try{ it=JSON.parse(it); }catch(_){ it=[]; } }
    if(!Array.isArray(it)) it=[];
    q.items=it.filter(x=>x&&typeof x==='object').map(x=>({
      description:String(x.description||''),
      qty:Number(x.qty)||1,
      unit_price:Number(x.unit_price)||0
    }));
    return q;
  }catch(e){ console.error('[qOpenQuote] parse error',e); return null; } })();
  const [savedQuote, setSavedQuoteState]=useState(_opened);
  function setSavedQuote(q){ setSavedQuoteState(q); }
  const [modal, setModal]=useState(null);
  const [quoteNum, setQuoteNum]=useState(_opened?.number||'');
  const [items, setItems]=useState(()=>{
    const arr=_opened?.items;
    if(Array.isArray(arr)&&arr.length>0) return arr.map(it=>({description:it.description||'',qty:it.qty||1,unit_price:it.unit_price||0}));
    return [{description:'',qty:1,unit_price:0}];
  });
  const [form, setForm]=useState(_opened?{
    company:_opened.company_name||'',
    client_name:_opened.client_name||'',
    client_address:_opened.client_address||'',
    client_email:_opened.client_email||'',
    tva_rate:_opened.tva_rate||20,
    validity_days:_opened.validity_days||30,
    conditions:_opened.conditions||''
  }:{company:'',client_name:'',client_address:'',client_email:'',tva_rate:20,validity_days:30,conditions:''});
  // Nettoyage d'anciens brouillons stockés par d'anciennes versions
  useEffect(()=>{ try{ localStorage.removeItem('qLastQuote'); }catch(_){} },[]);
  const [preview, setPreview]=useState({ht:0,tva:0,ttc:0});
  const [quota, setQuota]=useState(null);
  const [showQuotaConfirm, setShowQuotaConfirm]=useState(false);
  const [activeRelances, setActiveRelances]=useState([]);

  async function loadActiveRelances(quoteId, qNum){
    if(!quoteId||!user) return;
    const plan=user?.plan;
    if(plan!=='pro'&&plan!=='team') return;
    try{
      const d=await api(`/quotes/${quoteId}/relances`);
      const active=(d.relances||[]).filter(r=>r.active&&r.next_send_at&&r.sent_count<r.max_count);
      setActiveRelances(active);
      if(onRelanceUpdate) onRelanceUpdate({relances:active, quoteNum: qNum||''});
    }catch(_){ 
      setActiveRelances([]); 
      if(onRelanceUpdate) onRelanceUpdate({relances:[], quoteNum:''});
    }
  }

  useEffect(()=>{
    if(savedQuote?.id && user){
      loadActiveRelances(savedQuote.id, savedQuote.number||quoteNum);
      const iv=setInterval(()=>loadActiveRelances(savedQuote.id, savedQuote.number||quoteNum),30000);
      return()=>clearInterval(iv);
    }
  },[savedQuote?.id, user?.id]);
  const [pendingAction, setPendingAction]=useState(null);

  useEffect(()=>{
    const ht=items.reduce((s,i)=>s+(parseFloat(i.qty)||0)*(parseFloat(i.unit_price)||0),0);
    setPreview({ht,tva:ht*(form.tva_rate/100),ttc:ht*(1+form.tva_rate/100)});
  },[items,form.tva_rate]);

  useEffect(()=>{
    if(!user) return;
    const refresh=()=>api('/quotes/quota/status').then(setQuota).catch(()=>{});
    refresh();
    // Real-time: poll every 30s when tab is active
    const id=setInterval(()=>{ if(!document.hidden) refresh(); },30000);
    return ()=>clearInterval(id);
  },[user]);

  const setF=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const addLine=()=>setItems(p=>[...p,{description:'',qty:1,unit_price:0}]);
  const removeLine=i=>{ if(items.length>1) setItems(p=>p.filter((_,j)=>j!==i)); };
  const setItem=(i,k,v)=>setItems(p=>p.map((it,j)=>j===i?{...it,[k]:v}:it));
  const isPro=()=>user&&(user.plan==='pro'||user.plan==='team');

  function selectTemplate(id){
    setTemplate(id);
    if(PRO_TPLS.includes(id)&&!isPro()) toast('Aperçu activé — Plan Pro requis pour télécharger','info');
  }

  async function saveQuote(){
    if(!form.company||!form.client_name||items.every(i=>!i.description)){ toast('Remplissez entreprise, client et au moins une prestation','error'); return null; }
    if(!user){ toast('Connectez-vous pour sauvegarder','info'); onShowAuth(); return null; }
    try{
      const data=await api('/quotes','POST',{company_name:form.company,client_name:form.client_name,client_address:form.client_address,client_email:form.client_email,items,tva_rate:parseFloat(form.tva_rate),validity_days:parseInt(form.validity_days),conditions:form.conditions,template_id:template});
      api('/quotes/quota/status').then(setQuota).catch(()=>{});
      return data.quote;
    } catch(e){
      if(e.message?.includes('Limite')||e.message?.includes('upgrade')||e.message?.includes('réservé')||e.message?.includes('payante')){
        onShowUpgrade(e.message);
      }
      toast(e.message,'error'); return null;
    }
  }

  async function handleDownload(){
    if(!form.company&&!form.client_name){ toast('Remplissez au moins votre entreprise et le client','error'); return; }
    if(!user){ toast('Connectez-vous pour télécharger le PDF','info'); onShowAuth(); return; }
    if(PRO_TPLS.includes(template)&&user.plan==='starter'){ onShowUpgrade('Ce template est réservé aux plans Pro et Équipe.'); return; }

    // Show quota warning for starter plan
    if(user.plan==='starter'&&quota&&quota.quotes.remaining!==null&&quota.quotes.remaining<=1&&!savedQuote){
      if(quota.quotes.remaining===0){ onShowUpgrade(`Limite de ${quota.quotes.limit} devis atteinte.`); return; }
      setShowQuotaConfirm(true);
      setPendingAction('download');
      return;
    }
    await doDownload();
  }

  async function doDownload(){
    setSaving(true);
    try{
      let quote=savedQuote;
      if(!quote){ const saved=await saveQuote(); if(!saved){ setSaving(false); return; } quote=saved; setSavedQuote(saved); setQuoteNum(saved.number); }
      // Génération PDF côté frontend pour inclure la signature vendeur
      const quoteData={
        company_name:form.company,
        client_name:form.client_name,
        client_address:form.client_address,
        client_email:form.client_email,
        conditions:form.conditions,
        items,
        tva_rate:parseFloat(form.tva_rate),
        validity_days:parseInt(form.validity_days),
        number:quote.number,
        id:quote.id,
        template_id:template
      };
      const doc=generatePDF(quoteData,user,sigData);
      doc.save((quote.number||'devis')+'.pdf');
      toast('PDF téléchargé ✦');
    } catch(e){ toast(e.message,'error'); }
    setSaving(false);
  }

  async function handleSig(){
    if(!user){ onShowAuth(); return; }
    if(!isPro()){
      try{
        const d=await api('/quotes/quota/status'); setQuota(d);
        if(d.signatures.remaining!==null&&d.signatures.remaining<=0){ onShowUpgrade(`Limite de ${d.signatures.limit} signatures atteinte. Passez au Pro pour des signatures illimitées.`); return; }
      } catch(_){}
    }
    setModal('sig');
  }

  const tpl=ALL_TEMPLATES.find(t=>t.id===template)||ALL_TEMPLATES[0];
  const quotaPercent=quota?((quota.quotes.used/quota.quotes.limit)*100):0;

  return (
    <div style={{maxWidth:1120,margin:'0 auto',padding:'28px 20px'}}>

      {/* Quota banner */}
      {user&&quota&&quota.plan==='starter'&&(
        <div className="card card-gold fade-up" style={{marginBottom:20,padding:'14px 18px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,marginBottom:10}}>
            <div style={{display:'flex',gap:24,flexWrap:'wrap'}}>
              <span style={{fontSize:13,color:quota.quotes.remaining===0?'#ef4444':'#818cf8',fontWeight:500}}>
                Devis : <strong>{quota.quotes.used}/{quota.quotes.limit}</strong>
                {quota.quotes.remaining>0?` · ${quota.quotes.remaining} restant(s)`:' · Limite atteinte'}
              </span>
              <span style={{fontSize:13,color:quota.signatures.remaining===0?'#ef4444':'#818cf8',fontWeight:500}}>
                Signatures : <strong>{quota.signatures.used}/{quota.signatures.limit}</strong>
                {quota.signatures.remaining>0?` · ${quota.signatures.remaining} restante(s)`:' · Limite atteinte'}
              </span>
            </div>
            {(quota.quotes.remaining===0||quota.signatures.remaining===0)&&(
              <button className="btn btn-gold" onClick={()=>onShowUpgrade()} style={{fontSize:12,padding:'6px 14px'}}>✦ Passer au Pro</button>
            )}
          </div>
          <div className="quota-bar">
            <div className={`quota-fill ${quotaPercent>=80?'danger':''}`} style={{width:`${Math.min(100,quotaPercent)}%`}}/>
          </div>
        </div>
      )}

      <div style={{display:'grid',gridTemplateColumns:'1fr 360px',gap:24,alignItems:'start'}} className="col-2">

        {/* LEFT */}
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* Template */}
          <div className="card">
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <div style={{fontWeight:700,fontSize:14,color:'#1e293b',display:'flex',alignItems:'center',gap:8}}>
                Template
                <span className={`badge ${isPro()?'status-accepted':'status-draft'}`} style={{fontSize:10}}>
                  {isPro()?'22 disponibles':'Aperçu · Pro pour DL'}
                </span>
              </div>
              <button className="btn btn-outline" onClick={()=>setModal('gallery')} style={{fontSize:12,padding:'6px 12px'}}>Voir tous ✦</button>
            </div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {ALL_TEMPLATES.slice(0,6).map(t=>(
                <button key={t.id} onClick={()=>selectTemplate(t.id)} className={`tpl-btn ${template===t.id?'active':''}`}>
                  {t.icon} {t.label} {t.pro&&!isPro()&&<span style={{color:'#4f46e5',fontSize:10}}> ✦</span>}
                </button>
              ))}
            </div>
            {tpl&&<div style={{marginTop:10,fontSize:12,color:'#64748b'}}>Sélectionné : <strong style={{color:'#4f46e5'}}>{tpl.label}</strong> · {tpl.sector}</div>}
          </div>

          {/* Info */}
          <div className="card">
            <div style={{fontWeight:700,fontSize:14,color:'#1e293b',marginBottom:16}}>Informations</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}} className="stack-mobile">
              <div style={{gridColumn:'1/-1'}}>
                <label>Votre entreprise *</label>
                <input className="inp" placeholder="Mon Entreprise SARL" value={form.company} onChange={setF('company')} />
              </div>
              <div>
                <label>Nom du client *</label>
                <input className="inp" placeholder="Jean Martin" value={form.client_name} onChange={setF('client_name')} />
              </div>
              <div>
                <label>Email client</label>
                <input className="inp" type="email" placeholder="client@mail.com" value={form.client_email} onChange={setF('client_email')} />
              </div>
              <div style={{gridColumn:'1/-1'}}>
                <label>Adresse client</label>
                <input className="inp" placeholder="12 rue de la Paix, 75001 Paris" value={form.client_address} onChange={setF('client_address')} />
              </div>
              <div>
                <label>TVA</label>
                <select className="sel" value={form.tva_rate} onChange={setF('tva_rate')}>
                  <option value={20}>20% — Normal</option>
                  <option value={10}>10% — Intermédiaire</option>
                  <option value={5.5}>5.5% — Réduit</option>
                  <option value={0}>0% — Exonéré</option>
                </select>
              </div>
              <div>
                <label>Validité</label>
                <select className="sel" value={form.validity_days} onChange={setF('validity_days')}>
                  <option value={15}>15 jours</option>
                  <option value={30}>30 jours</option>
                  <option value={60}>60 jours</option>
                  <option value={90}>90 jours</option>
                </select>
              </div>
            </div>
          </div>

          {/* Items */}
          <div className="card">
            <div style={{fontWeight:700,fontSize:14,color:'#1e293b',marginBottom:14}}>Prestations *</div>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 36px',gap:6}}>
                {['Désignation','Qté','P.U. HT',''].map((h,i)=><div key={i} style={{fontSize:11,fontWeight:600,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em',padding:'0 2px'}}>{h}</div>)}
              </div>
              {items.map((item,i)=>(
                <div key={i} style={{display:'grid',gridTemplateColumns:'1fr 70px 110px 36px',gap:6,alignItems:'center'}}>
                  <input className="inp" placeholder={`Prestation ${i+1}`} value={item.description} onChange={e=>setItem(i,'description',e.target.value)} />
                  <input className="inp" type="number" placeholder="1" min="0" step="0.1" value={item.qty} onChange={e=>setItem(i,'qty',e.target.value)} style={{textAlign:'center'}} />
                  <input className="inp" type="number" placeholder="0.00" min="0" step="0.01" value={item.unit_price} onChange={e=>setItem(i,'unit_price',e.target.value)} style={{textAlign:'right'}} />
                  <button onClick={()=>removeLine(i)} style={{width:36,height:40,border:'1px solid rgba(240,149,149,.25)',borderRadius:8,background:'transparent',color:'#ef4444',cursor:'pointer',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='rgba(240,149,149,.08)'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>×</button>
                </div>
              ))}
              <button className="btn btn-ghost" onClick={addLine} style={{justifyContent:'center',border:'1px dashed rgba(255,255,255,.12)',borderRadius:10,marginTop:4,fontSize:13}}>+ Ajouter une ligne</button>
            </div>
          </div>

          {/* Conditions */}
          <div className="card">
            <label>Conditions & Mentions légales</label>
            <textarea className="ta" placeholder="Acompte de 30% à la commande. Délai d'exécution : 5 jours ouvrés..." value={form.conditions} onChange={setF('conditions')} />
          </div>

          {/* Signature display */}
          {sigData&&(
            <div className="card card-gold" style={{padding:'14px 18px',display:'flex',alignItems:'center',gap:12}}>
              <div style={{width:40,height:28,borderRadius:6,overflow:'hidden',border:'1px solid rgba(79,70,229,.25)',background:'rgba(250,248,242,.9)',flexShrink:0}}>
                <img src={sigData} alt="sig" style={{width:'100%',height:'100%',objectFit:'contain'}} />
              </div>
              <div>
                <div style={{fontWeight:600,color:'#4f46e5',fontSize:13}}>Signature enregistrée ✦</div>
                <div style={{fontSize:12,color:'#64748b'}}>Sera incluse dans le PDF</div>
              </div>
              <button className="btn btn-ghost" onClick={()=>setSigData(null)} style={{marginLeft:'auto',fontSize:12,color:'#ef4444',padding:'4px 8px'}}>Supprimer</button>
            </div>
          )}

          {/* Actions */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <button className="btn btn-gold" onClick={handleDownload} disabled={saving} style={{gridColumn:'1/-1',padding:'14px',fontSize:15}}>
              {saving?<><Spinner/> Génération…</>:'⬇ Télécharger le devis PDF'}
            </button>
            <button className="btn btn-outline" onClick={()=>{ if(!user){onShowAuth();return;} setModal('email'); }}>
              ✉ Envoyer par email
            </button>
            <button className="btn btn-outline" onClick={handleSig}>
              ✦ Signer le devis{!isPro()&&<span style={{fontSize:11,color:'#64748b'}}> · Pro</span>}
            </button>
            <button className="btn btn-outline" onClick={()=>{ if(!isPro()){onShowUpgrade();return;} if(!savedQuote){toast('Téléchargez d\'abord le devis','info');return;} api(`/invoices/from-quote/${savedQuote.id}`,'POST').then(d=>toast(`Facture ${d.invoice.number} créée ✦`)).catch(e=>toast(e.message,'error')); }}>
              ⟳ Convertir en facture
            </button>
            <button className="btn btn-outline" onClick={()=>{ if(!user){onShowAuth();return;} if(!isPro()){onShowUpgrade();return;} setModal('stats'); }}>
              ◈ Statistiques
            </button>
            <button className="btn btn-outline" style={{gridColumn:'1/-1',borderColor:(user?.plan==='team'||user?.plan==='pro')?'rgba(79,70,229,.35)':'rgba(255,255,255,.1)',position:'relative'}} onClick={async ()=>{ if(!user){onShowAuth();return;} if(!savedQuote?.id){ toast('Sauvegarde du devis en cours…','info'); const saved=await saveQuote(); if(!saved) return; setSavedQuote(saved); setQuoteNum(saved.number); } setModal('relance'); }}>
              <span>⟳ Relances automatiques</span>
              {isPro()?(
                <span style={{marginLeft:6,fontSize:11,background:'rgba(79,70,229,.12)',border:'1px solid rgba(79,70,229,.25)',borderRadius:4,padding:'1px 6px',color:'#4f46e5'}}>{user.plan==='team'?'◆ Actif':'✦ Actif'}</span>
              ):(
                <span style={{marginLeft:6,fontSize:11,color:'#64748b'}}> · Plan Équipe</span>
              )}
            </button>
          </div>
        </div>

        {/* RIGHT — Preview (mirrors PDF exactly) */}
        <div style={{position:'sticky',top:80}}>
          <div className="card" style={{padding:0,overflow:'hidden',border:'1px solid rgba(79,70,229,.15)'}}>
            <div style={{background:'#f8fafc',padding:'14px 18px',borderBottom:'1px solid rgba(79,70,229,.12)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div>
                <div style={{fontWeight:700,fontSize:13,color:'#4f46e5'}}>Aperçu du devis</div>
                <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Identique au PDF · Template : {tpl?.label}</div>
              </div>
              <div style={{fontSize:10,color:'#4f46e5',border:'1px solid rgba(79,70,229,.25)',borderRadius:6,padding:'3px 8px'}}>LIVE</div>
            </div>
            <div id="pdfPreview" style={{background:'#f4f4f6',padding:14}}>
              <div style={{background:'#fff',boxShadow:'0 4px 24px rgba(15,15,20,.08)',borderRadius:4,overflow:'hidden'}}>
                <QuoteDocumentHTML
                  quote={{...form, template_id:template, number:quoteNum, created_at:new Date().toISOString()}}
                  user={user}
                  items={items.filter(i=>i.description||i.qty||i.unit_price)}
                  sigData={sigData}
                  scale={0.85}
                />
              </div>
            </div>
          </div>
        </div>

      {modal==='sig'&&<SignatureModal onClose={()=>setModal(null)} onSign={async data=>{setSigData(data);toast('Signature enregistrée ✦');if(user&&user.plan==='starter'){try{const d=await api('/quotes/quota/status');setQuota(d);}catch(_){}}}} />}
      {modal==='email'&&<EmailModal onClose={()=>setModal(null)} quote={savedQuote||{...form,items}} user={user} sigData={sigData} />}
      {modal==='stats'&&<StatsModal onClose={()=>setModal(null)} />}
      {modal==='gallery'&&<TemplateGallery onClose={()=>setModal(null)} onSelect={selectTemplate} current={template} isPro={isPro()} onShowUpgrade={onShowUpgrade} />}
      {modal==='relance'&&<RelanceModal onClose={()=>{ setModal(null); if(savedQuote?.id) setTimeout(()=>loadActiveRelances(savedQuote.id, savedQuote.number||quoteNum), 500); }} quote={savedQuote||{id:null,client_email:form.client_email||'',client_name:form.client_name||''}} user={user} />}

// NOTIFICATION BELL
// ═══════════════════════════════════
function NotificationBell({onOpenQuote}){
  const [open, setOpen] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [unread, setUnread] = useState(0);
  const [loading, setLoading] = useState(false);
  const ref = useRef(null);

  const fetchCount = useCallback(async()=>{
    try {
      const r = await api('/notifications/unread-count');
      setUnread(r.count||0);
    } catch(e){}
  },[]);

  const fetchAll = useCallback(async()=>{
    setLoading(true);
    try {
      const r = await api('/notifications');
      setNotifs(r.notifications||[]);
      setUnread(r.unread_count||0);
    } catch(e){}
    setLoading(false);
  },[]);

  // Polling du compteur toutes les 30s
  useEffect(()=>{
    fetchCount();
    const id = setInterval(fetchCount, 30000);
    return ()=>clearInterval(id);
  },[fetchCount]);

  // Fermer au clic extérieur
  useEffect(()=>{
    if(!open) return;
    const h=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[open]);

  const toggle = ()=>{
    const next=!open;
    setOpen(next);
    if(next) fetchAll();
  };

  const markRead = async(id)=>{
    try {
      await api(`/notifications/${id}/read`,'PUT');
      setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
      setUnread(u=>Math.max(0,u-1));
    } catch(e){}
  };

  const markAllRead = async()=>{
    try {
      await api('/notifications/read-all','PUT');
      setNotifs(p=>p.map(n=>({...n,read:true})));
      setUnread(0);
    } catch(e){}
  };

  const deleteOne = async(id,e)=>{
    e.stopPropagation();
    try {
      await api(`/notifications/${id}`,'DELETE');
      setNotifs(p=>p.filter(n=>n.id!==id));
    } catch(e){}
  };

  const clearAll = async()=>{
    if(!confirm('Supprimer toutes les notifications ?')) return;
    try {
      await api('/notifications','DELETE');
      setNotifs([]);
      setUnread(0);
    } catch(e){}
  };

  const handleClick = (n)=>{
    if(!n.read) markRead(n.id);
    // Ouvre le devis associé si possible
    if(n.type==='quote_signed' && n.data?.quote_id && onOpenQuote){
      onOpenQuote(n.data.quote_id);
      setOpen(false);
    }
  };

  const iconFor = (type)=>{
    if(type==='quote_signed') return '✍️';
    if(type==='quote_sent')   return '📧';
    if(type==='invoice_paid') return '💰';
    return '🔔';
  };

  const timeAgo = (iso)=>{
    const diff = (Date.now()-new Date(iso).getTime())/1000;
    if(diff<60) return 'à l\'instant';
    if(diff<3600) return `il y a ${Math.floor(diff/60)} min`;
    if(diff<86400) return `il y a ${Math.floor(diff/3600)} h`;
    return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  };

  return (
    <div ref={ref} style={{position:'relative'}}>
      <button onClick={toggle} title="Notifications" aria-label="Notifications" style={{
        position:'relative',width:38,height:38,borderRadius:'50%',border:'1px solid #e2e8f0',
        background:open?'#eef2ff':'#fff',cursor:'pointer',display:'flex',alignItems:'center',
        justifyContent:'center',fontSize:17,transition:'all .2s'
      }}>
        🔔
        {unread>0 && (
          <span style={{
            position:'absolute',top:-3,right:-3,minWidth:18,height:18,padding:'0 5px',
            borderRadius:99,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:800,
            display:'flex',alignItems:'center',justifyContent:'center',
            border:'2px solid #fff',boxShadow:'0 2px 6px rgba(239,68,68,.45)'
          }}>{unread>99?'99+':unread}</span>
        )}
      </button>

      {open && (
        <div className="scale-in" style={{
          position:'absolute',right:0,top:46,width:360,maxWidth:'calc(100vw - 24px)',
          background:'#fff',border:'1px solid #e2e8f0',borderRadius:14,
          boxShadow:'0 20px 50px -10px rgba(15,23,42,.25)',zIndex:1000,overflow:'hidden'
        }}>
          <div style={{padding:'14px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontWeight:700,fontSize:14,color:'#0f172a'}}>Notifications {unread>0&&<span style={{color:'#ef4444'}}>({unread})</span>}</div>
            <div style={{display:'flex',gap:10}}>
              {unread>0 && <button onClick={markAllRead} style={{background:'none',border:'none',color:'#4f46e5',fontSize:11,fontWeight:600,cursor:'pointer'}}>Tout marquer lu</button>}
              {notifs.length>0 && <button onClick={clearAll} style={{background:'none',border:'none',color:'#94a3b8',fontSize:11,fontWeight:600,cursor:'pointer'}}>Tout effacer</button>}
            </div>
          </div>
          <div style={{maxHeight:420,overflowY:'auto'}}>
            {loading ? (
              <div style={{padding:'30px 16px',textAlign:'center',color:'#94a3b8',fontSize:13}}><Spinner/> Chargement…</div>
            ) : notifs.length===0 ? (
              <div style={{padding:'40px 16px',textAlign:'center',color:'#94a3b8',fontSize:13}}>
                <div style={{fontSize:32,marginBottom:8,opacity:.4}}>🔕</div>
                Aucune notification
              </div>
            ) : notifs.map(n=>(
              <div key={n.id} onClick={()=>handleClick(n)} style={{
                padding:'12px 16px',borderBottom:'1px solid #f8fafc',cursor:'pointer',
                background:n.read?'#fff':'#eef2ff',display:'flex',gap:11,alignItems:'flex-start',
                transition:'background .15s'
              }} onMouseEnter={e=>e.currentTarget.style.background=n.read?'#f8fafc':'#e0e7ff'}
                 onMouseLeave={e=>e.currentTarget.style.background=n.read?'#fff':'#eef2ff'}>
                <div style={{fontSize:20,flexShrink:0,lineHeight:1}}>{iconFor(n.type)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#0f172a'}}>{n.title}</div>
                    {!n.read && <span style={{width:7,height:7,borderRadius:'50%',background:'#4f46e5',flexShrink:0}}/>}
                  </div>
                  {n.message && <div style={{fontSize:12,color:'#475569',marginTop:3,lineHeight:1.4}}>{n.message}</div>}
                  <div style={{fontSize:10,color:'#94a3b8',marginTop:5,fontWeight:600}}>{timeAgo(n.created_at)}</div>
                </div>
                <button onClick={(e)=>deleteOne(n.id,e)} title="Supprimer" style={{
                  background:'none',border:'none',color:'#cbd5e1',cursor:'pointer',fontSize:14,
                  padding:2,flexShrink:0,lineHeight:1
                }} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'}
                   onMouseLeave={e=>e.currentTarget.style.color='#cbd5e1'}>✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function NavTimer({nextSendAt}){
  const [cd,setCd]=React.useState('');
  React.useEffect(()=>{
    if(!nextSendAt) return;
    const tick=()=>{
      const diff=new Date(nextSendAt)-new Date();
      if(diff<=0){ setCd('Envoi...'); return; }
      const h=Math.floor(diff/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      setCd(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[nextSendAt]);
  return <span style={{fontFamily:'monospace',fontSize:13,fontWeight:700,color:'#4f46e5'}}>{cd||'...'}</span>;
}

// SIGN PAGE (client)
// ═══════════════════════════════════
function SignPage({token}) {
  const [quote, setQuote]=useState(null);
  const [loading, setLoading]=useState(true);
  const [error, setError]=useState(null);
  const [signed, setSigned]=useState(false);
  const [signerName, setSignerName]=useState('');
  const [sigData, setSigData]=useState(null);
  const canvasRef=React.useRef(null);
  const [drawing, setDrawing]=useState(false);
  const [hasSig, setHasSig]=useState(false);
  const [signing, setSigning]=useState(false);
  const [refused, setRefused]=useState(false);
  const [refusing, setRefusing]=useState(false);
  const [refuseReason, setRefuseReason]=useState('');

  useEffect(()=>{
    fetch(`${API}/sign/${token}`)
      .then(r=>r.json())
      .then(d=>{ if(d.error){ setError(d.error); } else { setQuote(d.quote||d); } setLoading(false); })
      .catch(()=>{ setError('Erreur de connexion.'); setLoading(false); });
  },[token]);

  // Get coords scaled to canvas internal resolution (fixes offset on responsive canvas)
  function getPos(e){
    const c=canvasRef.current; const r=c.getBoundingClientRect();
    const sx=c.width/r.width, sy=c.height/r.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return { x:(cx-r.left)*sx, y:(cy-r.top)*sy };
  }
  function startDraw(e){
    e.preventDefault();
    setDrawing(true);
    const p=getPos(e);
    const ctx=canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  }
  function draw(e){
    if(!drawing) return;
    e.preventDefault();
    const p=getPos(e);
    const ctx=canvasRef.current.getContext('2d');
    ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    setHasSig(true);
  }
  function endDraw(){ setDrawing(false); }
  function clearSig(){ const c=canvasRef.current; c.getContext('2d').clearRect(0,0,c.width,c.height); setHasSig(false); }

  async function submitSign(){
    if(signing||refusing) return;
    if(!hasSig){ alert('Veuillez signer dans le cadre'); return; }
    const data=canvasRef.current.toDataURL('image/png');
    setSigData(data);
    setSigning(true);
    try{
      const res=await fetch(`${API}/sign/${token}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signature_data:data,signer_name:signerName})});
      const d=await res.json().catch(()=>({}));
      const err=(d.error||'').toString();
      if(!res.ok||d.error){
        const lo=err.toLowerCase();
        if(res.status===409){
          // Le devis est déjà finalisé côté serveur : afficher le bon écran final
          if(lo.includes('refus')){ setQuote(q=>q?{...q,status:'refused'}:q); setRefused(true); return; }
          if(lo.includes('sign')){ setSigned(true); return; }
        }
        alert(err||'Erreur serveur.'); setSigning(false); return;
      }
      setQuote(q=>q?{...q,status:'accepted',signed_at:d.signed_at||new Date().toISOString(),signer_name:signerName}:q);
      setSigned(true);
    }catch(_){ alert('Erreur de connexion.'); setSigning(false); }
  }

  async function submitRefuse(){
    if(refusing||signing) return;
    if(!confirm('Êtes-vous sûr de vouloir refuser ce devis ? Cette action est définitive.')) return;
    setRefusing(true);
    try{
      const res=await fetch(`${API}/sign/${token}/refuse`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:refuseReason,signer_name:signerName})});
      const d=await res.json().catch(()=>({}));
      const err=(d.error||'').toString();
      if(!res.ok||d.error){
        const lo=err.toLowerCase();
        if(res.status===409){
          // Le devis est déjà finalisé côté serveur : afficher le bon écran final
          if(lo.includes('sign')){ setQuote(q=>q?{...q,status:'accepted'}:q); setSigned(true); return; }
          if(lo.includes('refus')){ setRefused(true); return; }
        }
        alert(err||'Erreur serveur.'); setRefusing(false); return;
      }
      setQuote(q=>q?{...q,status:'refused',refused_at:d.refused_at||new Date().toISOString(),refused_reason:refuseReason}:q);
      setRefused(true);
    }catch(_){ alert('Erreur de connexion.'); setRefusing(false); }
  }

  if(loading) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'Inter,sans-serif',color:'#64748b'}},'Chargement...');
  if(error) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'Inter,sans-serif',gap:12}},
    React.createElement('div',{style:{fontSize:48}},'⚠️'),
    React.createElement('h2',{style:{color:'#ef4444',margin:0}},error),
    React.createElement('p',{style:{color:'#64748b'}},'Ce lien est invalide ou a expiré.')
  );
  if(!quote) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'Inter,sans-serif',color:'#64748b'}},'Devis introuvable.');

  // Normalisation ULTRA défensive des items pour éviter toute page blanche
  let items=[];
  try{
    let raw=quote.items;
    if(typeof raw==='string'){ try{ raw=JSON.parse(raw); }catch(_){ raw=[]; } }
    if(!Array.isArray(raw)) raw=[];
    items=raw.filter(x=>x&&typeof x==='object').map(x=>({
      description:String(x.description||x.desc||x.name||x.label||''),
      qty:Number(x.qty!=null?x.qty:(x.quantity!=null?x.quantity:1))||0,
      unit_price:Number(x.unit_price!=null?x.unit_price:(x.price!=null?x.price:(x.unitPrice!=null?x.unitPrice:0)))||0
    }));
  }catch(e){ console.error('[SignPage] items parse error',e); items=[]; }
  const ht=items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.unit_price)||0),0);
  const tvaRate=Number(quote.tva_rate)||20;
  const tva=ht*tvaRate/100;
  const ttc=ht+tva;
  const fmt=n=>(Number(n)||0).toFixed(2).replace('.',',')+'€';

  if(signed) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'Inter,sans-serif',gap:16,padding:24,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:64}},'✅'),
    React.createElement('h2',{style:{color:'#10b981',margin:0,fontSize:24}},'Devis signé !'),
    React.createElement('p',{style:{color:'#64748b',maxWidth:400}},'Merci '+(signerName||quote.client_name||'à vous')+'. Le devis '+quote.number+' a bien été signé. '+quote.company_name+' a été notifié.')
  );

  if(refused) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'Inter,sans-serif',gap:16,padding:24,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:64}},'✋'),
    React.createElement('h2',{style:{color:'#ef4444',margin:0,fontSize:24}},'Devis refusé'),
    React.createElement('p',{style:{color:'#64748b',maxWidth:400}},'Le devis '+quote.number+' a été refusé. '+quote.company_name+' a été notifié.')
  );

  const alreadySigned=quote.status==='accepted';
  const alreadyRefused=quote.status==='refused';
  const locked=alreadySigned||alreadyRefused;

  return React.createElement('div',{style:{fontFamily:'Inter,sans-serif',minHeight:'100vh',background:'#f8fafc',padding:'24px 16px'}},
    React.createElement('div',{style:{maxWidth:600,margin:'0 auto'}},
      React.createElement('div',{style:{background:'#4f46e5',color:'white',borderRadius:'12px 12px 0 0',padding:'20px 24px',textAlign:'center'}},
        React.createElement('h1',{style:{margin:0,fontSize:22,fontWeight:700}},'Quotly'),
        React.createElement('p',{style:{margin:'4px 0 0',opacity:.8,fontSize:14}},'Devis pro en 60 secondes')
      ),
      React.createElement('div',{style:{background:'white',borderRadius:'0 0 12px 12px',padding:24,boxShadow:'0 4px 24px rgba(0,0,0,.08)'}},
        React.createElement('h2',{style:{margin:'0 0 4px',fontSize:20,color:'#1e293b'}},'Devis '+quote.number),
        React.createElement('p',{style:{margin:'0 0 20px',color:'#64748b',fontSize:14}},quote.company_name+' vous a envoyé un devis'),
        alreadySigned
          ? React.createElement('div',{style:{background:'#d1fae5',color:'#065f46',padding:'12px 16px',borderRadius:8,textAlign:'center',fontWeight:600,marginBottom:20}},'✅ Ce devis a déjà été signé.')
          : null,
        alreadyRefused
          ? React.createElement('div',{style:{background:'#fef2f2',color:'#991b1b',padding:'12px 16px',borderRadius:8,textAlign:'center',fontWeight:600,marginBottom:20}},'✋ Ce devis a été refusé.')
          : null,
        React.createElement('div',{style:{background:'#f4f4f6',borderRadius:10,padding:10,marginBottom:20}},
          React.createElement('div',{style:{background:'#fff',borderRadius:6,boxShadow:'0 4px 16px rgba(15,15,20,.06)',overflow:'hidden'}},
            React.createElement(QuoteDocumentHTML,{quote:quote,user:{name:quote.company_name,email:quote.company_email},items:items,sigData:null,scale:0.78})
          )
        ),
        !locked&&React.createElement('div',null,
          React.createElement('div',{style:{marginBottom:12}},
            React.createElement('label',{style:{display:'block',fontSize:13,color:'#64748b',marginBottom:6,fontWeight:500}},'Votre nom'),
            React.createElement('input',{style:{width:'100%',padding:'10px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:14,boxSizing:'border-box'},placeholder:'Prénom Nom',value:signerName,onChange:e=>setSignerName(e.target.value)})
          ),
          React.createElement('label',{style:{display:'block',fontSize:13,color:'#64748b',marginBottom:6,fontWeight:500}},'Votre signature'),
          React.createElement('canvas',{ref:canvasRef,width:540,height:140,style:{border:'2px dashed #c7d2fe',borderRadius:8,width:'100%',touchAction:'none',cursor:'crosshair',background:'white'},
            onMouseDown:startDraw,onMouseMove:draw,onMouseUp:endDraw,onMouseLeave:endDraw,
            onTouchStart:startDraw,onTouchMove:draw,onTouchEnd:endDraw}),
          React.createElement('button',{onClick:clearSig,style:{fontSize:12,color:'#64748b',background:'none',border:'none',cursor:'pointer',marginTop:4,padding:0}},'Effacer'),
          React.createElement('button',{onClick:submitSign,disabled:!hasSig||signing,style:{display:'block',width:'100%',marginTop:16,padding:'14px',background:hasSig&&!signing?'#4f46e5':'#e2e8f0',color:hasSig&&!signing?'white':'#94a3b8',border:'none',borderRadius:8,fontSize:16,fontWeight:700,cursor:hasSig&&!signing?'pointer':'not-allowed'}},
            signing?'Signature en cours…':'✍️ Signer et accepter le devis'
          ),
          React.createElement('div',{style:{marginTop:24,paddingTop:20,borderTop:'1px solid #e2e8f0'}},
            React.createElement('p',{style:{margin:'0 0 8px',fontSize:13,color:'#64748b',fontWeight:500}},'Vous ne souhaitez pas accepter ce devis ?'),
            React.createElement('textarea',{value:refuseReason,onChange:e=>setRefuseReason(e.target.value),placeholder:'Motif du refus (facultatif)',rows:2,style:{width:'100%',padding:'10px 12px',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,boxSizing:'border-box',resize:'vertical',fontFamily:'inherit',marginBottom:8}}),
            React.createElement('button',{onClick:submitRefuse,disabled:refusing,style:{display:'block',width:'100%',padding:'12px',background:'white',color:'#ef4444',border:'1.5px solid #fecaca',borderRadius:8,fontSize:14,fontWeight:600,cursor:refusing?'wait':'pointer'}},
              refusing?'Envoi…':'✋ Refuser ce devis'
            )
          )
        )
      )
    )
  );
}

// ═══════════════════════════════════
// APP ROOT
// ═══════════════════════════════════
function App() {
  const [user, setUser]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('qUser')||'null'); } catch{ return null; } });
  const [page, setPage]=useState('landing');
  const [authModal, setAuthModal]=useState(null);
  const [upgradeModal, setUpgradeModal]=useState(false);
  const [upgradeReason, setUpgradeReason]=useState('');
  const [teamModal, setTeamModal]=useState(false);
  const [signToken, setSignToken]=useState(null);
  const [navRelance, setNavRelance]=useState({relances:[],quoteNum:''});
  const [openedQuoteKey, setOpenedQuoteKey]=useState(0);

  useEffect(()=>{
    // Détection URL /sign/:token
    const path=window.location.pathname;
    const match=path.match(/\/sign\/([a-zA-Z0-9_-]+)/);
    if(match){ setSignToken(match[1]); return; }
    const token=localStorage.getItem('qToken');
    if(token){ api('/auth/me').then(d=>{ setUser(d.user); localStorage.setItem('qUser',JSON.stringify(d.user));
      // Charger la relance active la plus récente pour le timer navbar
      api('/quotes').then(qs=>{
        const quotes=(qs.quotes||qs||[]);
        const checks=quotes.slice(0,10).map(q=>api(`/quotes/${q.id}/relances`).then(r=>{
          const active=(r.relances||[]).filter(rel=>rel.active&&rel.next_send_at&&rel.sent_count<rel.max_count);
          if(active.length>0) return {relances:active,quoteNum:q.number||q.id};
          return null;
        }).catch(()=>null));
        Promise.all(checks).then(results=>{
          const found=results.find(r=>r!==null);
          if(found) setNavRelance(found);
        });
      }).catch(()=>{});
    }).catch(()=>{ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); }); }
    // URL reset token flow removed — now uses email code
  },[]);

  function handleLogin(u){ setUser(u); }
  function handleLogout(){ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); setPage('landing'); toast('Déconnecté','info'); }
  function showAuth(tab='login'){ setAuthModal(tab); }
  function showUpgrade(reason=''){ setUpgradeReason(reason||''); setUpgradeModal(true); }

  return (
    <>
      <Toasts />
      {signToken ? <SignPage token={signToken} /> : (
      <>
      <Nav user={user} page={page} onPage={setPage} onShowAuth={showAuth} onLogout={handleLogout} onShowTeam={()=>setTeamModal(true)} navRelance={navRelance} onOpenQuote={async (qid)=>{
        try {
          toast('Chargement du devis…','info');
          const qs=await api('/quotes');
          const list=(qs.quotes||qs||[]);
          const found=list.find(q=>String(q.id)===String(qid));
          if(!found){ toast('Devis introuvable','error'); return; }
          // Normaliser items (peut être string JSON)
          if(typeof found.items==='string'){ try{ found.items=JSON.parse(found.items); }catch(_){ found.items=[]; } }
          localStorage.setItem('qOpenQuote',JSON.stringify(found));
          setOpenedQuoteKey(k=>k+1); // force QuoteForm remount -> consomme qOpenQuote
          setPage('app');
          toast('Devis signé ouvert ✦','success');
        } catch(e){
          toast('Impossible de charger le devis','error');
        }
      }} />

      <div style={{paddingTop:page==='landing'?0:64}}>
        {page==='landing'&&<Landing onShowAuth={showAuth} onGoApp={()=>{ if(!user){showAuth('register');}else{setPage('app');} }} user={user} />}
        {page==='app'&&(
          <div>
            <div style={{background:'#f8fafc',borderBottom:'1px solid #e2e8f0',padding:'20px 24px'}}>
              <div style={{maxWidth:1120,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                <div>
                  <h1 style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'Inter,sans-serif',color:'#1e293b',letterSpacing:'.02em'}}>
                    Nouveau devis
                  </h1>
                  <p style={{margin:'4px 0 0',fontSize:13,color:'#64748b'}}>
                    {user?`${user.name} · Plan ${PLANS[user.plan]||user.plan}`:'Connectez-vous pour sauvegarder et accéder à toutes les fonctionnalités'}
                  </p>
                </div>
                {!user&&(
                  <button className="btn btn-gold" onClick={()=>showAuth('login')}>Connexion / Inscription →</button>
                )}
              </div>
            </div>
            <QuoteErrorBoundary key={openedQuoteKey}><QuoteForm user={user} onShowUpgrade={showUpgrade} onShowAuth={()=>showAuth('login')} onRelanceUpdate={setNavRelance} /></QuoteErrorBoundary>
          </div>
        )}
      </div>

      {authModal&&<AuthModal onClose={()=>setAuthModal(null)} onLogin={handleLogin} defaultTab={authModal} />}
      {upgradeModal&&<UpgradeModal onClose={()=>setUpgradeModal(false)} user={user} reason={upgradeReason} />}
      {teamModal&&user?.plan==='team'&&<TeamModal onClose={()=>setTeamModal(false)} user={user} />}
    </>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
