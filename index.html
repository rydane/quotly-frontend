function SignPage({token}) {
  const [quote, setQuote]=useState(null);
  const [loading, setLoading]=useState(true);
  const [error, setError]=useState(null);
  const [signed, setSigned]=useState(false);
  const [signerName, setSignerName]=useState('');
  const [sigData, setSigData]=useState(null);
  const canvasRef=React.useRef(null);
  const [drawing, setDrawing]=useState(false);
  const [hasSig, setHasSig]=useState(false);
  const [signing, setSigning]=useState(false);
  const [refused, setRefused]=useState(false);
  const [refusing, setRefusing]=useState(false);
  const [refuseReason, setRefuseReason]=useState('');

  useEffect(()=>{
    fetch(`${API}/sign/${token}`)
      .then(r=>r.json())
      .then(d=>{ if(d.error){ setError(d.error); } else { setQuote(d.quote||d); } setLoading(false); })
      .catch(()=>{ setError('Erreur de connexion.'); setLoading(false); });
  },[token]);

  // Get coords scaled to canvas internal resolution (fixes offset on responsive canvas)
  function getPos(e){
    const c=canvasRef.current; const r=c.getBoundingClientRect();
    const sx=c.width/r.width, sy=c.height/r.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return { x:(cx-r.left)*sx, y:(cy-r.top)*sy };
  }
  function startDraw(e){
    e.preventDefault();
    setDrawing(true);
    const p=getPos(e);
    const ctx=canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  }
  function draw(e){
    if(!drawing) return;
    e.preventDefault();
    const p=getPos(e);
    const ctx=canvasRef.current.getContext('2d');
    ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    setHasSig(true);
  }
  function endDraw(){ setDrawing(false); }
  function clearSig(){ const c=canvasRef.current; c.getContext('2d').clearRect(0,0,c.width,c.height); setHasSig(false); }

  async function submitSign(){
    if(signing||refusing) return;
    if(!hasSig){ alert('Veuillez signer dans le cadre'); return; }
    const data=canvasRef.current.toDataURL('image/png');
    setSigData(data);
    setSigning(true);
    try{
      const res=await fetch(`${API}/sign/${token}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signature_data:data,signer_name:signerName})});
      const d=await res.json().catch(()=>({}));
      const err=(d.error||'').toString();
      if(!res.ok||d.error){
        const lo=err.toLowerCase();
        if(res.status===409){
          // Le devis est déjà finalisé côté serveur : afficher le bon écran final
          if(lo.includes('refus')){ setQuote(q=>q?{...q,status:'refused'}:q); setRefused(true); return; }
          if(lo.includes('sign')){ setSigned(true); return; }
        }
        alert(err||'Erreur serveur.'); setSigning(false); return;
      }
      setQuote(q=>q?{...q,status:'accepted',signed_at:d.signed_at||new Date().toISOString(),signer_name:signerName}:q);
      setSigned(true);
    }catch(_){ alert('Erreur de connexion.'); setSigning(false); }
  }

  async function submitRefuse(){
    if(refusing||signing) return;
    if(!confirm('Êtes-vous sûr de vouloir refuser ce devis ? Cette action est définitive.')) return;
    setRefusing(true);
    try{
      const res=await fetch(`${API}/sign/${token}/refuse`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:refuseReason,signer_name:signerName})});
      const d=await res.json().catch(()=>({}));
      const err=(d.error||'').toString();
      if(!res.ok||d.error){
        const lo=err.toLowerCase();
        if(res.status===409){
          // Le devis est déjà finalisé côté serveur : afficher le bon écran final
          if(lo.includes('sign')){ setQuote(q=>q?{...q,status:'accepted'}:q); setSigned(true); return; }
          if(lo.includes('refus')){ setRefused(true); return; }
        }
        alert(err||'Erreur serveur.'); setRefusing(false); return;
      }
      setQuote(q=>q?{...q,status:'refused',refused_at:d.refused_at||new Date().toISOString(),refused_reason:refuseReason}:q);
      setRefused(true);
    }catch(_){ alert('Erreur de connexion.'); setRefusing(false); }
  }

  if(loading) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'DM Sans,sans-serif',color:'#7a7065'}},'Chargement...');
  if(error) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'DM Sans,sans-serif',gap:12}},
    React.createElement('div',{style:{fontSize:48}},'⚠️'),
    React.createElement('h2',{style:{color:'#dc4a3a',margin:0}},error),
    React.createElement('p',{style:{color:'#7a7065'}},'Ce lien est invalide ou a expiré.')
  );
  if(!quote) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'DM Sans,sans-serif',color:'#7a7065'}},'Devis introuvable.');

  // Normalisation ULTRA défensive des items pour éviter toute page blanche
  let items=[];
  try{
    let raw=quote.items;
    if(typeof raw==='string'){ try{ raw=JSON.parse(raw); }catch(_){ raw=[]; } }
    if(!Array.isArray(raw)) raw=[];
    items=raw.filter(x=>x&&typeof x==='object').map(x=>({
      description:String(x.description||x.desc||x.name||x.label||''),
      qty:Number(x.qty!=null?x.qty:(x.quantity!=null?x.quantity:1))||0,
      unit_price:Number(x.unit_price!=null?x.unit_price:(x.price!=null?x.price:(x.unitPrice!=null?x.unitPrice:0)))||0
    }));
  }catch(e){ console.error('[SignPage] items parse error',e); items=[]; }
  const ht=items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.unit_price)||0),0);
  const tvaRate=Number(quote.tva_rate)||20;
  const tva=ht*tvaRate/100;
  const ttc=ht+tva;
  const fmt=n=>(Number(n)||0).toFixed(2).replace('.',',')+'€';

  if(signed) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'DM Sans,sans-serif',gap:16,padding:24,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:64}},'✅'),
    React.createElement('h2',{style:{color:'#10b981',margin:0,fontSize:24}},'Devis signé !'),
    React.createElement('p',{style:{color:'#7a7065',maxWidth:400}},'Merci '+(signerName||quote.client_name||'à vous')+'. Le devis '+quote.number+' a bien été signé. '+quote.company_name+' a été notifié.')
  );

  if(refused) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'DM Sans,sans-serif',gap:16,padding:24,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48,color:'#dc4a3a'}},'!'),
    React.createElement('h2',{style:{color:'#dc4a3a',margin:0,fontSize:24}},'Devis refusé'),
    React.createElement('p',{style:{color:'#7a7065',maxWidth:400}},'Le devis '+quote.number+' a été refusé. '+quote.company_name+' a été notifié.')
  );

  const alreadySigned=quote.status==='accepted';
  const alreadyRefused=quote.status==='refused';
  const locked=alreadySigned||alreadyRefused;

  return React.createElement('div',{style:{fontFamily:'DM Sans,sans-serif',minHeight:'100vh',background:'#f5f4f1',padding:'24px 16px'}},
    React.createElement('div',{style:{maxWidth:600,margin:'0 auto'}},
      React.createElement('div',{style:{background:'#16775a',color:'white',borderRadius:'12px 12px 0 0',padding:'20px 24px',textAlign:'center'}},
        React.createElement('h1',{style:{margin:0,fontSize:22,fontWeight:700}},'DEFACT'),
        React.createElement('p',{style:{margin:'4px 0 0',opacity:.8,fontSize:14}},'Devis pro en 60 secondes')
      ),
      React.createElement('div',{style:{background:'white',borderRadius:'0 0 12px 12px',padding:24,boxShadow:'0 4px 24px rgba(0,0,0,.08)'}},
        React.createElement('h2',{style:{margin:'0 0 4px',fontSize:20,color:'#1a1916'}},'Devis '+quote.number),
        React.createElement('p',{style:{margin:'0 0 20px',color:'#7a7065',fontSize:14}},quote.company_name+' vous a envoyé un devis'),
        alreadySigned
          ? React.createElement('div',{style:{background:'#d1fae5',color:'#065f46',padding:'12px 16px',borderRadius:8,textAlign:'center',fontWeight:600,marginBottom:20}},'✅ Ce devis a déjà été signé.')
          : null,
        alreadyRefused
          ? React.createElement('div',{style:{background:'#fef2f2',color:'#991b1b',padding:'12px 16px',borderRadius:8,textAlign:'center',fontWeight:600,marginBottom:20}},'Ce devis a été refusé.')
          : null,
        React.createElement('div',{style:{background:'#f5f4f1',borderRadius:8,padding:16,marginBottom:20}},
          items.length===0
            ? React.createElement('div',{style:{padding:'6px 0',fontSize:13,color:'#a89e92',fontStyle:'italic'}},'(aucune ligne détaillée)')
            : items.map((it,i)=>React.createElement('div',{key:i,style:{display:'flex',justifyContent:'space-between',gap:12,padding:'6px 0',borderBottom:i<items.length-1?'1px solid #e8e3dc':'none',fontSize:14}},
              React.createElement('span',{style:{color:'#1a1916',flex:1}},it.description||'(sans description)'),
              React.createElement('span',{style:{color:'#7a7065',whiteSpace:'nowrap'}},it.qty+' × '+fmt(it.unit_price))
            )),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'8px 0 0',fontSize:13,color:'#7a7065',marginTop:items.length===0?0:8,borderTop:items.length===0?'none':'1px dashed #e2e8f0'}},
            React.createElement('span',null,'Total HT'),
            React.createElement('span',null,fmt(ht))
          ),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13,color:'#7a7065'}},
            React.createElement('span',null,'TVA ('+tvaRate+'%)'),
            React.createElement('span',null,fmt(tva))
          ),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'10px 0 0',fontWeight:700,fontSize:16,borderTop:'2px solid #e2e8f0',marginTop:6}},
            React.createElement('span',null,'Total TTC'),
            React.createElement('span',{style:{color:'#16775a'}},fmt(ttc))
          )
        ),
        !locked&&React.createElement('div',null,
          React.createElement('div',{style:{marginBottom:12}},
            React.createElement('label',{style:{display:'block',fontSize:13,color:'#7a7065',marginBottom:6,fontWeight:500}},'Votre nom'),
            React.createElement('input',{style:{width:'100%',padding:'10px 12px',border:'1px solid #e8e3dc',borderRadius:8,fontSize:14,boxSizing:'border-box'},placeholder:'Prénom Nom',value:signerName,onChange:e=>setSignerName(e.target.value)})
          ),
          React.createElement('label',{style:{display:'block',fontSize:13,color:'#7a7065',marginBottom:6,fontWeight:500}},'Votre signature'),
          React.createElement('canvas',{ref:canvasRef,width:540,height:140,style:{border:'2px dashed #b8ddd1',borderRadius:8,width:'100%',touchAction:'none',cursor:'crosshair',background:'white'},
            onMouseDown:startDraw,onMouseMove:draw,onMouseUp:endDraw,onMouseLeave:endDraw,
            onTouchStart:startDraw,onTouchMove:draw,onTouchEnd:endDraw}),
          React.createElement('button',{onClick:clearSig,style:{fontSize:12,color:'#7a7065',background:'none',border:'none',cursor:'pointer',marginTop:4,padding:0}},'Effacer'),
          React.createElement('button',{onClick:submitSign,disabled:!hasSig||signing,style:{display:'block',width:'100%',marginTop:16,padding:'14px',background:hasSig&&!signing?'#16775a':'#e2e8f0',color:hasSig&&!signing?'white':'#94a3b8',border:'none',borderRadius:8,fontSize:16,fontWeight:700,cursor:hasSig&&!signing?'pointer':'not-allowed'}},
            signing?'Signature en cours…':'✍️ Signer et accepter le devis'
          ),
          React.createElement('div',{style:{marginTop:24,paddingTop:20,borderTop:'1px solid #e8e3dc'}},
            React.createElement('p',{style:{margin:'0 0 8px',fontSize:13,color:'#7a7065',fontWeight:500}},'Vous ne souhaitez pas accepter ce devis ?'),
            React.createElement('textarea',{value:refuseReason,onChange:e=>setRefuseReason(e.target.value),placeholder:'Motif du refus (facultatif)',rows:2,style:{width:'100%',padding:'10px 12px',border:'1px solid #e8e3dc',borderRadius:8,fontSize:13,boxSizing:'border-box',resize:'vertical',fontFamily:'inherit',marginBottom:8}}),
            React.createElement('button',{onClick:submitRefuse,disabled:refusing,style:{display:'block',width:'100%',padding:'12px',background:'white',color:'#dc4a3a',border:'1.5px solid #fecaca',borderRadius:8,fontSize:14,fontWeight:600,cursor:refusing?'wait':'pointer'}},
              refusing?'Envoi…':'Refuser ce devis'
            )
          )
        )
      )
    )
  );
}

// ═══════════════════════════════════
// APP ROOT
// ═══════════════════════════════════
// ═══════════════════════════════════
// MODULE CLIENTS (CRM)
// ═══════════════════════════════════
// Centralise les contacts clients : nom, entreprise, email, téléphone, notes,
// historique des devis/factures, prochaine relance prévue.
// Les routes backend correspondantes sont dans /api/clients (voir backend/routes/clients.js)
function ClientsPage({user, onShowUpgrade, onCreateQuote}) {
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [editing, setEditing] = useState(null);   // null | {} (création) | {id, ...} (édition)
  const [detailId, setDetailId] = useState(null); // affichage du détail d'un client
  const [tag, setTag] = useState('all');           // filtre tag : 'all' | 'lead' | 'active' | 'archived'

  const fetchClients = useCallback(async () => {
    if (!user) return;
    setLoading(true);
    try {
      const r = await api('/clients');
      setClients(r.clients || []);
    } catch(e) {
      toast(e.message || 'Erreur de chargement', 'error');
    } finally {
      setLoading(false);
    }
  }, [user]);

  useEffect(() => { fetchClients(); }, [fetchClients]);

  const isPaid = user && user.plan !== 'starter';
  if (!user) {
    return <div style={{padding:'80px 24px',textAlign:'center',maxWidth:520,margin:'0 auto'}}>
      <h2 style={{fontSize:24,fontWeight:700,color:'#1a1916'}}>Connectez-vous pour accéder au CRM</h2>
      <p style={{color:'#7a7065',marginTop:12}}>Le module Clients vous permet de centraliser tous vos contacts et leurs devis.</p>
    </div>;
  }
  if (!isPaid) {
    return <div style={{padding:'80px 24px',textAlign:'center',maxWidth:520,margin:'0 auto'}}>
      <h2 style={{fontSize:24,fontWeight:700,color:'#1a1916'}}>📇 Module Clients (CRM)</h2>
      <p style={{color:'#7a7065',marginTop:12,marginBottom:24}}>Le CRM est inclus dans les plans Pro et Équipe. Centralisez tous vos clients, suivez leur historique de devis et factures, planifiez des relances.</p>
      <button className="btn btn-gold" onClick={()=>onShowUpgrade('Le module Clients (CRM) nécessite un plan Pro ou Équipe.')}>Passer au Pro →</button>
    </div>;
  }

  const filtered = clients.filter(c => {
    if (tag !== 'all' && c.tag !== tag) return false;
    if (search) {
      const s = search.toLowerCase();
      return (c.name||'').toLowerCase().includes(s)
          || (c.company||'').toLowerCase().includes(s)
          || (c.email||'').toLowerCase().includes(s);
    }
    return true;
  });

  if (detailId) {
    const c = clients.find(x => x.id === detailId);
    if (c) return <ClientDetail client={c} onBack={()=>setDetailId(null)} onEdit={()=>{ setEditing(c); setDetailId(null); }} onCreateQuote={onCreateQuote} onChange={fetchClients} />;
  }

  return (
    <div style={{maxWidth:1100,margin:'0 auto',padding:'24px'}}>
      <BackButton onClick={() => window.history.back()} style={{ marginBottom: 16 }} />
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{margin:0,fontSize:24,fontWeight:700,fontFamily:'DM Sans,sans-serif',color:'#1a1916'}}>📇 Mes clients</h1>
          <p style={{margin:'4px 0 0',fontSize:13,color:'#7a7065'}}>{clients.length} contact{clients.length>1?'s':''} · {clients.filter(c=>c.tag==='active').length} actifs</p>
        </div>
        <button className="btn btn-gold" onClick={()=>setEditing({})}>+ Nouveau client</button>
      </div>

      {/* Filtres */}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:20,alignItems:'center'}}>
        <input className="inp" placeholder="Rechercher (nom, entreprise, email)…" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:'1 1 240px',maxWidth:380}} />
        {[
          {key:'all',label:'Tous'},
          {key:'lead',label:'Prospects'},
          {key:'active',label:'Actifs'},
          {key:'archived',label:'Archivés'},
        ].map(t => (
          <button key={t.key} onClick={()=>setTag(t.key)} className={`btn ${tag===t.key?'btn-gold':'btn-outline'}`} style={{padding:'8px 14px',fontSize:12}}>{t.label}</button>
        ))}
      </div>

      {loading ? <div style={{padding:60,textAlign:'center'}}><Spinner /></div> : (
        filtered.length === 0 ? (
          <div className="card" style={{textAlign:'center',padding:60}}>
            <div style={{fontSize:42,marginBottom:12}}>📇</div>
            <div style={{fontSize:16,fontWeight:600,color:'#1a1916',marginBottom:8}}>{clients.length===0?'Aucun client pour le moment':'Aucun résultat'}</div>
            <div style={{fontSize:13,color:'#7a7065',marginBottom:20}}>{clients.length===0?'Ajoutez votre premier client pour commencer à centraliser votre activité commerciale.':'Essayez d\'ajuster vos filtres.'}</div>
            {clients.length===0 && <button className="btn btn-gold" onClick={()=>setEditing({})}>+ Ajouter un client</button>}
          </div>
        ) : (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14}}>
            {filtered.map(c => <ClientCard key={c.id} client={c} onClick={()=>setDetailId(c.id)} />)}
          </div>
        )
      )}

      {editing && <ClientEditModal client={editing} onClose={()=>setEditing(null)} onSaved={()=>{ setEditing(null); fetchClients(); }} />}
    </div>
  );
}

function ClientCard({client, onClick}) {
  const tagColors = {lead:'#f5da8a', active:'#b8ddd1', archived:'#cbd5e1'};
  const tagLabels = {lead:'Prospect', active:'Actif', archived:'Archivé'};
  const initials = (client.name||client.company||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  return (
    <div className="card card-hover" onClick={onClick} style={{cursor:'pointer',padding:18}}>
      <div style={{display:'flex',gap:12,alignItems:'flex-start'}}>
        <div style={{width:42,height:42,borderRadius:10,background:'linear-gradient(135deg,#16775a,#0f9e70)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:14,flexShrink:0}}>{initials}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
            <div style={{fontWeight:700,color:'#1a1916',fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}>{client.name||client.company||'Sans nom'}</div>
            {client.tag&&<span style={{fontSize:10,padding:'2px 7px',borderRadius:99,background:tagColors[client.tag]||'#e0dbd4',color:'#1a1916',fontWeight:700,whiteSpace:'nowrap'}}>{tagLabels[client.tag]||client.tag}</span>}
          </div>
          {client.company && client.name && <div style={{fontSize:12,color:'#7a7065',marginBottom:4}}>{client.company}</div>}
          {client.email && <div style={{fontSize:12,color:'#7a7065',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>✉ {client.email}</div>}
          {client.phone && <div style={{fontSize:12,color:'#7a7065',marginTop:2}}>{client.phone}</div>}
          <div style={{display:'flex',gap:12,marginTop:10,fontSize:11,color:'#7a7065'}}>
            <span>{client.quotes_count||0} devis</span>
            <span>{client.invoices_count||0} factures</span>
            {client.total_revenue>0 && <span style={{color:'#16775a',fontWeight:700}}>{fmtMoney(client.total_revenue)}</span>}
          </div>
        </div>
      </div>
    </div>
  );
}

function ClientEditModal({client, onClose, onSaved}) {
  const isNew = !client.id;
  const [form, setForm] = useState({
    name: client.name||'',
    company: client.company||'',
    email: client.email||'',
    phone: client.phone||'',
    address: client.address||'',
    siret: client.siret||'',
    tva: client.tva||'',
    tag: client.tag||'lead',
    notes: client.notes||'',
  });
  const [saving, setSaving] = useState(false);
  async function save() {
    if (!form.name && !form.company) { toast('Indiquez au moins un nom ou une entreprise', 'error'); return; }
    setSaving(true);
    try {
      if (isNew) {
        await api('/clients', 'POST', form);
        toast('Client créé ✦', 'success');
      } else {
        await api(`/clients/${client.id}`, 'PUT', form);
        toast('Client mis à jour', 'success');
      }
      onSaved();
    } catch(e) {
      toast(e.message || 'Erreur', 'error');
    } finally {
      setSaving(false);
    }
  }
  return (
    <div className="modal-backdrop" onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div className="card scale-in" onClick={e=>e.stopPropagation()} style={{maxWidth:560,width:'100%',maxHeight:'90vh',overflowY:'auto',padding:28}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <h2 style={{margin:0,fontSize:20,fontWeight:700,fontFamily:'DM Sans,sans-serif',color:'#1a1916'}}>{isNew?'Nouveau client':'Modifier le client'}</h2>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:'6px 10px',fontSize:18}}>×</button>
        </div>
        <div style={{display:'grid',gap:14}}>
          <div className="col-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Nom</label><input className="inp" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Jean Dupont" /></div>
            <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Entreprise</label><input className="inp" value={form.company} onChange={e=>setForm({...form,company:e.target.value})} placeholder="Acme Corp" /></div>
          </div>
          <div className="col-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Email</label><input type="email" className="inp" value={form.email} onChange={e=>setForm({...form,email:e.target.value})} placeholder="contact@acme.fr" /></div>
            <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Téléphone</label><input className="inp" value={form.phone} onChange={e=>setForm({...form,phone:e.target.value})} placeholder="06 12 34 56 78" /></div>
          </div>
          <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Adresse</label><input className="inp" value={form.address} onChange={e=>setForm({...form,address:e.target.value})} placeholder="12 rue de la Paix, 75001 Paris" /></div>
          <div className="col-2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>SIRET</label><input className="inp" value={form.siret} onChange={e=>setForm({...form,siret:e.target.value})} placeholder="123 456 789 00012" /></div>
            <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>N° TVA</label><input className="inp" value={form.tva} onChange={e=>setForm({...form,tva:e.target.value})} placeholder="FR12345678901" /></div>
          </div>
          <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Statut</label>
            <select className="sel" value={form.tag} onChange={e=>setForm({...form,tag:e.target.value})}>
              <option value="lead">Prospect</option>
              <option value="active">Client actif</option>
              <option value="archived">Archivé</option>
            </select>
          </div>
          <div><label style={{fontSize:12,color:'#7a7065',fontWeight:600,display:'block',marginBottom:4}}>Notes (privées)</label><textarea className="ta" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Préfère être contacté le matin, attentif au prix, projet en juillet…" /></div>
        </div>
        <div style={{display:'flex',gap:10,marginTop:24,justifyContent:'flex-end'}}>
          <button className="btn btn-ghost" onClick={onClose} disabled={saving}>Annuler</button>
          <button className="btn btn-gold" onClick={save} disabled={saving}>{saving?<Spinner light/>:isNew?'Créer':'Enregistrer'}</button>
        </div>
      </div>
    </div>
  );
}

function ClientDetail({client, onBack, onEdit, onCreateQuote, onChange}) {
  const [history, setHistory] = useState({quotes:[], invoices:[]});
  const [loading, setLoading] = useState(true);
  useEffect(()=>{
    setLoading(true);
    api(`/clients/${client.id}/history`).then(r=>{
      setHistory({quotes: r.quotes||[], invoices: r.invoices||[]});
    }).catch(e=>toast(e.message||'Erreur','error')).finally(()=>setLoading(false));
  },[client.id]);

  async function archive() {
    if (!confirm('Archiver ce client ? Il restera consultable dans le filtre "Archivés".')) return;
    try {
      await api(`/clients/${client.id}`, 'PUT', {tag:'archived'});
      toast('Client archivé', 'success');
      onChange();
      onBack();
    } catch(e) { toast(e.message||'Erreur', 'error'); }
  }
  async function remove() {
    if (!confirm('Supprimer DÉFINITIVEMENT ce client ? Les devis et factures associés ne seront PAS supprimés mais perdront leur lien.')) return;
    try {
      await api(`/clients/${client.id}`, 'DELETE');
      toast('Client supprimé', 'success');
      onChange();
      onBack();
    } catch(e) { toast(e.message||'Erreur', 'error'); }
  }

  return (
    <div style={{maxWidth:900,margin:'0 auto',padding:'24px'}}>
      <button onClick={onBack} className="btn btn-ghost" style={{padding:'6px 10px',fontSize:13,marginBottom:16}}>← Retour à la liste</button>

      <div className="card" style={{padding:28,marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:14,flexWrap:'wrap'}}>

            <h1 style={{margin:0,fontSize:24,fontWeight:700,fontFamily:'DM Sans,sans-serif',color:'#1a1916'}}>{client.name||client.company||'Sans nom'}</h1>

            <div style={{display:'flex',gap:14,marginTop:14,flexWrap:'wrap',fontSize:13,color:'#3d3830'}}>
              {client.email && <div>✉ <a href={`mailto:${client.email}`} style={{color:'#16775a'}}>{client.email}</a></div>}
              {client.phone && <div>{client.phone}</div>}
              {client.siret && <div>SIRET : {client.siret}</div>}
            </div>
            {client.address && <div style={{fontSize:13,color:'#7a7065',marginTop:8}}>{client.address}</div>}
          </div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-gold" onClick={()=>onCreateQuote(client)}>+ Nouveau devis</button>

          <div style={{marginTop:20,padding:14,background:'#fef9e7',borderRadius:10,border:'1px solid #f5da8a',fontSize:13.5,color:'#6b5e1a',lineHeight:1.6,whiteSpace:'pre-wrap'}}>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:12,marginBottom:24}}>
        {[
          {label:'Devis',value:history.quotes.length, icon:''},
          {label:'Factures',value:history.invoices.length, icon:'🧾'},
          {label:'CA total',value:fmtMoney((history.invoices||[]).reduce((s,i)=>s+(Number(i.total_ttc)||0),0)), icon:''},

// Affiche le bandeau RGPD au premier accès. Stocke le choix en localStorage.
// Les cookies "essentiels" (auth, session) sont déposés sans consentement (autorisé).
// Les cookies "analytics" / "pub" doivent attendre le clic sur "Accepter".
// ⚠️  Ce composant ne CHARGE pas réellement les scripts analytics — il ne fait que
// gérer le consentement. Quand tu ajouteras Plausible/PostHog/Google Analytics,
// vérifie window.__defactCookies?.analytics avant d'injecter le script.
function CookieBanner() {
  const [show, setShow] = useState(false);
  useEffect(()=>{
    const stored = localStorage.getItem('defactCookies');
    if (!stored) setShow(true);
    else {
      try { window.__defactCookies = JSON.parse(stored); } catch(_) {}
    }
  },[]);
  function save(prefs) {
    const data = {...prefs, ts: Date.now()};
    localStorage.setItem('defactCookies', JSON.stringify(data));
    window.__defactCookies = data;
    setShow(false);
  }
  if (!show) return null;
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:99998,background:'#1a1916',color:'#fff',padding:'18px 20px',boxShadow:'0 -4px 24px rgba(0,0,0,.2)',fontFamily:'DM Sans,sans-serif'}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',gap:20,alignItems:'center',justifyContent:'space-between',flexWrap:'wrap'}}>
        <div style={{flex:'1 1 380px',minWidth:280}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Vos préférences cookies</div>
          <div style={{fontSize:13,color:'#c5beb3',lineHeight:1.6}}>
            On utilise des cookies <strong>essentiels</strong> pour vous connecter (obligatoires) et, si vous l'acceptez, des cookies <strong>statistiques anonymes</strong> pour améliorer le produit. Aucune publicité, jamais.{' '}
            <a href="#cookies" onClick={(e)=>{e.preventDefault();window.location.hash='#cookies';}} style={{color:'#7fc4af',textDecoration:'underline'}}>En savoir plus</a>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={()=>save({essential:true,analytics:false})} style={{padding:'10px 18px',background:'transparent',color:'#fff',border:'1.5px solid #c5beb3',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Refuser (sauf essentiels)</button>
          <button onClick={()=>save({essential:true,analytics:true})} style={{padding:'10px 22px',background:'linear-gradient(135deg,#16775a,#0f9e70)',color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer',fontFamily:'DM Sans,sans-serif'}}>Tout accepter</button>
        </div>
      </div>
    </div>
  );
}

// GLOBAL ERROR BOUNDARY — pour ne JAMAIS avoir de page blanche
// ═══════════════════════════════════
class GlobalErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null,info:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err, info){
    console.error('[DEFACT crash]', err);
    console.error('[DEFACT stack]', info?.componentStack);
    this.setState({info});
  }
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{maxWidth:680,margin:'60px auto',padding:30,background:'#fff',border:'1px solid #fecaca',borderRadius:14,fontFamily:'DM Sans,sans-serif',boxShadow:'0 4px 24px rgba(0,0,0,.08)'}},
        React.createElement('div',{style:{fontSize:42,marginBottom:14}},'⚠️'),
        React.createElement('h2',{style:{margin:'0 0 12px',color:'#b91c1c',fontSize:22}},'Une erreur s\'est produite'),
        React.createElement('div',{style:{padding:14,background:'#fef2f2',borderRadius:8,fontFamily:'monospace',fontSize:13,color:'#991b1b',marginBottom:16,wordBreak:'break-word'}},String(this.state.err?.message||this.state.err)),
        React.createElement('p',{style:{color:'#7a7065',fontSize:13,lineHeight:1.7}},'Détails complets dans la console (F12). Si l\'erreur persiste, partagez-la avec le support.'),
        React.createElement('div',{style:{display:'flex',gap:10,marginTop:20}},
          React.createElement('button',{onClick:()=>{ try{localStorage.clear();}catch(_){}; location.reload(); },style:{padding:'10px 18px',background:'#16775a',color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer'}},'Réinitialiser et recharger'),
          React.createElement('button',{onClick:()=>location.reload(),style:{padding:'10px 18px',background:'transparent',color:'#1a1916',border:'1.5px solid #e0dbd4',borderRadius:8,fontWeight:600,cursor:'pointer'}},'Recharger seulement')
        )
      );
    }
    return this.props.children;
  }
}

function App() {
  const [user, setUser]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('qUser')||'null'); } catch{ return null; } });
  const [page, setPage]=useState('landing');
  const [legalPage, setLegalPage]=useState(null); // 'mentions' | 'cgu' | 'cgv' | 'privacy' | 'cookies' | null
  const [authModal, setAuthModal]=useState(null);
  const [upgradeModal, setUpgradeModal]=useState(false);
  const [upgradeReason, setUpgradeReason]=useState('');
  const [teamModal, setTeamModal]=useState(false);
  const [signToken, setSignToken]=useState(null);
  const [navRelance, setNavRelance]=useState({relances:[],quoteNum:''});
  const [openedQuoteKey, setOpenedQuoteKey]=useState(0);
  const [prefilledClient, setPrefilledClient]=useState(null); // pour pré-remplir un devis depuis le CRM

  useEffect(()=>{
    // Détection URL /sign/:token
    const path=window.location.pathname;
    const match=path.match(/\/sign\/([a-zA-Z0-9_-]+)/);
    if(match){ setSignToken(match[1]); return; }
    // Détection hash #cookies, #mentions, #cgu, #cgv, #privacy
    const hash = window.location.hash.replace('#','');
    if (['mentions','cgu','cgv','privacy','cookies'].includes(hash)) {
      setLegalPage(hash);
    }
    const token=localStorage.getItem('qToken');
    if(token){ api('/auth/me').then(d=>{ setUser(d.user); localStorage.setItem('qUser',JSON.stringify(d.user));
      // Charger la relance active la plus récente pour le timer navbar
      api('/quotes').then(qs=>{
        const quotes=(qs.quotes||qs||[]);
        const checks=quotes.slice(0,10).map(q=>api(`/quotes/${q.id}/relances`).then(r=>{
          const active=(r.relances||[]).filter(rel=>rel.active&&rel.next_send_at&&rel.sent_count<rel.max_count);
          if(active.length>0) return {relances:active,quoteNum:q.number||q.id};
          return null;
        }).catch(()=>null));
        Promise.all(checks).then(results=>{
          const found=results.find(r=>r!==null);
          if(found) setNavRelance(found);
        });
      }).catch(()=>{});
    }).catch(()=>{ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); }); }
    // URL reset token flow removed — now uses email code
  },[]);

  function handleLogin(u){ setUser(u); }
  function handleLogout(){ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); setPage('landing'); toast('Déconnecté','info'); }
  function showAuth(tab='login'){ setAuthModal(tab); }
  function showUpgrade(reason=''){ setUpgradeReason(reason||''); setUpgradeModal(true); }
  function showLegal(key){ setLegalPage(key); window.scrollTo(0,0); }
  function createQuoteFromClient(client){
    setPrefilledClient(client);
    setPage('app');
    setOpenedQuoteKey(k=>k+1);
  }

  return (
    <>
      <Toasts />
      <CookieBanner />
      {signToken ? <SignPage token={signToken} /> : legalPage ? (
        <>
          <Nav user={user} page={page} onPage={(p)=>{setLegalPage(null);setPage(p);}} onShowAuth={showAuth} onLogout={handleLogout} onShowTeam={()=>setTeamModal(true)} navRelance={navRelance} onOpenQuote={()=>{}} />
          <div style={{paddingTop:64}}>
            <LegalPage pageKey={legalPage} onBack={()=>setLegalPage(null)} />
          </div>
        </>
      ) : (
      <>
      <Nav user={user} page={page} onPage={setPage} onShowAuth={showAuth} onLogout={handleLogout} onShowTeam={()=>setTeamModal(true)} navRelance={navRelance} onOpenQuote={async (qid)=>{
        try {
          toast('Chargement du devis…','info');
          const qs=await api('/quotes');
          const list=(qs.quotes||qs||[]);
          const found=list.find(q=>String(q.id)===String(qid));
          if(!found){ toast('Devis introuvable','error'); return; }
          // Normaliser items (peut être string JSON)
          if(typeof found.items==='string'){ try{ found.items=JSON.parse(found.items); }catch(_){ found.items=[]; } }
          localStorage.setItem('qOpenQuote',JSON.stringify(found));
          setOpenedQuoteKey(k=>k+1); // force QuoteForm remount -> consomme qOpenQuote
          setPage('app');
          toast('Devis signé ouvert ✦','success');
        } catch(e){
          toast('Impossible de charger le devis','error');
        }
      }} />

      <div style={{paddingTop:page==='landing'?0:64}}>
        {page==='landing'&&<Landing onShowAuth={showAuth} onGoApp={()=>{ if(!user){showAuth('register');}else{setPage('app');} }} user={user} onShowLegal={showLegal} />}
        {page==='invoices'&&<InvoicesPage user={user} onShowUpgrade={showUpgrade} onGoQuotes={()=>setPage('app')} />}
        {page==='clients'&&<ClientsPage user={user} onShowUpgrade={showUpgrade} onCreateQuote={createQuoteFromClient} />}
        {page==='dashboard'&&<DashboardPage user={user} onShowUpgrade={showUpgrade} onGoApp={()=>setPage('app')} onGoInvoices={()=>setPage('invoices')} onGoClients={()=>setPage('clients')} />}
        {page==='app'&&(
          <div style={{overflow:'hidden',width:'100%',maxWidth:'100vw'}}>
            <div style={{background:'#fff',borderBottom:'1px solid #e8e3dc',padding:'16px',overflow:'hidden'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,width:'100%',boxSizing:'border-box'}}>
                <div style={{minWidth:0,flex:1}}>
                  <BackButton onClick={() => setPage('landing')} style={{ marginBottom: 8 }} />
                  <h1 style={{margin:0,fontSize:22,fontWeight:700,fontFamily:'DM Sans,sans-serif',color:'#1a1916',letterSpacing:'.02em'}}>
                    Nouveau devis
                  </h1>
                  <p style={{margin:'4px 0 0',fontSize:13,color:'#7a7065',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {user?`${user.name} · Plan ${PLANS[user.plan]||user.plan}`:'Connectez-vous pour sauvegarder'}
                  </p>
                </div>
                {!user&&(
                  <button className="btn btn-gold" onClick={()=>showAuth('login')} style={{flexShrink:0,fontSize:13,padding:'9px 14px'}}>Connexion →</button>
                )}
              </div>
            </div>
            <QuoteErrorBoundary key={openedQuoteKey}><QuoteForm user={user} onShowUpgrade={showUpgrade} onShowAuth={()=>showAuth('login')} onRelanceUpdate={setNavRelance} onGoInvoices={()=>setPage('invoices')} prefilledClient={prefilledClient} onPrefilledConsumed={()=>setPrefilledClient(null)} /></QuoteErrorBoundary>
          </div>
        )}
      </div>

      {authModal&&<AuthModal onClose={()=>setAuthModal(null)} onLogin={handleLogin} defaultTab={authModal} />}
      {upgradeModal&&<UpgradeModal onClose={()=>setUpgradeModal(false)} user={user} reason={upgradeReason} />}
      {teamModal&&user?.plan==='team'&&<TeamModal onClose={()=>setTeamModal(false)} user={user} />}
    </>
      )}
    </>
  );
}

// Retire le loader HTML dès que React monte
const _root = document.getElementById('root');
const _loader = document.getElementById('defact-loader');
if (_loader) _loader.remove();

ReactDOM.createRoot(_root).render(
  React.createElement(GlobalErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
