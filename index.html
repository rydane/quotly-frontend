                <span style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{width:8,height:8,borderRadius:'50%',background:row.color,display:'inline-block',flexShrink:0}} />
                  <span style={{fontSize:13,color:'#4b5563',fontWeight:500}}>{row.label}</span>
                </span>
                <span style={{fontSize:14,fontWeight:700,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif",whiteSpace:'nowrap'}}>{row.value}</span>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ── Second Row: Bar Chart + Top Clients + Quick Actions ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 280px',gap:16,marginBottom:20}} className="col-3">

        {/* Activity Bar Chart */}
        <div style={{borderRadius:12,border:'1px solid #e8eaed',background:'#fff',overflow:'hidden'}}>
          <div style={{padding:'18px 20px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontWeight:600,fontSize:15,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Activité devis</div>
            <div style={{display:'flex',gap:12,alignItems:'center'}}>
              <span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#6b7280'}}><span style={{width:8,height:8,borderRadius:2,background:'#16775a',display:'inline-block'}}/> Acceptés</span>
              <span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#6b7280'}}><span style={{width:8,height:8,borderRadius:2,background:'#f59e0b',display:'inline-block'}}/> En attente</span>
              <span style={{display:'flex',alignItems:'center',gap:4,fontSize:11,color:'#6b7280'}}><span style={{width:8,height:8,borderRadius:2,background:'#ef4444',display:'inline-block'}}/> Refusés</span>
            </div>
          </div>
          <div style={{padding:'4px 20px 6px'}}>
            <span style={{fontSize:20,fontWeight:700,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:'-.02em'}}>{barData.reduce((s,d)=>s+d.accepted+d.pending+d.refused,0)}</span>
            <span style={{fontSize:12,color:'#9ca3af',marginLeft:6}}>devis · 5 semaines</span>
          </div>
          <div style={{padding:'8px 8px 14px'}} onMouseLeave={()=>setBarHover(-1)}>
            <svg viewBox={'0 0 '+barW+' '+barH} style={{width:'100%',height:'auto',display:'block'}} preserveAspectRatio="xMinYMin meet">
              {[0,0.25,0.5,0.75,1].map((pct,i)=>{
                const y=barPadT+barUsableH-pct*barUsableH;
                return <g key={i}><line x1={barPadL} y1={y} x2={barW-barPadR} y2={y} stroke="#f0f0f0" strokeWidth="1"/>
                  <text x={barPadL-6} y={y+4} textAnchor="end" fill="#9ca3af" fontSize="11" fontFamily="Plus Jakarta Sans">{Math.round(barMaxVal*pct)}</text></g>;
              })}
              {barData.map((d,i)=>{
                const total = d.accepted+d.pending+d.refused;
                const cx = barPadL + (i+0.5)*barGroupW;
                const bw = barGroupW*0.45;
                const totalH = (total/barMaxVal)*barUsableH;
                const baseY = barPadT+barUsableH;
                const isHov = barHover===i;
                const aH = total>0 ? (d.accepted/total)*totalH : 0;
                const pH = total>0 ? (d.pending/total)*totalH : 0;
                const rH = total>0 ? (d.refused/total)*totalH : 0;
                const barRadius = Math.min(bw/3, 8);
                return (
                  <g key={i} onMouseEnter={()=>setBarHover(i)} style={{cursor:'pointer'}}>
                    <rect x={cx-barGroupW/2} y={0} width={barGroupW} height={barH} fill="transparent"/>
                    {isHov&&<rect x={cx-barGroupW/2+2} y={barPadT} width={barGroupW-4} height={barUsableH} rx="6" fill="#f8fafc" opacity=".6"/>}
                    {total>0&&(
                      <g>
                        <clipPath id={'barClip'+i}><rect x={cx-bw/2} y={baseY-totalH} width={bw} height={totalH} rx={barRadius}/></clipPath>
                        <g clipPath={'url(#barClip'+i+')'}>
                          {rH>0&&<rect x={cx-bw/2} y={baseY-totalH} width={bw} height={rH} fill="#ef4444" opacity={isHov?1:.75}/>}
                          {pH>0&&<rect x={cx-bw/2} y={baseY-totalH+rH} width={bw} height={pH} fill="#f59e0b" opacity={isHov?1:.75}/>}
                          {aH>0&&<rect x={cx-bw/2} y={baseY-aH} width={bw} height={aH} fill="#16775a" opacity={isHov?1:.85}/>}
                        </g>
                      </g>
                    )}
                    <text x={cx} y={barH-6} textAnchor="middle" fill={isHov?'#1a1a1a':'#9ca3af'} fontSize="12" fontWeight={isHov?'600':'400'} fontFamily="Plus Jakarta Sans">{d.label}</text>
                    {isHov&&total>0&&(<>
                      <rect x={cx-50} y={Math.max(2, baseY-totalH-36)} width="100" height="30" rx="6" fill="#1a1a1a"/>
                      <text x={cx} y={Math.max(2, baseY-totalH-36)+13} textAnchor="middle" fill="#fff" fontSize="11" fontWeight="600" fontFamily="Plus Jakarta Sans">{total} devis</text>
                      <text x={cx} y={Math.max(2, baseY-totalH-36)+25} textAnchor="middle" fill="#9ca3af" fontSize="9" fontFamily="Plus Jakarta Sans">{d.accepted}✓ · {d.pending}⏳ · {d.refused}✕</text>
                    </>)}
                  </g>
                );
              })}
            </svg>
          </div>
        </div>

        {/* Top Clients */}
        <div style={{borderRadius:12,border:'1px solid #e8eaed',background:'#fff',padding:'20px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:15,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Top clients</div>
            <button onClick={onGoClients} style={{padding:'5px 12px',borderRadius:7,border:'1px solid #e8eaed',background:'#fff',fontSize:11,fontWeight:600,color:'#6b7280',cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'all .15s'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#3b82f6';e.currentTarget.style.color='#3b82f6';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8eaed';e.currentTarget.style.color='#6b7280';}}>
              Voir tout
            </button>
          </div>
          {topClients.length===0 ? (
            <div style={{textAlign:'center',padding:'24px 0'}}>
              <p style={{color:'#9ca3af',fontSize:13,margin:0}}>Aucun client</p>
              <button onClick={onGoClients} style={{marginTop:10,padding:'7px 16px',borderRadius:8,border:'1px solid #e8eaed',background:'#fff',fontSize:12,fontWeight:600,color:'#3b82f6',cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Ajouter</button>
            </div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:2}}>
              {topClients.map((cl,i)=>{
                const rev = parseFloat(cl.total_revenue)||0;
                const initials = ((cl.name||cl.company||'?')[0]||'?').toUpperCase();
                const colors = ['#16775a','#3b82f6','#f59e0b','#ec4899','#8b5cf6'];
                return (
                  <div key={cl.id||i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:8,transition:'background .12s'}}
                    onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
                    onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                    <div style={{width:12,fontSize:11,fontWeight:600,color:'#cbd5e1',textAlign:'center'}}>{i+1}</div>
                    <div style={{width:30,height:30,borderRadius:'50%',background:colors[i%5],display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700,flexShrink:0}}>{initials}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:13,color:'#1a1a1a',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cl.name||cl.company||'—'}</div>
                      <div style={{fontSize:11,color:'#9ca3af'}}>{cl.quotes_count||0} devis · {cl.invoices_count||0} factures</div>
                    </div>
                    <div style={{fontWeight:600,fontSize:13,color:'#1a1a1a',flexShrink:0}}>{fmtMoney(rev)}</div>
                  </div>
                );
              })}
            </div>
          )}
        </div>

        {/* Quick Actions */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:11,fontWeight:600,color:'#9ca3af',textTransform:'uppercase',letterSpacing:'.06em',padding:'0 2px'}}>Actions rapides</div>
          {[
            {label:'Créer un devis',desc:'Nouveau document',color:'#16775a',bg:'#f0faf6',action:onGoApp,
              icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></>},
            {label:'Gérer les clients',desc:'Module CRM',color:'#3b82f6',bg:'#eff6ff',action:onGoClients,
              icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>},
            {label:'Voir les factures',desc:'Facturation',color:'#f59e0b',bg:'#fffbeb',action:onGoInvoices,
              icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></>},
          ].map((act,idx)=>(
            <button key={idx} onClick={act.action} style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',borderRadius:10,border:'1px solid #e8eaed',background:'#fff',cursor:'pointer',transition:'all .2s',textAlign:'left',fontFamily:"'Plus Jakarta Sans',sans-serif",width:'100%'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#3b82f6';e.currentTarget.style.transform='translateY(-1px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#e8eaed';e.currentTarget.style.transform='none';}}>
              <div style={{width:34,height:34,borderRadius:8,background:act.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={act.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{act.icon}</svg>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,color:'#1a1a1a',fontSize:13}}>{act.label}</div>
                <div style={{fontSize:11,color:'#9ca3af',marginTop:1}}>{act.desc}</div>
              </div>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d="M9 18l6-6-6-6"/></svg>
            </button>
          ))}
        </div>
      </div>

      {/* ── Activité récente — Accordion fluide ── */}
      <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#fff',overflow:'hidden',transition:'border-color .25s ease'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#dcf2ea';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';}}>
            <button onClick={()=>setRecentOpen(o=>!o)} style={{
              width:'100%',display:'flex',alignItems:'center',gap:12,padding:'16px 20px',
              background:'transparent',border:'none',cursor:'pointer',textAlign:'left',
              fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'background .15s ease',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#f0faf6,#dcf2ea)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              </div>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:'#0f0e0c'}}>Activité récente</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:1}}>{recentQuotes.length} activité{recentQuotes.length>1?'s':''} • Cliquez pour {recentOpen?'réduire':'afficher'}</div>
              </div>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,transition:'transform .3s cubic-bezier(.4,0,.2,1)',transform:recentOpen?'rotate(180deg)':'rotate(0deg)'}}><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div style={{
              maxHeight:recentOpen?Math.max(recentQuotes.length*60+80,200)+'px':'0',
              opacity:recentOpen?1:0,
              overflow:'hidden',
              transition:'max-height .45s cubic-bezier(.4,0,.2,1), opacity .3s ease',
              borderTop:recentOpen?'1px solid #f1f5f9':'1px solid transparent',
            }}>
              {recentQuotes.length===0 ? (
                <div style={{padding:'32px 24px',textAlign:'center'}}>
                  <div style={{width:48,height:48,borderRadius:12,background:'#f8fafc',display:'inline-flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                  </div>
                  <p style={{color:'#94a3b8',fontSize:13,margin:0,fontWeight:500}}>Aucune activité pour le moment</p>
                  <button onClick={onGoApp} style={{marginTop:12,padding:'8px 20px',borderRadius:8,border:'1px solid #16775a',background:'#fff',color:'#16775a',fontWeight:600,fontSize:12,cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'all .15s'}}>Créer un devis</button>
                </div>
              ) : (
                <div style={{padding:'4px 0'}}>
                  {recentQuotes.slice(0,8).map((q,i)=>{
                    const sc = statusConfig[q.status]||statusConfig.draft;
                    const ttc = parseFloat(q.totalTTC)||0;
                    const dateStr = fmtDate(q.created_at);
                    const actionLabel = q.status==='accepted'?'Devis accepté':q.status==='sent'?'Devis envoyé':q.status==='refused'?'Devis refusé':q.status==='draft'?'Brouillon créé':'Devis mis à jour';
                    return (
                      <div key={q.id||i} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 20px',transition:'background .12s ease',cursor:'default',borderBottom:i<Math.min(recentQuotes.length,8)-1?'1px solid #f8f9fb':'none'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                        <div style={{width:8,height:8,borderRadius:'50%',background:sc.color,flexShrink:0,opacity:.85}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span style={{fontWeight:600,fontSize:13,color:'#0f0e0c'}}>{actionLabel}</span>
                            <span style={{fontSize:11,color:'#94a3b8',fontWeight:500}}>#{q.number||'—'}</span>
                          </div>
                          <div style={{fontSize:12,color:'#64748b',marginTop:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{q.client_name||'Client inconnu'} • {fmtMoney(ttc)}</div>
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                          <div style={{fontSize:11,color:'#94a3b8',fontWeight:500}}>{dateStr}</div>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{padding:'12px 20px',borderTop:'1px solid #f1f5f9',textAlign:'center'}}>
                    <span onClick={onGoApp} style={{fontSize:12,fontWeight:600,color:'#16775a',cursor:'pointer',transition:'opacity .15s'}}
                      onMouseEnter={e=>e.currentTarget.style.opacity='.7'}
                      onMouseLeave={e=>e.currentTarget.style.opacity='1'}>Voir tous les devis →</span>
                  </div>
                </div>
              )}
            </div>
      </div>

      </>)}
    </div>
  );
}

function Nav({user, page, onPage, onShowAuth, onLogout, onShowTeam, navRelance, onOpenQuote}) {
  const [menuOpen, setMenuOpen]=useState(false);
  const [scrolled, setScrolled]=useState(false);
  useEffect(()=>{ const fn=()=>setScrolled(window.scrollY>30); window.addEventListener('scroll',fn); return ()=>window.removeEventListener('scroll',fn); },[]);
  useEffect(()=>{ if(!menuOpen) return; const fn=(e)=>{ if(e.key==='Escape') setMenuOpen(false); }; window.addEventListener('keydown',fn); return ()=>window.removeEventListener('keydown',fn); },[menuOpen]);
  // menu fermé directement dans chaque bouton

  const onLanding=page==='landing';
  const navBg=scrolled||!onLanding?'rgba(255,255,255,.98)':'transparent';

  const menuPanel = menuOpen ? ReactDOM.createPortal(
    <div onClick={()=>setMenuOpen(false)} style={{position:'fixed',top:0,left:0,right:0,bottom:0,zIndex:99999,background:'rgba(0,0,0,.4)',backdropFilter:'blur(4px)'}}>
      <div style={{position:'absolute',top:0,right:0,width:'85%',maxWidth:320,height:'100%',background:'#ffffff',boxShadow:'-8px 0 40px rgba(0,0,0,.1)',overflowY:'auto',fontFamily:"'Plus Jakarta Sans',sans-serif"}} onClick={e=>e.stopPropagation()}>

// SIGN PAGE (client)
// ═══════════════════════════════════
function SignPage({token}) {
  const [quote, setQuote]=useState(null);
  const [loading, setLoading]=useState(true);
  const [error, setError]=useState(null);
  const [signed, setSigned]=useState(false);
  const [signerName, setSignerName]=useState('');
  const [sigData, setSigData]=useState(null);
  const canvasRef=React.useRef(null);
  const [drawing, setDrawing]=useState(false);
  const [hasSig, setHasSig]=useState(false);
  const [signing, setSigning]=useState(false);
  const [refused, setRefused]=useState(false);
  const [refusing, setRefusing]=useState(false);
  const [refuseReason, setRefuseReason]=useState('');

  useEffect(()=>{
    fetch(`${API}/sign/${token}`)
      .then(r=>r.json())
      .then(d=>{ if(d.error){ setError(d.error); } else { setQuote(d.quote||d); } setLoading(false); })
      .catch(()=>{ setError('Erreur de connexion.'); setLoading(false); });
  },[token]);

  // Get coords scaled to canvas internal resolution (fixes offset on responsive canvas)
  function getPos(e){
    const c=canvasRef.current; const r=c.getBoundingClientRect();
    const sx=c.width/r.width, sy=c.height/r.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    return { x:(cx-r.left)*sx, y:(cy-r.top)*sy };
  }
  function startDraw(e){
    e.preventDefault();
    setDrawing(true);
    const p=getPos(e);
    const ctx=canvasRef.current.getContext('2d'); ctx.beginPath(); ctx.moveTo(p.x,p.y);
  }
  function draw(e){
    if(!drawing) return;
    e.preventDefault();
    const p=getPos(e);
    const ctx=canvasRef.current.getContext('2d');
    ctx.lineTo(p.x,p.y); ctx.strokeStyle='#1e293b'; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    setHasSig(true);
  }
  function endDraw(){ setDrawing(false); }
  function clearSig(){ const c=canvasRef.current; c.getContext('2d').clearRect(0,0,c.width,c.height); setHasSig(false); }

  async function submitSign(){
    if(signing||refusing) return;
    if(!hasSig){ alert('Veuillez signer dans le cadre'); return; }
    const data=canvasRef.current.toDataURL('image/png');
    setSigData(data);
    setSigning(true);
    try{
      const res=await fetch(`${API}/sign/${token}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({signature_data:data,signer_name:signerName})});
      const d=await res.json().catch(()=>({}));
      const err=(d.error||'').toString();
      if(!res.ok||d.error){
        const lo=err.toLowerCase();
        if(res.status===409){
          // Le devis est déjà finalisé côté serveur : afficher le bon écran final
          if(lo.includes('refus')){ setQuote(q=>q?{...q,status:'refused'}:q); setRefused(true); return; }
          if(lo.includes('sign')){ setSigned(true); return; }
        }
        alert(err||'Erreur serveur.'); setSigning(false); return;
      }
      setQuote(q=>q?{...q,status:'accepted',signed_at:d.signed_at||new Date().toISOString(),signer_name:signerName}:q);
      setSigned(true);
    }catch(_){ alert('Erreur de connexion.'); setSigning(false); }
  }

  async function submitRefuse(){
    if(refusing||signing) return;
    if(!confirm('Êtes-vous sûr de vouloir refuser ce devis ? Cette action est définitive.')) return;
    setRefusing(true);
    try{
      const res=await fetch(`${API}/sign/${token}/refuse`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reason:refuseReason,signer_name:signerName})});
      const d=await res.json().catch(()=>({}));
      const err=(d.error||'').toString();
      if(!res.ok||d.error){
        const lo=err.toLowerCase();
        if(res.status===409){
          // Le devis est déjà finalisé côté serveur : afficher le bon écran final
          if(lo.includes('sign')){ setQuote(q=>q?{...q,status:'accepted'}:q); setSigned(true); return; }
          if(lo.includes('refus')){ setRefused(true); return; }
        }
        alert(err||'Erreur serveur.'); setRefusing(false); return;
      }
      setQuote(q=>q?{...q,status:'refused',refused_at:d.refused_at||new Date().toISOString(),refused_reason:refuseReason}:q);
      setRefused(true);
    }catch(_){ alert('Erreur de connexion.'); setRefusing(false); }
  }

  if(loading) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",color:'#7a7065'}},'Chargement...');
  if(error) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",gap:12}},
    React.createElement('div',{style:{fontSize:48}},'⚠️'),
    React.createElement('h2',{style:{color:'#dc4a3a',margin:0}},error),
    React.createElement('p',{style:{color:'#7a7065'}},'Ce lien est invalide ou a expiré.')
  );
  if(!quote) return React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",color:'#7a7065'}},'Devis introuvable.');

  // Normalisation ULTRA défensive des items pour éviter toute page blanche
  let items=[];
  try{
    let raw=quote.items;
    if(typeof raw==='string'){ try{ raw=JSON.parse(raw); }catch(_){ raw=[]; } }
    if(!Array.isArray(raw)) raw=[];
    items=raw.filter(x=>x&&typeof x==='object').map(x=>({
      description:String(x.description||x.desc||x.name||x.label||''),
      qty:Number(x.qty!=null?x.qty:(x.quantity!=null?x.quantity:1))||0,
      unit_price:Number(x.unit_price!=null?x.unit_price:(x.price!=null?x.price:(x.unitPrice!=null?x.unitPrice:0)))||0
    }));
  }catch(e){ console.error('[SignPage] items parse error',e); items=[]; }
  const ht=items.reduce((s,i)=>s+(Number(i.qty)||0)*(Number(i.unit_price)||0),0);
  const tvaRate=Number(quote.tva_rate)||20;
  const tva=ht*tvaRate/100;
  const ttc=ht+tva;
  const fmt=n=>(Number(n)||0).toFixed(2).replace('.',',')+'€';

  if(signed) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",gap:16,padding:24,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:64}},'✅'),
    React.createElement('h2',{style:{color:'#10b981',margin:0,fontSize:24}},'Devis signé !'),
    React.createElement('p',{style:{color:'#7a7065',maxWidth:400}},'Merci '+(signerName||quote.client_name||'à vous')+'. Le devis '+quote.number+' a bien été signé. '+quote.company_name+' a été notifié.')
  );

  if(refused) return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",gap:16,padding:24,textAlign:'center'}},
    React.createElement('div',{style:{fontSize:48,color:'#dc4a3a'}},'!'),
    React.createElement('h2',{style:{color:'#dc4a3a',margin:0,fontSize:24}},'Devis refusé'),
    React.createElement('p',{style:{color:'#7a7065',maxWidth:400}},'Le devis '+quote.number+' a été refusé. '+quote.company_name+' a été notifié.')
  );

  const alreadySigned=quote.status==='accepted';
  const alreadyRefused=quote.status==='refused';
  const locked=alreadySigned||alreadyRefused;

  return React.createElement('div',{style:{fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",minHeight:'100vh',background:'#f5f4f1',padding:'24px 16px'}},
    React.createElement('div',{style:{maxWidth:600,margin:'0 auto'}},
      React.createElement('div',{style:{background:'#16775a',color:'white',borderRadius:'12px 12px 0 0',padding:'20px 24px',textAlign:'center'}},
        React.createElement('h1',{style:{margin:0,fontSize:22,fontWeight:700}},'DEFACT'),
        React.createElement('p',{style:{margin:'4px 0 0',opacity:.8,fontSize:14}},'Devis pro en 60 secondes')
      ),
      React.createElement('div',{style:{background:'white',borderRadius:'0 0 12px 12px',padding:24,boxShadow:'0 4px 24px rgba(0,0,0,.08)'}},
        React.createElement('h2',{style:{margin:'0 0 4px',fontSize:20,color:'#1a1916'}},'Devis '+quote.number),
        React.createElement('p',{style:{margin:'0 0 20px',color:'#7a7065',fontSize:14}},quote.company_name+' vous a envoyé un devis'),
        alreadySigned
          ? React.createElement('div',{style:{background:'#d1fae5',color:'#065f46',padding:'12px 16px',borderRadius:8,textAlign:'center',fontWeight:600,marginBottom:20}},'✅ Ce devis a déjà été signé.')
          : null,
        alreadyRefused
          ? React.createElement('div',{style:{background:'#fef2f2',color:'#991b1b',padding:'12px 16px',borderRadius:8,textAlign:'center',fontWeight:600,marginBottom:20}},'Ce devis a été refusé.')
          : null,
        React.createElement('div',{style:{background:'#f5f4f1',borderRadius:8,padding:16,marginBottom:20}},
          items.length===0
            ? React.createElement('div',{style:{padding:'6px 0',fontSize:13,color:'#a89e92',fontStyle:'italic'}},'(aucune ligne détaillée)')
            : items.map((it,i)=>React.createElement('div',{key:i,style:{display:'flex',justifyContent:'space-between',gap:12,padding:'6px 0',borderBottom:i<items.length-1?'1px solid #e8e3dc':'none',fontSize:14}},
              React.createElement('span',{style:{color:'#1a1916',flex:1}},it.description||'(sans description)'),
              React.createElement('span',{style:{color:'#7a7065',whiteSpace:'nowrap'}},it.qty+' × '+fmt(it.unit_price))
            )),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'8px 0 0',fontSize:13,color:'#7a7065',marginTop:items.length===0?0:8,borderTop:items.length===0?'none':'1px dashed #e2e8f0'}},
            React.createElement('span',null,'Total HT'),
            React.createElement('span',null,fmt(ht))
          ),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'4px 0',fontSize:13,color:'#7a7065'}},
            React.createElement('span',null,'TVA ('+tvaRate+'%)'),
            React.createElement('span',null,fmt(tva))
          ),
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',padding:'10px 0 0',fontWeight:700,fontSize:16,borderTop:'2px solid #e2e8f0',marginTop:6}},
            React.createElement('span',null,'Total TTC'),
            React.createElement('span',{style:{color:'#16775a'}},fmt(ttc))
          )
        ),
        !locked&&React.createElement('div',null,
          React.createElement('div',{style:{marginBottom:12}},
            React.createElement('label',{style:{display:'block',fontSize:13,color:'#7a7065',marginBottom:6,fontWeight:500}},'Votre nom'),
            React.createElement('input',{style:{width:'100%',padding:'10px 12px',border:'1px solid #e8e3dc',borderRadius:8,fontSize:14,boxSizing:'border-box'},placeholder:'Prénom Nom',value:signerName,onChange:e=>setSignerName(e.target.value)})
          ),
          React.createElement('label',{style:{display:'block',fontSize:13,color:'#7a7065',marginBottom:6,fontWeight:500}},'Votre signature'),
          React.createElement('canvas',{ref:canvasRef,width:540,height:140,style:{border:'2px dashed #b8ddd1',borderRadius:8,width:'100%',touchAction:'none',cursor:'crosshair',background:'white'},

// Affiche le bandeau RGPD au premier accès. Stocke le choix en localStorage.
// Les cookies "essentiels" (auth, session) sont déposés sans consentement (autorisé).
// Les cookies "analytics" / "pub" doivent attendre le clic sur "Accepter".
// ⚠️  Ce composant ne CHARGE pas réellement les scripts analytics — il ne fait que
// gérer le consentement. Quand tu ajouteras Plausible/PostHog/Google Analytics,
// vérifie window.__defactCookies?.analytics avant d'injecter le script.
function CookieBanner() {
  const [show, setShow] = useState(false);
  useEffect(()=>{
    const stored = localStorage.getItem('defactCookies');
    if (!stored) setShow(true);
    else {
      try { window.__defactCookies = JSON.parse(stored); } catch(_) {}
    }
  },[]);
  function save(prefs) {
    const data = {...prefs, ts: Date.now()};
    localStorage.setItem('defactCookies', JSON.stringify(data));
    window.__defactCookies = data;
    setShow(false);
  }
  if (!show) return null;
  return (
    <div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:99998,background:'#1a1916',color:'#fff',padding:'18px 20px',boxShadow:'0 -4px 24px rgba(0,0,0,.2)',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif"}}>
      <div style={{maxWidth:1100,margin:'0 auto',display:'flex',gap:20,alignItems:'center',justifyContent:'space-between',flexWrap:'wrap'}}>
        <div style={{flex:'1 1 380px',minWidth:280}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Vos préférences cookies</div>
          <div style={{fontSize:13,color:'#c5beb3',lineHeight:1.6}}>
            On utilise des cookies <strong>essentiels</strong> pour vous connecter (obligatoires) et, si vous l'acceptez, des cookies <strong>statistiques anonymes</strong> pour améliorer le produit. Aucune publicité, jamais.{' '}
            <a href="#cookies" onClick={(e)=>{e.preventDefault();window.location.hash='#cookies';}} style={{color:'#7fc4af',textDecoration:'underline'}}>En savoir plus</a>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={()=>save({essential:true,analytics:false})} style={{padding:'10px 18px',background:'transparent',color:'#fff',border:'1.5px solid #c5beb3',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif"}}>Refuser (sauf essentiels)</button>

        </div>
      </div>

  );
}

class GlobalErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state={err:null,info:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err, info){
    console.error('[DEFACT crash]', err);
    console.error('[DEFACT stack]', info?.componentStack);
    this.setState({info});
  }
  render(){
    if(this.state.err){
      return React.createElement('div',{style:{maxWidth:680,margin:'60px auto',padding:30,background:'#fff',border:'1px solid #fecaca',borderRadius:14,fontFamily:"'Plus Jakarta Sans',system-ui,sans-serif",boxShadow:'0 4px 24px rgba(0,0,0,.08)'}},
        React.createElement('div',{style:{fontSize:42,marginBottom:14}},'⚠️'),
        React.createElement('h2',{style:{margin:'0 0 12px',color:'#b91c1c',fontSize:22}},'Une erreur s\'est produite'),
        React.createElement('div',{style:{padding:14,background:'#fef2f2',borderRadius:8,fontFamily:'monospace',fontSize:13,color:'#991b1b',marginBottom:16,wordBreak:'break-word'}},String(this.state.err?.message||this.state.err)),
        React.createElement('p',{style:{color:'#7a7065',fontSize:13,lineHeight:1.7}},'Détails complets dans la console (F12). Si l\'erreur persiste, partagez-la avec le support.'),
        React.createElement('div',{style:{display:'flex',gap:10,marginTop:20}},
          React.createElement('button',{onClick:()=>{ try{localStorage.clear();}catch(_){}; location.reload(); },style:{padding:'10px 18px',background:'#16775a',color:'#fff',border:'none',borderRadius:8,fontWeight:600,cursor:'pointer'}},'Réinitialiser et recharger'),
          React.createElement('button',{onClick:()=>location.reload(),style:{padding:'10px 18px',background:'transparent',color:'#1a1916',border:'1.5px solid #e0dbd4',borderRadius:8,fontWeight:600,cursor:'pointer'}},'Recharger seulement')
        )
      );
    }
    return this.props.children;
  }
}

              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>

                      {st.label}
                    </span>
                    <span style={{fontSize:11,color:'#cbd5e1'}}>{msg.date?new Date(msg.date).toLocaleDateString('fr-FR'):''}</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                  </div>
                </button>
              );
            })}
          </div>
        ) : (
          /* Ticket detail */
          <div>
            <button onClick={()=>setSelected(null)} style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',cursor:'pointer',padding:'0 0 16px',fontSize:13,fontWeight:600,color:'#64748b',fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'color .12s'}}
              onMouseEnter={e=>e.currentTarget.style.color='#16775a'} onMouseLeave={e=>e.currentTarget.style.color='#64748b'}>
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
              Retour aux tickets
            </button>

            <div style={{background:'#fff',borderRadius:18,border:'1px solid #f1f5f9',overflow:'hidden',boxShadow:'0 2px 12px rgba(0,0,0,.03)'}}>
              {/* Header */}
              <div style={{padding:'22px 28px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                <div>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <h3 style={{margin:0,fontSize:18,fontWeight:800,color:'#0f0e0c'}}>{selected.subject||'Sans sujet'}</h3>
                    {(()=>{const st=getTicketStatus(selected);return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'3px 10px',borderRadius:6,background:st.bg,fontSize:10,fontWeight:700,color:st.color}}><span style={{width:5,height:5,borderRadius:'50%',background:st.dot}}/>{st.label}</span>;})()}
                  </div>
                  <p style={{margin:'5px 0 0',fontSize:12.5,color:'#94a3b8'}}>Créé le {selected.date?new Date(selected.date).toLocaleString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}):''}</p>
                </div>
              </div>

              {/* Messages thread */}
              <div style={{padding:'24px 28px',minHeight:200}}>
                {/* User message */}
                <div style={{display:'flex',gap:12,marginBottom:20}}>
                  <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#16775a,#0f9e70)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:12,fontWeight:700,flexShrink:0}}>{(user.name||'U')[0].toUpperCase()}</div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                      <span style={{fontWeight:700,fontSize:13,color:'#0f0e0c'}}>{user.name||'Vous'}</span>
                      <span style={{fontSize:11,color:'#cbd5e1'}}>{selected.date?new Date(selected.date).toLocaleString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}</span>
                    </div>
                    <div style={{padding:'14px 18px',background:'#f8fafc',borderRadius:'4px 14px 14px 14px',fontSize:14,color:'#334155',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{selected.message}</div>
                  </div>
                </div>

                {/* Admin replies */}
                {(selected.replies||[]).map((r,i)=>(
                  <div key={i} style={{display:'flex',gap:12,marginBottom:16}}>
                    <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#f0faf6,#dcf2ea)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                        <span style={{fontWeight:700,fontSize:13,color:'#16775a'}}>Support DEFACT</span>
                        <span style={{fontSize:11,color:'#cbd5e1'}}>{(r.created_at||r.date)?new Date(r.created_at||r.date).toLocaleString('fr-FR',{hour:'2-digit',minute:'2-digit'}):''}</span>
                      </div>
                      <div style={{padding:'14px 18px',background:'#f0faf6',border:'1px solid #dcf2ea',borderRadius:'4px 14px 14px 14px',fontSize:14,color:'#334155',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{r.reply||r.text}</div>
                    </div>
                  </div>
                ))}

                {/* Waiting state */}
                {(selected.replies||[]).length===0&&(
                  <div style={{display:'flex',alignItems:'center',gap:12,padding:'20px 0',borderTop:'1px solid #f8f9fb',marginTop:8}}>
                    <div style={{width:34,height:34,borderRadius:'50%',background:'#f8fafc',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'#94a3b8'}}>En attente de réponse</div>
                      <div style={{fontSize:12,color:'#cbd5e1',marginTop:2}}>Notre équipe vous répondra sous 2 heures</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </>)}
    </div>
  );
}

function AppSidebar({user, page, onPage, onLogout, onShowUpgrade, onShowTeam, sidebarOpen, setSidebarOpen}) {
  const [accountOpen, setAccountOpen] = useState(false);
  const [aboutOpen, setAboutOpen] = useState(false);
  const [supportBadge, setSupportBadge] = useState(0);
  const [adminBadge, setAdminBadge] = useState(0);
  const accountRef = useRef(null);

  useEffect(()=>{
    if(!accountOpen) return;
    const h=(e)=>{ if(accountRef.current && !accountRef.current.contains(e.target)) setAccountOpen(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[accountOpen]);

  // Poll support notifications
  useEffect(()=>{
    function fetchBadges(){
      // User: count messages that have replies (= admin answered)
      api('/support/my-messages').then(d=>{
        const msgs = d.messages||[];
        // Messages with replies that the user hasn't "seen" yet
        // We track seen IDs in localStorage
        const seenKey = 'defact_support_seen_'+user.id;
        const seen = JSON.parse(localStorage.getItem(seenKey)||'[]');
        const unread = msgs.filter(m=>(m.replies||[]).length>0 && !seen.includes(m.id)).length;
        setSupportBadge(unread);
      }).catch(()=>{});

      // Admin: count unread messages from users
      if(isAdmin(user)){
        api('/support/messages/unread-count').then(d=>{
          setAdminBadge(parseInt(d.count)||0);
        }).catch(()=>{});
      }
    }
    fetchBadges();
    const iv = setInterval(()=>{ if(!document.hidden) fetchBadges(); }, 30000);
    return ()=>clearInterval(iv);
  },[user.id]);

  // Mark support messages as seen when user visits support page
  useEffect(()=>{
    if(page==='support'){
      api('/support/my-messages').then(d=>{
        const msgs = d.messages||[];
        const seenKey = 'defact_support_seen_'+user.id;
        const withReplies = msgs.filter(m=>(m.replies||[]).length>0).map(m=>m.id);
        localStorage.setItem(seenKey, JSON.stringify(withReplies));
        setSupportBadge(0);
      }).catch(()=>{});
    }
  },[page]);

  // Mark admin messages as read when admin visits admin-messages page
  useEffect(()=>{
    if(page==='admin-messages' && isAdmin(user)){
      setAdminBadge(0);
    }
  },[page]);

  const navItems = [
    {id:'app', label:'Nouveau devis', paths:['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z','M14 2v6h6','M12 18v-6','M9 15h6']},
    {id:'dashboard', label:'Dashboard', paths:['M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z','M9 22V12h6v10']},

    {id:'invoices', label:'Factures', paths:['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z','M14 2v6h6','M16 13H8','M16 17H8','M10 9H8']},
    ...(user.plan==='team'?[{id:'team', label:'Équipe', paths:['M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2','M23 21v-2a4 4 0 0 0-3-3.87','M16 3.13a4 4 0 0 1 0 7.75'], circles:[{cx:9,cy:7,r:4}]}]:[]),
    {id:'support', label:'Support', badge:supportBadge, paths:['M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z']},
    ...(isAdmin(user)?[{id:'admin-messages', label:'Messages clients', badge:adminBadge, paths:['M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z','M22 6l-10 7L2 6']}]:[]),

            </button>

              onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'} onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>

                onMouseEnter={e=>{e.currentTarget.style.background='linear-gradient(135deg,#dcf2ea,#b8ddd1)';}} onMouseLeave={e=>{e.currentTarget.style.background='linear-gradient(135deg,#f0faf6,#dcf2ea)';}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8"/></svg>

      )}

  );
}

/* ═══════════════════════════════════
   LIVE CHAT WIDGET — Floating support chat
   ═══════════════════════════════════ */
const ChatWidget = React.memo(function ChatWidget({user}) {
  const [open, setOpen] = useState(false);
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [sending, setSending] = useState(false);
  const [typing, setTyping] = useState(false);
  const scrollRef = useRef(null);

  // Auto-scroll to bottom
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[msgs,typing]);

  // Welcome message on first open
  useEffect(()=>{
    if(open && msgs.length===0){
      setMsgs([{id:'welcome',from:'support',text:'Bonjour'+(user?.name?' '+user.name.split(' ')[0]:'')+' ! Comment pouvons-nous vous aider aujourd\'hui ?',time:new Date()}]);
    }
  },[open]);

  async function handleSend(){
    if(!input.trim()||sending) return;
    const text=input.trim();
    setInput('');
    setMsgs(prev=>[...prev,{id:Date.now(),from:'user',text,time:new Date()}]);
    setSending(true);

    // Send to backend
    try{
      await api('/support/message','POST',{subject:'Chat: '+text.slice(0,50),message:text});
    }catch(e){}

    // Simulate typing + auto response
    setTyping(true);
    setTimeout(()=>{
      setTyping(false);
      setMsgs(prev=>[...prev,{id:Date.now()+'r',from:'support',text:'Merci pour votre message ! Notre équipe va le traiter et vous répondra dans les plus brefs délais. Vous pouvez suivre l\'avancement depuis la page Support → Mes tickets.',time:new Date()}]);
      setSending(false);
    },1800);
  }

  if(!user) return null;

  return ReactDOM.createPortal(
    <>
      {/* Chat panel */}
      {open && (
        <div style={{
          position:'fixed',bottom:96,right:24,zIndex:9998,
          width:380,maxWidth:'calc(100vw - 48px)',height:520,maxHeight:'calc(100vh - 140px)',
          background:'#fff',borderRadius:20,
          boxShadow:'0 24px 80px rgba(0,0,0,.12), 0 8px 32px rgba(0,0,0,.06)',
          border:'1px solid #e8ebef',
          display:'flex',flexDirection:'column',overflow:'hidden',
          animation:'aboutSlideUp .35s cubic-bezier(.16,1,.3,1)',
          fontFamily:"'Plus Jakarta Sans',sans-serif",
        }}>
          {/* Header */}
          <div style={{padding:'16px 20px',background:'linear-gradient(135deg,#16775a,#0f9e70)',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
            <div style={{position:'relative'}}>
              <div style={{width:38,height:38,borderRadius:'50%',background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </div>
              <div style={{position:'absolute',bottom:0,right:0,width:10,height:10,borderRadius:'50%',background:'#4ade80',border:'2px solid #16775a'}} />
            </div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:14,color:'#fff'}}>Support DEFACT</div>
              <div style={{fontSize:11,color:'rgba(255,255,255,.7)',display:'flex',alignItems:'center',gap:4}}>
                <span style={{width:5,height:5,borderRadius:'50%',background:'#4ade80'}} />
                En ligne · Rép. &lt; 2h
              </div>
            </div>
            <button onClick={()=>setOpen(false)} style={{background:'rgba(255,255,255,.1)',border:'none',borderRadius:8,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'background .15s'}}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.2)'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.1)'}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>

          {/* Messages */}
          <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'16px 16px 8px',display:'flex',flexDirection:'column',gap:12}}>
            {msgs.map(m=>(
              <div key={m.id} style={{display:'flex',justifyContent:m.from==='user'?'flex-end':'flex-start',animation:'fadeUp .25s ease'}}>
                <div style={{maxWidth:'80%'}}>
                  {m.from==='support'&&<div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                    <div style={{width:22,height:22,borderRadius:'50%',background:'#f0faf6',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    </div>
                    <span style={{fontSize:10,fontWeight:600,color:'#94a3b8'}}>DEFACT</span>
                  </div>}
                  <div style={{
                    padding:'10px 14px',borderRadius:m.from==='user'?'14px 14px 4px 14px':'4px 14px 14px 14px',
                    background:m.from==='user'?'linear-gradient(135deg,#16775a,#0f9e70)':'#f8fafc',
                    color:m.from==='user'?'#fff':'#334155',
                    fontSize:13.5,lineHeight:1.6,
                    border:m.from==='user'?'none':'1px solid #f1f5f9',
                  }}>{m.text}</div>
                  <div style={{fontSize:10,color:'#cbd5e1',marginTop:3,textAlign:m.from==='user'?'right':'left'}}>{m.time.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</div>
                </div>
              </div>
            ))}

            {/* Typing indicator */}
            {typing&&(
              <div style={{display:'flex',alignItems:'center',gap:6,animation:'fadeUp .2s ease'}}>
                <div style={{width:22,height:22,borderRadius:'50%',background:'#f0faf6',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                </div>
                <div style={{padding:'10px 16px',background:'#f8fafc',border:'1px solid #f1f5f9',borderRadius:'4px 14px 14px 14px',display:'flex',gap:4}}>
                  {[0,1,2].map(i=><span key={i} style={{width:6,height:6,borderRadius:'50%',background:'#94a3b8',animation:`pulse 1.2s ${i*.2}s infinite`}} />)}
                </div>
              </div>
            )}
          </div>

          {/* Input */}
          <div style={{padding:'12px 16px',borderTop:'1px solid #f1f5f9',background:'#fff',flexShrink:0}}>
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
              <div style={{flex:1,position:'relative'}}>
                <textarea value={input} onChange={e=>setInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}}}
                  placeholder="Écrivez votre message..."
                  rows={1}
                  style={{width:'100%',padding:'10px 14px',border:'1.5px solid #e8ebef',borderRadius:12,fontSize:13.5,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:'none',resize:'none',boxSizing:'border-box',lineHeight:1.5,transition:'border-color .15s',maxHeight:80,overflowY:'auto'}}
                  onFocus={e=>e.target.style.borderColor='#16775a'}
                  onBlur={e=>e.target.style.borderColor='#e8ebef'}
                />
              </div>
              <button onClick={handleSend} disabled={!input.trim()||sending} style={{
                width:40,height:40,borderRadius:11,border:'none',
                background:!input.trim()||sending?'#f1f5f9':'linear-gradient(135deg,#16775a,#0f9e70)',
                cursor:!input.trim()||sending?'default':'pointer',
                display:'flex',alignItems:'center',justifyContent:'center',
                transition:'all .15s',flexShrink:0,
              }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={!input.trim()||sending?'#cbd5e1':'#fff'} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Floating button */}
      <button onClick={()=>setOpen(o=>!o)} style={{
        position:'fixed',bottom:24,right:24,zIndex:9997,
        width:56,height:56,borderRadius:16,border:'none',
        background:open?'#475569':'linear-gradient(135deg,#16775a,#0f9e70)',
        cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
        boxShadow:'0 6px 24px rgba(22,119,90,.25)',
        transition:'all .25s cubic-bezier(.4,0,.2,1)',
      }}
      onMouseEnter={e=>{e.currentTarget.style.transform='scale(1.06)';e.currentTarget.style.boxShadow='0 8px 32px rgba(22,119,90,.3)';}}
      onMouseLeave={e=>{e.currentTarget.style.transform='scale(1)';e.currentTarget.style.boxShadow='0 6px 24px rgba(22,119,90,.25)';}}
      aria-label={open?'Fermer le chat':'Ouvrir le chat support'}>
        {open ? (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        ) : (
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        )}
      </button>
    </>,
    document.body
  );
});

function App() {
  const [user, setUser]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('qUser')||'null'); } catch{ return null; } });
  const [page, setPage]=useState(()=>{ try{ return JSON.parse(localStorage.getItem('qUser')||'null') ? 'app' : 'landing'; } catch{ return 'landing'; } });
  const [legalPage, setLegalPage]=useState(null); // 'mentions' | 'cgu' | 'cgv' | 'privacy' | 'cookies' | null
  const [authModal, setAuthModal]=useState(null);
  const [upgradeModal, setUpgradeModal]=useState(false);
  const [upgradeReason, setUpgradeReason]=useState('');
  const [teamModal, setTeamModal]=useState(false);
  const [signToken, setSignToken]=useState(null);
  const [navRelance, setNavRelance]=useState({relances:[],quoteNum:''});
  const [openedQuoteKey, setOpenedQuoteKey]=useState(0);
  const [prefilledClient, setPrefilledClient]=useState(null); // pour pré-remplir un devis depuis le CRM

  useEffect(()=>{
    // Détection URL /sign/:token
    const path=window.location.pathname;
    const match=path.match(/\/sign\/([a-zA-Z0-9_-]+)/);
    if(match){ setSignToken(match[1]); return; }
    // Détection hash #cookies, #mentions, #cgu, #cgv, #privacy
    const hash = window.location.hash.replace('#','');
    if (['mentions','cgu','cgv','privacy','cookies'].includes(hash)) {
      setLegalPage(hash);
    }
    const token=localStorage.getItem('qToken');
    if(token){ api('/auth/me').then(d=>{ setUser(d.user); localStorage.setItem('qUser',JSON.stringify(d.user));
      // Charger la relance active la plus récente pour le timer navbar
      api('/quotes').then(qs=>{
        const quotes=(qs.quotes||qs||[]);
        const checks=quotes.slice(0,10).map(q=>api(`/quotes/${q.id}/relances`).then(r=>{
          const active=(r.relances||[]).filter(rel=>rel.active&&rel.next_send_at&&rel.sent_count<rel.max_count);
          if(active.length>0) return {relances:active,quoteNum:q.number||q.id};
          return null;
        }).catch(()=>null));
        Promise.all(checks).then(results=>{
          const found=results.find(r=>r!==null);
          if(found) setNavRelance(found);
        });
      }).catch(()=>{});
    }).catch(()=>{ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); }); }
    // URL reset token flow removed — now uses email code
  },[]);

  function handleLogin(u){ setUser(u); smoothSetPage('app'); }
  function handleLogout(){ localStorage.removeItem('qToken'); localStorage.removeItem('qUser'); setUser(null); smoothSetPage('landing'); toast('Déconnecté','info'); }
  function showAuth(tab='login'){ setAuthModal(tab); }
  function showUpgrade(reason=''){ setUpgradeReason(reason||''); setUpgradeModal(true); }
  function showLegal(key){ setLegalPage(key); window.scrollTo(0,0); }
  function createQuoteFromClient(client){
    setPrefilledClient(client);
    smoothSetPage('app');
    setOpenedQuoteKey(k=>k+1);
  }

  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [pageTransition, setPageTransition] = useState(true);
  const pageKeyRef = useRef(0);
  const smoothSetPage = useCallback((p) => {
    if (p === page) return;
    setPageTransition(false);
    requestAnimationFrame(() => {
      setPage(p);
      pageKeyRef.current++;
      requestAnimationFrame(() => setPageTransition(true));
    });
  }, [page]);
  const isAppPage = user && page!=='landing';

  return (
    <>
      <Toasts />
      <CookieBanner />
      {signToken ? <SignPage token={signToken} /> : legalPage ? (
        <>
          <Nav user={user} page={page} onPage={(p)=>{setLegalPage(null);smoothSetPage(p);}} onShowAuth={showAuth} onLogout={handleLogout} onShowTeam={()=>setTeamModal(true)} navRelance={navRelance} onOpenQuote={()=>{}} />
          <div style={{paddingTop:64}}>
            <LegalPage pageKey={legalPage} onBack={()=>setLegalPage(null)} />
          </div>
        </>
      ) : isAppPage ? (
        <>
          {/* SIDEBAR LAYOUT (logged in) */}
          <AppSidebar user={user} page={page} onPage={smoothSetPage} onLogout={handleLogout} onShowUpgrade={showUpgrade} onShowTeam={()=>setTeamModal(true)} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen} />
          {sidebarOpen&&<div className="sidebar-overlay" onClick={()=>setSidebarOpen(false)} />}

          {/* Mobile top bar */}
          <div className="sidebar-toggle" style={{display:'none',position:'fixed',top:0,left:0,right:0,zIndex:850,height:56,background:'rgba(255,255,255,.97)',backdropFilter:'blur(12px)',borderBottom:'1px solid #e8e8e8',alignItems:'center',padding:'0 16px',gap:12}}>
            <button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:'none',cursor:'pointer',padding:6,color:'#475569',display:'flex',alignItems:'center'}} aria-label="Ouvrir le menu">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <Logo size={24} wordmark={false} />
            <span style={{fontWeight:700,fontSize:15,color:'#0f0e0c',letterSpacing:'-.02em'}}>DEFACT</span>
          </div>

          <div className="sidebar-main">
            <div style={{paddingTop:0,opacity:pageTransition?1:0,transform:pageTransition?'translateY(0)':'translateY(6px)',transition:'opacity .2s cubic-bezier(.16,1,.3,1),transform .2s cubic-bezier(.16,1,.3,1)'}} className="sidebar-content">
              {page==='app'&&(
                <div style={{overflow:'hidden',width:'100%',maxWidth:'100%'}}>
                  <div style={{background:'#fff',padding:'28px 32px 24px',borderBottom:'1px solid #e5e7eb'}}>
                    <h1 style={{margin:0,fontSize:24,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'#0f0e0c',letterSpacing:'-.02em'}}>
                      Nouveau devis
                    </h1>
                    <p style={{margin:'6px 0 0',fontSize:13,color:'#94a3b8'}}>
                      {user.name} · {PLANS[user.plan]||user.plan}
                    </p>
                  </div>
                  <QuoteErrorBoundary key={openedQuoteKey}><QuoteForm user={user} onShowUpgrade={showUpgrade} onShowAuth={()=>showAuth('login')} onRelanceUpdate={setNavRelance} onGoInvoices={()=>smoothSetPage('invoices')} prefilledClient={prefilledClient} onPrefilledConsumed={()=>setPrefilledClient(null)} /></QuoteErrorBoundary>
                </div>
              )}
              {page==='dashboard'&&<DashboardPage user={user} onShowUpgrade={showUpgrade} onGoApp={()=>smoothSetPage('app')} onGoInvoices={()=>smoothSetPage('invoices')} onGoClients={()=>smoothSetPage('clients')} />}
              {page==='clients'&&<ClientsPage user={user} onShowUpgrade={showUpgrade} onCreateQuote={createQuoteFromClient} />}
              {page==='invoices'&&<InvoicesPage user={user} onShowUpgrade={showUpgrade} onGoQuotes={()=>smoothSetPage('app')} />}
              {page==='team'&&user?.plan==='team'&&<TeamPage user={user} />}
              {page==='support'&&<SupportPage user={user} />}
              {page==='admin-messages'&&isAdmin(user)&&<AdminMessagesPage user={user} />}
            </div>
          </div>

          {isAdmin(user)&&<AdminPlanSwitcher user={user} setUser={setUser} />}

          {authModal&&<AuthModal onClose={()=>setAuthModal(null)} onLogin={handleLogin} defaultTab={authModal} />}
          {upgradeModal&&<UpgradeModal onClose={()=>setUpgradeModal(false)} user={user} reason={upgradeReason} />}
          {teamModal&&user?.plan==='team'&&<TeamModal onClose={()=>setTeamModal(false)} user={user} />}
        </>
      ) : (
        <>
          {/* LANDING LAYOUT (not logged in) */}
          <Nav user={user} page={page} onPage={smoothSetPage} onShowAuth={showAuth} onLogout={handleLogout} onShowTeam={()=>setTeamModal(true)} navRelance={navRelance} onOpenQuote={async (qid)=>{
            try {
              toast('Chargement du devis…','info');
              const qs=await api('/quotes');
              const list=(qs.quotes||qs||[]);
              const found=list.find(q=>String(q.id)===String(qid));
              if(!found){ toast('Devis introuvable','error'); return; }
              if(typeof found.items==='string'){ try{ found.items=JSON.parse(found.items); }catch(_){ found.items=[]; } }
              localStorage.setItem('qOpenQuote',JSON.stringify(found));
              setOpenedQuoteKey(k=>k+1);
              smoothSetPage('app');
              toast('Devis signé ouvert','success');
            } catch(e){ toast('Impossible de charger le devis','error'); }
          }} />

          <div style={{paddingTop:page==='landing'?0:68}}>
            {page==='landing'&&<Landing onShowAuth={showAuth} onGoApp={()=>{ if(!user){showAuth('register');}else{smoothSetPage('app');} }} user={user} onShowLegal={showLegal} />}
            {page==='app'&&(
              <div style={{overflow:'hidden',width:'100%',maxWidth:'100vw'}}>
                <div style={{background:'#ffffff',borderBottom:'1px solid #f1f5f9',padding:'16px 20px',overflow:'hidden'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12,width:'100%',boxSizing:'border-box'}}>
                    <div style={{minWidth:0,flex:1}}>
                      <BackButton onClick={() => smoothSetPage('landing')} style={{ marginBottom: 6 }} />
                      <h1 style={{margin:0,fontSize:20,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'#0f0e0c',letterSpacing:'-.01em'}}>
                        Nouveau devis
                      </h1>
                      <p style={{margin:'4px 0 0',fontSize:13,color:'#94a3b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        Connectez-vous pour sauvegarder
                      </p>
                    </div>
                    <button className="btn btn-gold" onClick={()=>showAuth('login')} style={{flexShrink:0,fontSize:13,padding:'9px 16px',borderRadius:8}}>Connexion</button>
                  </div>
                </div>
                <QuoteErrorBoundary key={openedQuoteKey}><QuoteForm user={user} onShowUpgrade={showUpgrade} onShowAuth={()=>showAuth('login')} onRelanceUpdate={setNavRelance} onGoInvoices={()=>smoothSetPage('invoices')} prefilledClient={prefilledClient} onPrefilledConsumed={()=>setPrefilledClient(null)} /></QuoteErrorBoundary>
              </div>
            )}
          </div>

          {authModal&&<AuthModal onClose={()=>setAuthModal(null)} onLogin={handleLogin} defaultTab={authModal} />}
          {upgradeModal&&<UpgradeModal onClose={()=>setUpgradeModal(false)} user={user} reason={upgradeReason} />}
          {teamModal&&user?.plan==='team'&&<TeamModal onClose={()=>setTeamModal(false)} user={user} />}
        </>
      )}
      {/* Live Chat Widget — visible when logged in */}
      {user && <ChatWidget user={user} />}
    </>
  );
}

// Retire le loader HTML dès que React monte
const _root = document.getElementById('root');
const _loader = document.getElementById('defact-loader');
if (_loader) _loader.remove();

ReactDOM.createRoot(_root).render(
  React.createElement(GlobalErrorBoundary, null, React.createElement(App))
);
</script>
</body>
</html>
