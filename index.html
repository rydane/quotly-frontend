<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Config ────────────────────────────────────────────────────────────────────
const API = 'https://quotly-backend.onrender.com/api';
const PLANS = { starter: 'Starter', pro: 'Pro ⭐', team: 'Équipe 👥' };

// ── API Helper ────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const token = localStorage.getItem('qToken');
  const res = await fetch(API + path, {
    method,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { Authorization: `Bearer ${token}` } : {}),
    },
    body: body ? JSON.stringify(body) : null,
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.error || `Erreur ${res.status}`);
  return json;
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _setToasts = null;
function toast(msg, type = 'success') {
  if (!_setToasts) return;
  const id = Date.now();
  _setToasts(p => [...p, { id, msg, type }]);
  setTimeout(() => _setToasts(p => p.filter(t => t.id !== id)), 4000);
}

function Toasts() {
  const [toasts, setToasts] = useState([]);
  useEffect(() => { _setToasts = setToasts; }, []);
  return (
    <div id="toasts">
      {toasts.map(t => (
        <div key={t.id} className={`toast toast-${t.type}`}>{t.msg}</div>
      ))}
    </div>
  );
}

// ── Spinner ───────────────────────────────────────────────────────────────────
function Spinner({ dark }) {
  return <span className={`spinner ${dark ? 'spinner-dark' : ''}`} />;
}

// ── Format ────────────────────────────────────────────────────────────────────
function fmtMoney(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(n || 0);
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

// ── PDF Generation ────────────────────────────────────────────────────────────
function generatePDF(quote, user, sigDataUrl = null) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const W = 210, M = 18;
  let y = M;

  const brand = '#166534';
  const muted = '#6b7280';
  const dark = '#111827';

  // Header bar
  doc.setFillColor(22, 101, 52);
  doc.rect(0, 0, W, 42, 'F');

  // Company name
  doc.setTextColor(255, 255, 255);
  doc.setFontSize(20); doc.setFont('helvetica', 'bold');
  doc.text(quote.company_name || user?.name || 'Votre Entreprise', M, 18);
  doc.setFontSize(9); doc.setFont('helvetica', 'normal');
  doc.text('Quotly — Devis professionnel', M, 26);

  // Quote number top right
  doc.setFontSize(11); doc.setFont('helvetica', 'bold');
  doc.text(quote.number || 'DEV-001', W - M, 18, { align: 'right' });
  doc.setFontSize(8); doc.setFont('helvetica', 'normal');
  doc.text('Devis', W - M, 24, { align: 'right' });

  y = 54;

  // Client block
  doc.setDrawColor(229, 231, 235);
  doc.setFillColor(249, 250, 251);
  doc.roundedRect(M, y, W / 2 - M - 4, 36, 3, 3, 'FD');
  doc.setTextColor(100, 100, 100);
  doc.setFontSize(8); doc.setFont('helvetica', 'bold');
  doc.text('CLIENT', M + 6, y + 8);
  doc.setFont('helvetica', 'normal');
  doc.setTextColor(dark);
  doc.setFontSize(11); doc.text(quote.client_name || '—', M + 6, y + 16);
  if (quote.client_address) {
    doc.setFontSize(8); doc.setTextColor(100, 100, 100);
    const addrLines = doc.splitTextToSize(quote.client_address, W / 2 - M - 16);
    doc.text(addrLines, M + 6, y + 22);
  }

  // Date block
  const rx = W / 2 + 4;
  doc.setFillColor(249, 250, 251);
  doc.roundedRect(rx, y, W - rx - M, 36, 3, 3, 'FD');
  doc.setTextColor(100, 100, 100); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
  doc.text('INFORMATIONS', rx + 6, y + 8);
  doc.setFont('helvetica', 'normal'); doc.setTextColor(dark);
  doc.setFontSize(9);
  doc.text(`Date : ${new Date().toLocaleDateString('fr-FR')}`, rx + 6, y + 16);
  doc.text(`Validité : ${quote.validity_days || 30} jours`, rx + 6, y + 23);
  if (quote.client_email) doc.text(`Email : ${quote.client_email}`, rx + 6, y + 30);

  y += 46;

  // Items table header
  doc.setFillColor(22, 101, 52);
  doc.rect(M, y, W - 2 * M, 9, 'F');
  doc.setTextColor(255, 255, 255); doc.setFontSize(8); doc.setFont('helvetica', 'bold');
  const colW = [W - 2 * M - 60, 18, 22, 20];
  const colX = [M + 3, M + colW[0] + 3, M + colW[0] + colW[1] + 3, M + colW[0] + colW[1] + colW[2] + 3];
  doc.text('DÉSIGNATION', colX[0], y + 6);
  doc.text('QTÉ', colX[1], y + 6, { align: 'center' });
  doc.text('PU HT', colX[2], y + 6, { align: 'right' });
  doc.text('TOTAL HT', colX[3] + 17, y + 6, { align: 'right' });
  y += 9;

  // Items
  const items = typeof quote.items === 'string' ? JSON.parse(quote.items) : (quote.items || []);
  let ht = 0;
  items.forEach((item, i) => {
    const total = (item.qty || 0) * (item.unit_price || 0);
    ht += total;
    if (i % 2 === 0) { doc.setFillColor(249, 250, 251); doc.rect(M, y, W - 2 * M, 9, 'F'); }
    doc.setTextColor(dark); doc.setFontSize(9); doc.setFont('helvetica', 'normal');
    const desc = doc.splitTextToSize(item.description || '', colW[0] - 4);
    doc.text(desc[0], colX[0], y + 6);
    doc.text(String(item.qty || 0), colX[1], y + 6, { align: 'center' });
    doc.text(fmtMoney(item.unit_price), colX[2] + colW[2] - 3, y + 6, { align: 'right' });
    doc.text(fmtMoney(total), colX[3] + 17, y + 6, { align: 'right' });
    y += 9;
  });

  y += 6;
  // Totals
  const tva = (quote.tva_rate || 20) / 100;
  const tvaAmt = ht * tva;
  const ttc = ht + tvaAmt;

  const totalX = W - M - 60;
  const drawTotal = (label, val, bold, big) => {
    doc.setFont('helvetica', bold ? 'bold' : 'normal');
    doc.setFontSize(big ? 11 : 9);
    doc.setTextColor(bold ? dark : muted);
    doc.text(label, totalX, y);
    doc.text(fmtMoney(val), W - M, y, { align: 'right' });
    y += big ? 8 : 6;
  };

  doc.setDrawColor(229, 231, 235); doc.setLineWidth(0.3); doc.line(totalX - 2, y - 2, W - M, y - 2);
  drawTotal('Total HT', ht, false, false);
  drawTotal(`TVA (${quote.tva_rate || 20}%)`, tvaAmt, false, false);
  doc.setFillColor(22, 101, 52); doc.roundedRect(totalX - 4, y - 4, W - M - totalX + 4, 12, 2, 2, 'F');
  doc.setTextColor(255, 255, 255); doc.setFontSize(11); doc.setFont('helvetica', 'bold');
  doc.text('TOTAL TTC', totalX, y + 4);
  doc.text(fmtMoney(ttc), W - M, y + 4, { align: 'right' });
  y += 16;

  // Conditions
  if (quote.conditions) {
    y += 4;
    doc.setDrawColor(229, 231, 235); doc.setLineWidth(0.3); doc.line(M, y, W - M, y); y += 6;
    doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(muted);
    doc.text('CONDITIONS', M, y); y += 5;
    doc.setFont('helvetica', 'normal'); doc.setTextColor(dark);
    const condLines = doc.splitTextToSize(quote.conditions, W - 2 * M);
    doc.text(condLines, M, y);
    y += condLines.length * 4.5 + 4;
  }

  // Signature
  if (sigDataUrl) {
    y += 6;
    doc.setDrawColor(229, 231, 235); doc.line(M, y, W - M, y); y += 6;
    doc.setFontSize(8); doc.setFont('helvetica', 'bold'); doc.setTextColor(muted);
    doc.text('SIGNATURE CLIENT', M, y); y += 4;
    try { doc.addImage(sigDataUrl, 'PNG', M, y, 60, 24); } catch(e) {}
    doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.setTextColor(muted);
    doc.text('Signé le ' + new Date().toLocaleDateString('fr-FR'), M, y + 27);
    y += 32;
  }

  // Footer
  doc.setDrawColor(229, 231, 235); doc.line(M, 285, W - M, 285);
  doc.setFontSize(7); doc.setTextColor(muted); doc.setFont('helvetica', 'normal');
  doc.text('Généré avec Quotly · quotly.fr', M, 290);
  doc.text(`Page 1`, W - M, 290, { align: 'right' });

  return doc;
}

// ═══════════════════════════════════════════════════════════════════════════════
// AUTH MODAL — avec 2FA OTP + gestion erreur mot de passe oublié
// ═══════════════════════════════════════════════════════════════════════════════
function AuthModal({ onClose, onLogin, defaultTab = 'login' }) {
  const [tab, setTab] = useState(defaultTab);
  const [loading, setLoading] = useState(false);
  const [form, setForm] = useState({ name:'', email:'', password:'', password2:'' });
  // ── 2FA state ──
  const [otpStep, setOtpStep] = useState(false);
  const [otpEmail, setOtpEmail] = useState('');
  const [otpCode, setOtpCode] = useState('');
  const [forgot, setForgot] = useState({ step: 1, email:'', password:'', password2:'' });

  const set = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  // ── Étape 1 : email + password → reçoit require_otp: true ────────
  async function handleLogin(e) {
    e.preventDefault();
    setLoading(true);
    try {
      const data = await api('/auth/login', 'POST', { email: form.email, password: form.password });
      if (data.require_otp) {
        setOtpEmail(data.email);
        setOtpStep(true);
        toast(`Code envoyé à ${data.email} 📧`, 'info');
      }
    } catch(err) { toast(err.message, 'error'); }
    finally { setLoading(false); }
  }

  // ── Étape 2 : vérification du code OTP ───────────────────────────
  async function handleVerifyOtp(e) {
    e.preventDefault();
    if (!otpCode || otpCode.length !== 6) { toast('Code à 6 chiffres requis', 'error'); return; }
    setLoading(true);
    try {
      const data = await api('/auth/verify-otp', 'POST', { email: otpEmail, otp: otpCode });
      localStorage.setItem('qToken', data.token);
      localStorage.setItem('qUser', JSON.stringify(data.user));
      onLogin(data.user);
      toast('Bienvenue ' + data.user.name + ' ! 👋');
      onClose();
    } catch(err) { toast(err.message, 'error'); }
    finally { setLoading(false); }
  }

  async function handleRegister(e) {
    e.preventDefault();
    if (form.password !== form.password2) { toast('Les mots de passe ne correspondent pas', 'error'); return; }

// SIGNATURE MODAL
// ═══════════════════════════════════════════════════════════════════════════════
function SignatureModal({ onClose, onSign }) {
  const canvasRef = useRef(null);
  const [drawing, setDrawing] = useState(false);
  const [hasSig, setHasSig] = useState(false);
  const lastPos = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
    const ctx = canvas.getContext('2d');
    ctx.strokeStyle = '#111827';
    ctx.lineWidth = 2.5;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
  }, []);

  function getPos(e, canvas) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  function startDraw(e) {
    e.preventDefault();
    setDrawing(true);
    const canvas = canvasRef.current;
    lastPos.current = getPos(e, canvas);
  }

  function draw(e) {
    e.preventDefault();
    if (!drawing) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const pos = getPos(e, canvas);
    ctx.beginPath();
    ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
    lastPos.current = pos;
    setHasSig(true);
  }

  function endDraw(e) { e.preventDefault(); setDrawing(false); }

  function clear() {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    setHasSig(false);
  }

  function validate() {
    if (!hasSig) { toast('Veuillez signer dans le cadre', 'error'); return; }
    onSign(canvasRef.current.toDataURL('image/png'));
    onClose();
  }

  return (
    <div className="modal-bg" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box scale-in">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
          <h3 style={{ margin:0, fontSize:18, fontWeight:700 }}>✍️ Signature électronique</h3>
          <button className="btn-ghost" onClick={onClose} style={{ padding:'4px 8px', fontSize:18 }}>×</button>
        </div>
        <p style={{ margin:'0 0 16px', color:'#6b7280', fontSize:14 }}>Signez dans le cadre ci-dessous. La signature sera intégrée au PDF.</p>
        <div className="sig-wrap" style={{ height:180, marginBottom:16 }}>
          <canvas
            ref={canvasRef}
            id="sigCanvas"
            style={{ width:'100%', height:'100%', display:'block' }}
            onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
            onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
          />
        </div>
        <div style={{ display:'flex', gap:10 }}>
          <button className="btn-ghost" onClick={clear} style={{ flex:1 }}>🗑 Effacer</button>
          <button className="btn-primary" onClick={validate} style={{ flex:2 }}>✅ Valider la signature</button>
        </div>
      </div>
    </div>
  );
}

// QUOTE FORM

const TEMPLATES = [
  { id:'classique', label:'Classique', icon:'📄', pro:false },
  { id:'moderne',   label:'Moderne',   icon:'✨', pro:true },
  { id:'artisan',   label:'Artisan',   icon:'🔨', pro:true },

];

function QuoteForm({ user, onShowUpgrade, onShowAuth }) {
  const [template, setTemplate] = useState('classique');
  const [sigData, setSigData] = useState(null);
  const [saving, setSaving] = useState(false);
  const [savedQuote, setSavedQuote] = useState(null);
  const [modal, setModal] = useState(null); // 'sig' | 'email' | 'stats'
  const [quoteNum, setQuoteNum] = useState('');
  const [items, setItems] = useState([{ description:'', qty:1, unit_price:0 }]);
  const [form, setForm] = useState({ company:'', client_name:'', client_address:'', client_email:'', tva_rate:20, validity_days:30, conditions:'' });
  const [preview, setPreview] = useState({ ht:0, tva:0, ttc:0 });

  // Recalculate preview
  useEffect(() => {
    const ht = items.reduce((s, i) => s + (parseFloat(i.qty)||0) * (parseFloat(i.unit_price)||0), 0);
    const tva = ht * (form.tva_rate / 100);
    setPreview({ ht, tva, ttc: ht + tva });
  }, [items, form.tva_rate]);

  const setF = k => e => setForm(p => ({ ...p, [k]: e.target.value }));

  function addLine() { setItems(p => [...p, { description:'', qty:1, unit_price:0 }]); }
  function removeLine(i) { if (items.length > 1) setItems(p => p.filter((_,j) => j !== i)); }
  function setItem(i, k, v) { setItems(p => p.map((it, j) => j === i ? { ...it, [k]: v } : it)); }

  const PRO_TEMPLATES_IDS = ['moderne', 'artisan', 'minimal', 'bold', 'blue_corp', 'tech',
    'nature', 'luxe', 'sante', 'immobilier', 'event', 'restaurant', 'auto', 'beaute',
    'juridique', 'archi', 'photo', 'transport', 'formation', 'nettoyage', 'it', 'mode'];

  function selectTemplate(id) {
    // ✅ Autoriser la prévisualisation, bloquer uniquement au téléchargement
    if (PRO_TEMPLATES_IDS.includes(id) && (!user || user.plan === 'starter')) {
      setTemplate(id);
      toast('Aperçu activé — plan Pro requis pour télécharger ce template', 'info');
      return;
    }
    setTemplate(id);
  }

  function isPro() { return user && (user.plan === 'pro' || user.plan === 'team'); }

  async function saveQuote() {
    if (!form.company || !form.client_name || items.every(i => !i.description)) {
      toast('Remplissez entreprise, client et au moins une prestation', 'error'); return null;
    }
    // ✅ Auth obligatoire pour sauvegarder
    if (!user) {
      toast('Connectez-vous pour sauvegarder votre devis', 'info');
      onShowAuth();
      return null;
    }
    try {
      const data = await api('/quotes', 'POST', {
        company_name: form.company, client_name: form.client_name,
        client_address: form.client_address, client_email: form.client_email,
        items, tva_rate: parseFloat(form.tva_rate), validity_days: parseInt(form.validity_days),
        conditions: form.conditions, template_id: template,
      });
      return data.quote;
    } catch(e) {
      // ✅ Gère quota atteint et template payant
      if (e.message?.includes('Limite') || e.message?.includes('réservé') || e.message?.includes('quota')) {
        onShowUpgrade();
      }
      toast(e.message, 'error');
      return null;
    }
  }

  async function handleDownload() {
    if (!form.company && !form.client_name) { toast('Remplissez au moins votre entreprise et le client', 'error'); return; }
    setSaving(true);

    // ✅ Auth obligatoire
    if (!user) {
      toast('Connectez-vous pour télécharger le PDF', 'info');
      onShowAuth();
      setSaving(false);
      return;
    }

    // ✅ Bloquer template payant côté frontend (double vérif backend)
    if (PRO_TEMPLATES_IDS.includes(template) && user.plan === 'starter') {
      toast('Ce template est réservé aux offres payantes.', 'error');
      onShowUpgrade();
      setSaving(false);
      return;
    }

    try {
      // Sauvegarder d'abord si pas encore fait
      let quote = savedQuote;
      if (!quote) {
        const saved = await saveQuote();
        if (!saved) { setSaving(false); return; }
        quote = saved;
        setSavedQuote(saved);
        setQuoteNum(saved.number);
      }

      // ✅ Téléchargement via backend (qui vérifie aussi template côté serveur)
      const token = localStorage.getItem('qToken');
      const res = await fetch(`${API}/quotes/${quote.id}/pdf`, {
        headers: { Authorization: `Bearer ${token}` }
      });

      if (!res.ok) {
        const json = await res.json().catch(() => ({}));
        if (json.upgrade) { onShowUpgrade(); setSaving(false); return; }
        toast(json.error || 'Erreur téléchargement PDF', 'error');
        setSaving(false);
        return;
      }

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = (quote.number || 'devis') + '.pdf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('PDF téléchargé ✅');
    } catch(e) {
      toast(e.message, 'error');
    }
    setSaving(false);
  }

        if (quotaData.signatures.remaining !== null && quotaData.signatures.remaining <= 0) {

          onShowUpgrade();
          return;
        }
        if (quotaData.signatures.remaining !== null) {

                <div style={{ width:36, height:36, borderRadius:'50%', background:'#166534', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', fontWeight:700, fontSize:13, flexShrink:0 }}>{t.name.split(' ').map(n=>n[0]).join('')}</div>
                <div>
                  <div style={{ fontWeight:700, fontSize:14 }}>{t.name}</div>
                  <div style={{ fontSize:12, color:'#9ca3af' }}>{t.role}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </section>

      {/* FAQ */}
      <section id="faq" style={{ padding:'80px 24px', background:'#f9fafb' }}>
        <div style={{ maxWidth:700, margin:'0 auto' }}>
          <div style={{ textAlign:'center', marginBottom:48 }}>
            <h2 style={{ margin:0, fontSize:'clamp(28px,4vw,42px)', fontFamily:'Playfair Display,serif', fontWeight:700 }}>
              Questions <em>fréquentes</em>
            </h2>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
            {faqs.map((f, i) => (
              <div key={i} className="card" style={{ cursor:'pointer', userSelect:'none' }} onClick={() => setOpenFaq(openFaq === i ? null : i)}>
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontWeight:600, fontSize:15 }}>
                  {f.q}
                  <span style={{ color:'#16a34a', fontSize:20, marginLeft:12, transform: openFaq===i ? 'rotate(45deg)':'none', transition:'transform .2s' }}>+</span>
                </div>
                {openFaq === i && <p style={{ margin:'12px 0 0', fontSize:14, color:'#6b7280', lineHeight:1.7 }}>{f.a}</p>}
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* CTA */}
      <section style={{ padding:'80px 24px', textAlign:'center', background:'#052e16' }}>
        <h2 style={{ margin:'0 0 12px', fontSize:'clamp(28px,4vw,40px)', fontFamily:'Playfair Display,serif', color:'#fff', fontWeight:700 }}>
          Prêt à gagner <em>2h par semaine</em> ?
        </h2>
        <p style={{ color:'rgba(255,255,255,.7)', margin:'0 0 32px', fontSize:16 }}>Rejoignez 2 400 professionnels qui ont digitalisé leurs devis avec Quotly.</p>
        <button onClick={() => { if (!user) { onShowAuth('register'); } else { onGoApp(); } }} style={{ padding:'16px 36px', background:'#fff', color:'#166534', border:'none', borderRadius:14, fontFamily:'DM Sans,sans-serif', fontSize:16, fontWeight:700, cursor:'pointer', boxShadow:'0 4px 20px rgba(0,0,0,.25)' }}>
          Créer mon premier devis →
        </button>
      </section>

      {/* FOOTER */}
      <footer style={{ background:'#111827', padding:'48px 24px 32px', color:'rgba(255,255,255,.6)', fontSize:14 }}>
        <div style={{ maxWidth:1100, margin:'0 auto' }}>
          <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr 1fr 1fr', gap:40, marginBottom:40, flexWrap:'wrap' }}>
            <div>
              <div style={{ fontFamily:'Playfair Display,serif', fontSize:22, color:'#fff', marginBottom:10, fontWeight:700 }}>Quotly</div>
              <p style={{ margin:0, lineHeight:1.7, fontSize:13 }}>Devis pro en 60 secondes. Pour les artisans, PME et freelances.</p>
            </div>
            <div>
              <div style={{ color:'#fff', fontWeight:600, marginBottom:14 }}>Produit</div>
              {['Fonctionnalités','Tarifs','Démo','FAQ'].map(l => <div key={l} style={{ marginBottom:8 }}><a href={`#${l.toLowerCase()}`} style={{ color:'rgba(255,255,255,.6)', textDecoration:'none' }}>{l}</a></div>)}
            </div>
            <div>
              <div style={{ color:'#fff', fontWeight:600, marginBottom:14 }}>Légal</div>
              {['Mentions légales','CGU','Confidentialité','Cookies'].map(l => <div key={l} style={{ marginBottom:8 }}><span style={{ cursor:'pointer' }}>{l}</span></div>)}
            </div>
            <div>
              <div style={{ color:'#fff', fontWeight:600, marginBottom:14 }}>Contact</div>
              <div style={{ marginBottom:8 }}><a href="mailto:contact@quotly.fr" style={{ color:'rgba(255,255,255,.6)', textDecoration:'none' }}>contact@quotly.fr</a></div>
              <div>Support</div>
            </div>
          </div>
          <div style={{ borderTop:'1px solid rgba(255,255,255,.1)', paddingTop:24, display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12 }}>
            <div>© 2025 Quotly. Fait avec ♥ en France.</div>
            <div style={{ display:'flex', gap:8, alignItems:'center' }}>
              <span style={{ background:'rgba(255,255,255,.1)', padding:'4px 10px', borderRadius:6, fontSize:12 }}>🔒 SSL</span>
              <span style={{ background:'rgba(255,255,255,.1)', padding:'4px 10px', borderRadius:6, fontSize:12 }}>💳 PayPal</span>
            </div>
          </div>
        </div>
      </footer>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════════════════════
function Nav({ user, page, onPage, onShowAuth, onLogout }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', fn);
    return () => window.removeEventListener('scroll', fn);
  }, []);

  return (
    <nav style={{ position:'fixed', top:0, left:0, right:0, zIndex:900, transition:'all .3s',
      background: scrolled || page !== 'landing' ? 'rgba(255,255,255,.97)' : 'transparent',
      backdropFilter: scrolled || page !== 'landing' ? 'blur(12px)' : 'none',
      borderBottom: scrolled || page !== 'landing' ? '1px solid #e5e7eb' : 'none',
      boxShadow: scrolled ? '0 2px 20px rgba(0,0,0,.06)' : 'none',
    }}>
      <div style={{ maxWidth:1100, margin:'0 auto', padding:'0 24px', height:62, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontFamily:'Playfair Display,serif', fontSize:22, fontWeight:700, cursor:'pointer',
          color: scrolled || page !== 'landing' ? '#166534' : '#fff' }}
          onClick={() => onPage('landing')}>
          Quotly
        </div>

        <div className="hide-mobile" style={{ display:'flex', alignItems:'center', gap:4 }}>
          {page === 'landing' && (
            <>
              {['Fonctionnalités','Tarifs','FAQ'].map(l => (
                <a key={l} href={`#${l.toLowerCase().replace('é','e').replace('à','a')}`}
                  className="nav-link" style={{ color: scrolled ? '#374151' : 'rgba(255,255,255,.85)', textDecoration:'none' }}>
                  {l}
                </a>
              ))}
            </>
          )}
          <button className="nav-link" onClick={() => onPage('app')} style={{ background:'none', border:'none', cursor:'pointer', color: page === 'app' ? '#166534' : (scrolled || page !== 'landing' ? '#374151' : 'rgba(255,255,255,.85)'), fontWeight: page === 'app' ? 700 : 500 }}>
            Créer un devis
          </button>
        </div>

        <div style={{ display:'flex', alignItems:'center', gap:10 }}>
          {user ? (
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <div className="hide-mobile" style={{ display:'flex', alignItems:'center', gap:8, padding:'6px 14px', background:'#f0fdf4', borderRadius:99, fontSize:13 }}>
                <span style={{ fontWeight:700, color:'#166534' }}>{user.name?.split(' ')[0]}</span>
                <span className="badge status-accepted" style={{ fontSize:11, padding:'2px 8px' }}>{PLANS[user.plan] || user.plan}</span>
              </div>
              <button className="btn-ghost" onClick={onLogout} style={{ fontSize:13, color: scrolled || page !== 'landing' ? '#6b7280' : 'rgba(255,255,255,.75)' }}>Déconnexion</button>
            </div>
          ) : (
            <div style={{ display:'flex', gap:8 }}>
              <button className="nav-link" onClick={() => onShowAuth('login')} style={{ background:'none', border:'none', cursor:'pointer', color: scrolled || page !== 'landing' ? '#374151' : 'rgba(255,255,255,.85)', fontWeight:500 }}>
                Connexion
              </button>
              <button className="btn-primary" onClick={() => onShowAuth('register')} style={{ fontSize:13, padding:'8px 18px' }}>
                S'inscrire →
              </button>
            </div>
          )}
        </div>
      </div>
    </nav>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  const [user, setUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('qUser') || 'null'); } catch { return null; }
  });
  const [page, setPage] = useState('landing');
  const [authModal, setAuthModal] = useState(null); // 'login' | 'register'
  const [upgradeModal, setUpgradeModal] = useState(false);

  // Verify token on mount
  useEffect(() => {
    const token = localStorage.getItem('qToken');
    if (token) {
      api('/auth/me').then(data => {
        setUser(data.user);
        localStorage.setItem('qUser', JSON.stringify(data.user));
      }).catch(() => {
        localStorage.removeItem('qToken');
        localStorage.removeItem('qUser');
        setUser(null);
      });
    }
  }, []);

  function handleLogin(u) { setUser(u); }

  function handleLogout() {
    localStorage.removeItem('qToken');
    localStorage.removeItem('qUser');
    setUser(null);
    setPage('landing');
    toast('Vous êtes déconnecté', 'info');
  }

  function showAuth(tab = 'login') { setAuthModal(tab); }
  function showUpgrade() { setUpgradeModal(true); }

  return (
    <>
      <Toasts />
      <Nav user={user} page={page} onPage={setPage} onShowAuth={showAuth} onLogout={handleLogout} />

      <div style={{ paddingTop: page === 'landing' ? 0 : 62 }}>
        {page === 'landing' && <Landing onShowAuth={showAuth} onGoApp={() => { if (!user) { showAuth('register'); } else { setPage('app'); } }} user={user} />}
        {page === 'app' && (
          <div>
            <div style={{ background:'#f9fafb', borderBottom:'1px solid #e5e7eb', padding:'20px 24px' }}>
              <div style={{ maxWidth:1100, margin:'0 auto', display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:12 }}>
                <div>
                  <h1 style={{ margin:0, fontSize:22, fontWeight:700, fontFamily:'Playfair Display,serif' }}>📋 Nouveau devis</h1>
                  <p style={{ margin:'4px 0 0', fontSize:14, color:'#6b7280' }}>
                    {user ? `Connecté en tant que ${user.name} — Plan ${PLANS[user.plan]}` : 'Générez votre PDF gratuitement — connectez-vous pour sauvegarder'}
                  </p>
                </div>
                {!user && (
                  <button className="btn-primary" onClick={() => showAuth('login')}>
                    Connexion / Inscription
                  </button>
                )}
              </div>
            </div>
            <QuoteForm user={user} onShowUpgrade={showUpgrade} onShowAuth={() => showAuth('login')} />
          </div>
        )}
      </div>

      {authModal && <AuthModal onClose={() => setAuthModal(null)} onLogin={handleLogin} defaultTab={authModal} />}
      {upgradeModal && <UpgradeModal onClose={() => setUpgradeModal(false)} user={user} />}
    </>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
