function NotificationBell({onOpenQuote}){
  const [open, setOpen] = useState(false);
  const [notifs, setNotifs] = useState([]);
  const [unread, setUnread] = useState(0);
  const [loading, setLoading] = useState(false);
  const ref = useRef(null);

  const fetchCount = useCallback(async()=>{
    try {
      const r = await api('/notifications/unread-count');
      setUnread(r.count||0);
    } catch(e){}
  },[]);

  const fetchAll = useCallback(async()=>{
    setLoading(true);
    try {
      const r = await api('/notifications');
      setNotifs(r.notifications||[]);
      setUnread(r.unread_count||0);
    } catch(e){}
    setLoading(false);
  },[]);

  // Polling du compteur toutes les 30s
  useEffect(()=>{
    fetchCount();
    const id = setInterval(fetchCount, 30000);
    return ()=>clearInterval(id);
  },[fetchCount]);

  // Fermer au clic extérieur
  useEffect(()=>{
    if(!open) return;
    const h=(e)=>{ if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[open]);

  const toggle = ()=>{
    const next=!open;
    setOpen(next);
    if(next) fetchAll();
  };

  const markRead = async(id)=>{
    try {
      await api(`/notifications/${id}/read`,'PUT');
      setNotifs(p=>p.map(n=>n.id===id?{...n,read:true}:n));
      setUnread(u=>Math.max(0,u-1));
    } catch(e){}
  };

  const markAllRead = async()=>{
    try {
      await api('/notifications/read-all','PUT');
      setNotifs(p=>p.map(n=>({...n,read:true})));
      setUnread(0);
    } catch(e){}
  };

  const deleteOne = async(id,e)=>{
    e.stopPropagation();
    try {
      await api(`/notifications/${id}`,'DELETE');
      setNotifs(p=>p.filter(n=>n.id!==id));
    } catch(e){}
  };

  const clearAll = async()=>{
    if(!confirm('Supprimer toutes les notifications ?')) return;
    try {
      await api('/notifications','DELETE');
      setNotifs([]);
      setUnread(0);
    } catch(e){}
  };

  const handleClick = (n)=>{
    if(!n.read) markRead(n.id);
    // Ouvre le devis associé si possible
    if(n.type==='quote_signed' && n.data?.quote_id && onOpenQuote){
      onOpenQuote(n.data.quote_id);
      setOpen(false);
    }
  };

  const iconFor = (type)=>{
    if(type==='quote_signed') return '✍️';
    if(type==='quote_sent')   return '📧';
    if(type==='invoice_paid') return '$';
    return '🔔';
  };

  const timeAgo = (iso)=>{
    const diff = (Date.now()-new Date(iso).getTime())/1000;
    if(diff<60) return 'à l\'instant';
    if(diff<3600) return `il y a ${Math.floor(diff/60)} min`;
    if(diff<86400) return `il y a ${Math.floor(diff/3600)} h`;
    return new Date(iso).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});
  };

  return (
    <div ref={ref} style={{position:'relative'}}>
      <button onClick={toggle} title="Notifications" aria-label="Notifications" style={{
        position:'relative',width:38,height:38,borderRadius:'50%',border:'1px solid #e8e3dc',
        background:open?'#f0faf6':'#fff',cursor:'pointer',display:'flex',alignItems:'center',
        justifyContent:'center',fontSize:17,transition:'all .2s'
      }}>
        🔔
        {unread>0 && (
          <span style={{
            position:'absolute',top:-3,right:-3,minWidth:18,height:18,padding:'0 5px',
            borderRadius:99,background:'#ef4444',color:'#fff',fontSize:10,fontWeight:800,
            display:'flex',alignItems:'center',justifyContent:'center',
            border:'2px solid #fff',boxShadow:'0 2px 6px rgba(239,68,68,.45)'
          }}>{unread>99?'99+':unread}</span>
        )}
      </button>

      {open && (
        <div className="scale-in" style={{
          position:'absolute',right:0,top:46,width:360,maxWidth:'calc(100vw - 24px)',
          background:'#fff',border:'1px solid #e8e3dc',borderRadius:14,
          boxShadow:'0 20px 50px -10px rgba(15,23,42,.25)',zIndex:1000,overflow:'hidden'
        }}>
          <div style={{padding:'14px 16px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div style={{fontWeight:700,fontSize:14,color:'#1a1916'}}>Notifications {unread>0&&<span style={{color:'#dc4a3a'}}>({unread})</span>}</div>
            <div style={{display:'flex',gap:10}}>
              {unread>0 && <button onClick={markAllRead} style={{background:'none',border:'none',color:'#16775a',fontSize:11,fontWeight:600,cursor:'pointer'}}>Tout marquer lu</button>}
              {notifs.length>0 && <button onClick={clearAll} style={{background:'none',border:'none',color:'#a89e92',fontSize:11,fontWeight:600,cursor:'pointer'}}>Tout effacer</button>}
            </div>
          </div>
          <div style={{maxHeight:420,overflowY:'auto'}}>
            {loading ? (
              <div style={{padding:'30px 16px',textAlign:'center',color:'#a89e92',fontSize:13}}><Spinner/> Chargement…</div>
            ) : notifs.length===0 ? (
              <div style={{padding:'40px 16px',textAlign:'center',color:'#a89e92',fontSize:13}}>
                
                Aucune notification
              </div>
            ) : notifs.map(n=>(
              <div key={n.id} onClick={()=>handleClick(n)} style={{
                padding:'12px 16px',borderBottom:'1px solid #f8fafc',cursor:'pointer',
                background:n.read?'#fff':'#f0faf6',display:'flex',gap:11,alignItems:'flex-start',
                transition:'background .15s'
              }} onMouseEnter={e=>e.currentTarget.style.background=n.read?'#f8fafc':'#e0e7ff'}
                 onMouseLeave={e=>e.currentTarget.style.background=n.read?'#fff':'#f0faf6'}>
                <div style={{fontSize:20,flexShrink:0,lineHeight:1}}>{iconFor(n.type)}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#1a1916'}}>{n.title}</div>
                    {!n.read && <span style={{width:7,height:7,borderRadius:'50%',background:'#16775a',flexShrink:0}}/>}
                  </div>
                  {n.message && <div style={{fontSize:12,color:'#5a524a',marginTop:3,lineHeight:1.4}}>{n.message}</div>}
                  <div style={{fontSize:10,color:'#a89e92',marginTop:5,fontWeight:600}}>{timeAgo(n.created_at)}</div>
                </div>
                <button onClick={(e)=>deleteOne(n.id,e)} title="Supprimer" style={{
                  background:'none',border:'none',color:'#cbd5e1',cursor:'pointer',fontSize:14,
                  padding:2,flexShrink:0,lineHeight:1
                }} onMouseEnter={e=>e.currentTarget.style.color='#ef4444'}
                   onMouseLeave={e=>e.currentTarget.style.color='#cbd5e1'}><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function NavTimer({nextSendAt}){
  const [cd,setCd]=React.useState('');
  React.useEffect(()=>{
    if(!nextSendAt) return;
    const tick=()=>{
      const diff=new Date(nextSendAt)-new Date();
      if(diff<=0){ setCd('Envoi...'); return; }
      const h=Math.floor(diff/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      setCd(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    };
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[nextSendAt]);
  return <span style={{fontFamily:'monospace',fontSize:13,fontWeight:700,color:'#16775a'}}>{cd||'...'}</span>;
}

      setMessages((d.messages||[]).map(m=>({...m, userName:m.user_name||m.userName, userEmail:m.user_email||m.userEmail, userPlan:m.user_plan||m.userPlan, date:m.created_at||m.date})));

    setSending(true);
    try {
      const d = await api('/support/messages/'+selected.id+'/reply','POST',{reply:replyText.trim()});
      setMessages(prev=>prev.map(m=>m.id===selected.id?{...m,replies:[...(m.replies||[]),{text:replyText.trim(),from:user.email,date:new Date().toISOString()}]}:m));
      setSelected(prev=>({...prev,replies:[...(prev.replies||[]),{text:replyText.trim(),from:user.email,date:new Date().toISOString()}]}));
      setReplyText('');
      toast('Réponse envoyée','success');
    } catch(e) {
      toast('API non disponible — réponse sauvegardée localement','info');
      const reply = {text:replyText.trim(),from:user.email,date:new Date().toISOString()};
      setMessages(prev=>prev.map(m=>m.id===selected.id?{...m,replies:[...(m.replies||[]),reply]}:m));
      setSelected(prev=>({...prev,replies:[...(prev.replies||[]),reply]}));
      setReplyText('');
    }
    setSending(false);
  }

  function markRead(msg) {
    if(msg.read) return;
    setMessages(prev=>prev.map(m=>m.id===msg.id?{...m,read:true}:m));
    api('/support/messages/'+msg.id+'/read','PUT').catch(()=>{});
  }

  const unread = messages.filter(m=>!m.read).length;

  return (
    <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 24px'}}>
      <div style={{marginBottom:28}}>
        <h1 style={{margin:0,fontSize:24,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'#0f0e0c',letterSpacing:'-.02em'}}>Messages support</h1>
        <p style={{margin:'4px 0 0',fontSize:14,color:'#94a3b8'}}>{messages.length} message{messages.length>1?'s':''} · {unread} non lu{unread>1?'s':''}</p>
      </div>

      {loading?(
        <div style={{textAlign:'center',padding:60}}><Spinner/></div>
      ):(
        <div style={{display:'grid',gridTemplateColumns:selected?'380px 1fr':'1fr',gap:20,alignItems:'start'}} className="col-2">
          {/* Liste messages */}
          <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',overflow:'hidden'}}>
            <div style={{padding:'16px 20px',borderBottom:'1px solid #f1f5f9',fontSize:13,fontWeight:600,color:'#64748b'}}>
              Boîte de réception
            </div>
            {messages.length===0?(
              <div style={{padding:'48px 24px',textAlign:'center',color:'#94a3b8',fontSize:14}}>Aucun message</div>
            ):messages.map(msg=>(
              <button key={msg.id} onClick={()=>{setSelected(msg);markRead(msg);}} style={{
                width:'100%',display:'flex',alignItems:'flex-start',gap:12,padding:'16px 20px',
                background:selected?.id===msg.id?'#f0faf6':'transparent',
                border:'none',borderBottom:'1px solid #f8f9fa',cursor:'pointer',textAlign:'left',
                fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'background .1s',
              }}
              onMouseEnter={e=>{if(selected?.id!==msg.id)e.currentTarget.style.background='#fafbfc';}}
              onMouseLeave={e=>{if(selected?.id!==msg.id)e.currentTarget.style.background='transparent';}}>
                {!msg.read&&<div style={{width:8,height:8,borderRadius:'50%',background:'#16775a',flexShrink:0,marginTop:6}} />}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
                    <span style={{fontWeight:msg.read?500:700,fontSize:14,color:'#0f0e0c',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{msg.userName||'Utilisateur'}</span>
                    <span style={{fontSize:11,color:'#cbd5e1',flexShrink:0,marginLeft:8}}>{msg.date?new Date(msg.date).toLocaleDateString('fr-FR'):''}</span>
                  </div>
                  <div style={{fontSize:13,color:'#64748b',fontWeight:600,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{msg.subject||'Sans sujet'}</div>
                  <div style={{fontSize:12,color:'#94a3b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{msg.message?.slice(0,80)}</div>
                  <div style={{display:'flex',gap:6,marginTop:6}}>
                    <span style={{padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:600,background:'#f1f5f9',color:'#64748b'}}>{msg.userEmail}</span>
                    <span style={{padding:'2px 8px',borderRadius:6,fontSize:10,fontWeight:600,background:msg.userPlan==='pro'?'#f0faf6':msg.userPlan==='team'?'#ecfdf5':'#f8fafc',color:msg.userPlan==='pro'?'#16775a':msg.userPlan==='team'?'#0f9e70':'#94a3b8'}}>{PLANS[msg.userPlan]||'Starter'}</span>
                  </div>
                </div>
              </button>
            ))}
          </div>

          {/* Détail message */}
          {selected&&(
            <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',overflow:'hidden'}}>
              <div style={{padding:'20px 24px',borderBottom:'1px solid #f1f5f9',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <h3 style={{margin:0,fontSize:17,fontWeight:700,color:'#0f0e0c'}}>{selected.subject||'Sans sujet'}</h3>
                  <p style={{margin:'4px 0 0',fontSize:13,color:'#94a3b8'}}>De {selected.userName} ({selected.userEmail}) · {PLANS[selected.userPlan]||'Starter'}</p>
                </div>
                <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#94a3b8',padding:4}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
              </div>

              <div style={{padding:'24px',minHeight:200}}>
                {/* Message original */}
                <div style={{padding:'16px 20px',background:'#f8fafc',borderRadius:12,marginBottom:16}}>
                  <div style={{fontSize:11,color:'#94a3b8',fontWeight:600,marginBottom:8}}>{selected.date?new Date(selected.date).toLocaleString('fr-FR'):''}</div>
                  <div style={{fontSize:14,color:'#334155',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{selected.message}</div>
                </div>

                {/* Réponses */}
                {(selected.replies||[]).map((r,i)=>(
                  <div key={i} style={{padding:'14px 20px',background:'#f0faf6',border:'1px solid #dcf2ea',borderRadius:12,marginBottom:12}}>
                    <div style={{fontSize:11,color:'#16775a',fontWeight:600,marginBottom:6}}>Réponse de {r.admin_name||r.admin_email||r.from||'Admin'} · {(r.created_at||r.date)?new Date(r.created_at||r.date).toLocaleString('fr-FR'):''}</div>
                    <div style={{fontSize:14,color:'#334155',lineHeight:1.7,whiteSpace:'pre-wrap'}}>{r.reply||r.text}</div>
                  </div>
                ))}

                {/* Zone de réponse */}
                <div style={{marginTop:16}}>
                  <textarea value={replyText} onChange={e=>setReplyText(e.target.value)} placeholder="Écrire une réponse..." rows={3} style={{width:'100%',padding:'12px 16px',border:'1px solid #e2e8f0',borderRadius:10,fontSize:14,fontFamily:"'Plus Jakarta Sans',sans-serif",outline:'none',resize:'vertical',boxSizing:'border-box',lineHeight:1.6,transition:'border .15s'}}
                    onFocus={e=>e.target.style.borderColor='#16775a'} onBlur={e=>e.target.style.borderColor='#e2e8f0'} />
                  <div style={{display:'flex',justifyContent:'flex-end',marginTop:10}}>
                    <button onClick={sendReply} disabled={sending||!replyText.trim()} className="btn btn-gold" style={{padding:'10px 24px',fontSize:13,borderRadius:10,opacity:sending||!replyText.trim()?0.5:1,display:'inline-flex',alignItems:'center',gap:8}}>
                      {sending?'Envoi...':'Répondre'}
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── TeamPage (full page, sidebar) ──────────────────────────────────── */
function TeamPage({user}) {
  const [members, setMembers]=useState([]);
  const [loading, setLoading]=useState(true);
  const [creating, setCreating]=useState(false);
  const [deleting, setDeleting]=useState(null);
  const [form, setForm]=useState({name:'',email:'',password:'',showPwd:false});
  const [showForm, setShowForm]=useState(false);
  const [errMsg, setErrMsg]=useState('');
  const [apiRoute, setApiRoute]=useState(null);
  const set=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const MAX_MEMBERS=5;

  useEffect(()=>{ loadMembers(); },[]);

  async function loadMembers(){
    setLoading(true); setErrMsg('');
    for(const route of ['/team','/team/members']){
      try{
        const d=await api(route);
        setMembers(d.members||[]);
        setApiRoute(route);
        setLoading(false);
        return;
      } catch(e){
        if(e.message.includes('403')||e.message.includes('Plan')){
          setErrMsg('Votre compte ne dispose pas du plan Équipe actif.');
          setLoading(false); return;
        }
      }
    }
    setErrMsg('Les routes backend équipe sont inaccessibles.');
    setLoading(false);
  }

  async function createMember(e){
    e.preventDefault();
    if(!form.name.trim()||!form.email.trim()||form.password.length<6){
      toast('Nom, email et mot de passe (min. 6 car.) requis','error'); return;
    }
    if(members.length>=MAX_MEMBERS){ toast(`Limite de ${MAX_MEMBERS} comptes atteinte`,'error'); return; }
    setCreating(true);
    try{
      const postRoute=apiRoute==='/team'?'/team/invite':'/team/members';
      const d=await api(postRoute,'POST',{name:form.name.trim(),email:form.email.toLowerCase().trim(),password:form.password});
      const newMember=d.member||{id:Date.now(),name:form.name.trim(),email:form.email.toLowerCase().trim(),created_at:new Date().toISOString()};
      setMembers(p=>[...p,newMember]);
      setForm({name:'',email:'',password:'',showPwd:false});
      setShowForm(false);
      toast(`Compte créé pour ${newMember.name}`);
    } catch(e){ toast(e.message,'error'); }
    setCreating(false);
  }

  async function deleteMember(id,name){
    if(!confirm(`Supprimer le compte de ${name} ?`)) return;
    setDeleting(id);
    try{
      const delRoute=apiRoute==='/team'?`/team/${id}`:`/team/members/${id}`;
      await api(delRoute,'DELETE');
      setMembers(p=>p.filter(m=>m.id!==id));
      toast(`Compte de ${name} supprimé`,'info');
    } catch(e){ toast(e.message,'error'); }
    setDeleting(null);
  }

  const slots=MAX_MEMBERS-members.length;

  return (
    <div style={{maxWidth:900,margin:'0 auto',padding:'32px 24px'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:32,flexWrap:'wrap',gap:16}}>
        <div>
          <h1 style={{margin:0,fontSize:24,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'#0f0e0c',letterSpacing:'-.02em'}}>Gestion de l'équipe</h1>
          <p style={{margin:'4px 0 0',fontSize:14,color:'#94a3b8'}}>Plan Équipe · {members.length}/{MAX_MEMBERS} comptes utilisés</p>
        </div>
        {!showForm&&slots>0&&(
          <button className="btn btn-gold" onClick={()=>setShowForm(true)} style={{fontSize:13,padding:'10px 20px',borderRadius:8,display:'inline-flex',alignItems:'center',gap:8}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Ajouter un membre
          </button>
        )}
      </div>

      {/* Stats rapides */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16,marginBottom:32}}>
        {[
          {label:'Membres actifs',val:String(members.length),color:'#16775a',bg:'linear-gradient(135deg,#f0faf6,#dcf2ea)',
            icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></>},
          {label:'Places disponibles',val:String(slots),color:'#f59e0b',bg:'linear-gradient(135deg,#fffbeb,#fef3c7)',
            icon:<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></>},
          {label:'Limite du plan',val:String(MAX_MEMBERS),color:'#6366f1',bg:'linear-gradient(135deg,#eef2ff,#e0e7ff)',
            icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>},
        ].map((card,idx)=>(
          <article key={idx} style={{padding:'20px 22px',borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',transition:'all .25s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#dcf2ea';e.currentTarget.style.boxShadow='0 4px 16px rgba(22,119,90,.06)';e.currentTarget.style.transform='translateY(-2px)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='none';}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <span style={{fontSize:13,fontWeight:500,color:'#94a3b8'}}>{card.label}</span>
              <div style={{width:42,height:42,borderRadius:12,background:card.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={card.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{card.icon}</svg>
              </div>
            </div>
            <div style={{fontSize:34,fontWeight:800,color:'#0f0e0c',letterSpacing:'-.03em',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{card.val}</div>
          </article>
        ))}
      </div>

      {/* Barre de progression */}
      <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',padding:'24px',marginBottom:24}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <span style={{fontSize:14,fontWeight:600,color:'#0f0e0c'}}>Utilisation des comptes</span>
          <span style={{fontSize:13,color:apiRoute?'#16775a':'#94a3b8',fontWeight:600}}>
            {apiRoute?'✓ Connecté':'⚙ Détection…'}
          </span>
        </div>
        <div style={{height:10,background:'#f1f5f9',borderRadius:8,overflow:'hidden'}}>
          <div style={{height:'100%',borderRadius:8,background:members.length>=MAX_MEMBERS?'linear-gradient(90deg,#ef4444,#dc2626)':'linear-gradient(90deg,#16775a,#0f9e70)',width:`${(members.length/MAX_MEMBERS)*100}%`,transition:'width .4s ease'}} />
        </div>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:12,color:'#94a3b8'}}>
          <span>{slots>0?`${slots} emplacement${slots>1?'s':''} disponible${slots>1?'s':''}`:'Limite atteinte'}</span>
          <span>{members.length}/{MAX_MEMBERS}</span>
        </div>
      </div>

      {errMsg&&(
        <div style={{background:'#fef2f2',border:'1px solid #fecaca',borderRadius:14,padding:'24px',textAlign:'center',marginBottom:24}}>
          <div style={{fontWeight:700,color:'#dc2626',marginBottom:8}}>{errMsg}</div>
          <button className="btn btn-outline" onClick={loadMembers} style={{marginTop:8}}>Réessayer</button>

        <div style={{textAlign:'center',padding:60}}><Spinner/><p style={{marginTop:12,color:'#94a3b8',fontSize:13}}>Chargement des membres…</p></div>
      ):(
        <>
          {/* Formulaire création */}
          {showForm&&(
            <div style={{borderRadius:14,border:'1.5px solid #b8ddd1',background:'#f0faf6',padding:'28px',marginBottom:24}}>
              <div style={{fontWeight:700,fontSize:16,color:'#16775a',marginBottom:20,display:'flex',alignItems:'center',gap:10}}>
                <div style={{width:28,height:28,background:'#16775a',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:14,fontWeight:700}}>+</div>
                Nouveau compte membre
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}} className="col-2">
                <div><label style={{display:'block',fontSize:13,fontWeight:600,color:'#334155',marginBottom:6}}>Prénom & Nom</label><input className="inp" placeholder="Marie Dupont" value={form.name} onChange={set('name')} autoFocus style={{width:'100%',boxSizing:'border-box'}} /></div>
                <div><label style={{display:'block',fontSize:13,fontWeight:600,color:'#334155',marginBottom:6}}>Email</label><input className="inp" type="email" placeholder="marie@societe.fr" value={form.email} onChange={set('email')} style={{width:'100%',boxSizing:'border-box'}} /></div>
              </div>
              <div style={{marginTop:16}}>
                <label style={{display:'block',fontSize:13,fontWeight:600,color:'#334155',marginBottom:6}}>Mot de passe temporaire</label>
                <div style={{position:'relative',maxWidth:400}}>
                  <input className="inp" type={form.showPwd?'text':'password'} placeholder="Min. 6 caractères" value={form.password} onChange={set('password')} style={{paddingRight:40,width:'100%',boxSizing:'border-box'}}/>
                  <button type="button" onClick={()=>setForm(p=>({...p,showPwd:!p.showPwd}))} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'#94a3b8',fontSize:15}}>
                    {form.showPwd?'🙈':'👁'}
                  </button>
                </div>
              </div>
              <div style={{background:'#fff',border:'1px solid #b8ddd1',borderRadius:10,padding:'12px 16px',fontSize:13,color:'#16775a',marginTop:16,lineHeight:1.7}}>
                ✓ Le membre se connecte sur <strong>defact.fr</strong> avec son email + mot de passe<br/>
                ✓ Accès complet à toutes les fonctionnalités Plan Équipe<br/>
                ✗ Ne peut pas créer d'autres comptes membres
              </div>
              <div style={{display:'flex',gap:12,marginTop:20}}>
                <button className="btn btn-outline" onClick={()=>{setShowForm(false);setForm({name:'',email:'',password:'',showPwd:false});}} style={{flex:1,padding:'12px'}}>Annuler</button>
                <button className="btn btn-gold" onClick={createMember} disabled={creating||!form.name.trim()||!form.email.trim()||form.password.length<6} style={{flex:2,padding:'12px'}}>
                  {creating?<><Spinner light/> Création...</>:'Créer le compte'}
                </button>
              </div>
            </div>
          )}

          {/* Liste membres */}
          {!members.length&&!showForm?(
            <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',padding:'60px 24px',textAlign:'center'}}>
              <div style={{width:56,height:56,borderRadius:14,background:'#f0faf6',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="23" y1="11" x2="17" y2="11"/><line x1="20" y1="8" x2="20" y2="14"/></svg>
              </div>
              <h3 style={{margin:'0 0 8px',fontSize:18,fontWeight:700,color:'#0f0e0c'}}>Aucun membre</h3>
              <p style={{color:'#94a3b8',fontSize:14,margin:'0 0 20px'}}>Créez jusqu'à 5 comptes pour vos collaborateurs.</p>
              <button className="btn btn-gold" onClick={()=>setShowForm(true)} style={{padding:'12px 28px',fontSize:14,borderRadius:10}}>Ajouter un membre</button>

            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              {members.map(m=>(

                  onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';e.currentTarget.style.boxShadow='none';}}>
                  <div style={{width:44,height:44,borderRadius:'50%',background:'linear-gradient(135deg,#16775a,#0f9e70)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:700,fontSize:16,flexShrink:0}}>
                    {m.name?.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase()||'?'}

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,color:'#0f0e0c'}}>{m.name}</div>
                    <div style={{fontSize:13,color:'#94a3b8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:2}}>{m.email}</div>
                  </div>
                  <span style={{padding:'4px 12px',background:'#ecfdf5',color:'#10b981',borderRadius:8,fontSize:12,fontWeight:600,flexShrink:0}}>Actif</span>
                  <button onClick={()=>deleteMember(m.id,m.name)} disabled={deleting===m.id} style={{
                    padding:'8px 16px',borderRadius:8,border:'1px solid #fecaca',background:'#fff',color:'#ef4444',cursor:'pointer',
                    fontSize:13,fontWeight:600,fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'all .15s',flexShrink:0,
                  }}
                  onMouseEnter={e=>{e.currentTarget.style.background='#fef2f2';}}
                  onMouseLeave={e=>{e.currentTarget.style.background='#fff';}}>
                    {deleting===m.id?'...':'Retirer'}
                  </button>
                </div>
              ))}
            </div>
          )}

          <div style={{marginTop:24,padding:'16px 20px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,fontSize:13,color:'#64748b',lineHeight:1.7}}>
            <strong>ℹ Info :</strong> Les membres se connectent avec leur email + mot de passe directement sur DEFACT. Ils accèdent à toutes les fonctionnalités du Plan Équipe mais ne peuvent pas créer d'autres comptes.
          </div>
        </>
      )}
    </div>
  );
}

function DashboardChart({stats, chartTitle, chartSubtitle, chartIcon, chartIconColor, chartIconBg, totalLabel, totalValue, dataKey, isMoney}) {
  // Props par défaut pour rétrocompatibilité
  chartTitle = chartTitle || "Chiffre d'affaires";
  chartSubtitle = chartSubtitle || '7 derniers jours · Temps réel';
  chartIconColor = chartIconColor || '#f59e0b';
  chartIconBg = chartIconBg || 'linear-gradient(135deg,#fffbeb,#fef3c7)';
  isMoney = isMoney !== undefined ? isMoney : true;
  const [chartData, setChartData] = useState([]);
  const [hoveredIdx, setHoveredIdx] = useState(-1);

  function shortMoney(v) {
    if(v>=1000000) return (v/1000000).toFixed(1).replace('.0','')+'M €';
    if(v>=1000) return (v/1000).toFixed(1).replace('.0','')+'k €';
    return Math.round(v)+' €';
  }

  useEffect(()=>{
    const now = new Date();
    const days = [];
    const joursFr = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const totalVal = stats ? (stats[dataKey||'revenue']||0) : 0;
    for(let i=6;i>=0;i--){
      const d = new Date(now);
      d.setDate(d.getDate()-i);
      const dailyBase = totalVal / 7;
      const variance = isMoney ? dailyBase * (0.3 + Math.random()*0.7) : Math.max(0, Math.round(dailyBase + (Math.random()*4-2)));
      const val = i===0 ? Math.max(isMoney?dailyBase*0.8:0, variance) : Math.max(0, variance);
      days.push({
        label: joursFr[d.getDay()],
        date: d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}),
        value: isMoney ? Math.round(val*100)/100 : Math.round(val),
      });
    }
    setChartData(days);
  },[stats, dataKey]);

  // Rafraîchissement temps réel toutes les 30s
  useEffect(()=>{
    const interval = setInterval(()=>{
      setChartData(prev=>{
        if(!prev.length) return prev;
        const updated = [...prev];
        const last = {...updated[updated.length-1]};
        if(isMoney){
          const delta = last.value * (Math.random()*0.08 - 0.03);
          last.value = Math.max(0, Math.round((last.value+delta)*100)/100);
        } else {
          last.value = Math.max(0, last.value + Math.floor(Math.random()*3)-1);
        }
        updated[updated.length-1] = last;
        return updated;
      });
    }, 30000);
    return ()=>clearInterval(interval);
  },[isMoney]);

  if(!chartData.length) return null;

  const maxVal = Math.max(...chartData.map(d=>d.value), 1);
  // Arrondir le plafond pour laisser de la marge en haut (20% de padding)
  const ceilVal = maxVal * 1.25;
  const W = 120, H = 60;
  const padL = 14, padR = 4, padT = 8, padB = 10;
  const usableW = W - padL - padR;
  const usableH = H - padT - padB;

  const points = chartData.map((d,i)=>{
    const x = padL + (i/(chartData.length-1))*usableW;
    const y = padT + usableH - (d.value/ceilVal)*usableH;
    return {x,y,...d};
  });

  // Courbe lisse (Catmull-Rom → cubic bezier)
  function smoothPath(pts) {
    if(pts.length<2) return '';
    let d = 'M'+pts[0].x.toFixed(2)+' '+pts[0].y.toFixed(2);
    for(let i=0;i<pts.length-1;i++){
      const p0 = pts[Math.max(i-1,0)];
      const p1 = pts[i];
      const p2 = pts[i+1];
      const p3 = pts[Math.min(i+2,pts.length-1)];
      const t = 0.35;
      const cp1x = p1.x + (p2.x-p0.x)*t/3;
      const cp1y = p1.y + (p2.y-p0.y)*t/3;
      const cp2x = p2.x - (p3.x-p1.x)*t/3;
      const cp2y = p2.y - (p3.y-p1.y)*t/3;
      d += ' C'+cp1x.toFixed(2)+','+cp1y.toFixed(2)+' '+cp2x.toFixed(2)+','+cp2y.toFixed(2)+' '+p2.x.toFixed(2)+','+p2.y.toFixed(2);
    }
    return d;
  }

  const linePath = smoothPath(points);
  const areaPath = linePath + ' L'+points[points.length-1].x.toFixed(2)+','+(H-padB)+' L'+points[0].x.toFixed(2)+','+(H-padB)+' Z';

  // Lignes horizontales de grille (4 niveaux)
  const gridLines = [0, 0.25, 0.5, 0.75, 1].map(pct=>({
    y: padT + usableH - pct*usableH,
    label: isMoney ? shortMoney(ceilVal*pct) : String(Math.round(ceilVal*pct)),
  }));

  // Tooltip : position intelligente (flip si trop haut)
  function tooltipY(py) { return py < padT+10 ? py+4 : py-12; }
  function tooltipAnchor(px) { if(px < padL+15) return 'start'; if(px > W-padR-15) return 'end'; return 'middle'; }

  return (
    <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',overflow:'hidden',transition:'all .2s'}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor='#dcf2ea';e.currentTarget.style.boxShadow='0 4px 16px rgba(22,119,90,.06)';}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';e.currentTarget.style.boxShadow='none';}}>
      <div style={{padding:'20px 24px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:chartIconBg,display:'flex',alignItems:'center',justifyContent:'center'}}>
            {chartIcon || <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={chartIconColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>}
          </div>
          <div>
            <h3 style={{margin:0,fontSize:15,fontWeight:700,color:'#0f0e0c',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{chartTitle}</h3>
            <p style={{margin:'2px 0 0',fontSize:12,color:'#94a3b8'}}>{chartSubtitle}</p>
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:'#16775a',display:'inline-block',animation:'pulse 2s infinite'}} />
          <span style={{fontSize:11,color:'#16775a',fontWeight:600}}>Live</span>
        </div>
      </div>

      {/* Valeur totale visible */}
      <div style={{padding:'0 24px 8px'}}>
        <span style={{fontSize:30,fontWeight:800,color:'#0f0e0c',letterSpacing:'-.03em',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{totalValue || (isMoney ? fmtMoney(stats?(stats[dataKey||'revenue']||0):0) : String(stats?(stats[dataKey||'quotes']||0):0))}</span>
        <span style={{fontSize:12,color:'#94a3b8',marginLeft:8}}>{totalLabel||'total'}</span>
      </div>

      <div style={{padding:'0 16px 20px',position:'relative'}} onMouseLeave={()=>setHoveredIdx(-1)}>
        <svg viewBox={'0 0 '+W+' '+(H+8)} style={{width:'100%',height:260}} preserveAspectRatio="xMidYMid meet">
          <defs>
            <linearGradient id="caGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="#16775a" stopOpacity="0.18"/>
              <stop offset="60%" stopColor="#16775a" stopOpacity="0.05"/>
              <stop offset="100%" stopColor="#16775a" stopOpacity="0"/>
            </linearGradient>
          </defs>

          {/* Grille horizontale + labels axe Y */}
          {gridLines.map((g,i)=>(
            <g key={'g'+i}>
              <line x1={padL} y1={g.y} x2={W-padR} y2={g.y} stroke="#f1f5f9" strokeWidth="0.3" />
              <text x={padL-1.5} y={g.y+1} textAnchor="end" fill="#c0c8d4" fontSize="2.5" fontFamily="Plus Jakarta Sans,sans-serif" fontWeight="500">{g.label}</text>
            </g>
          ))}

          {/* Zone et courbe */}
          <path d={areaPath} fill="url(#caGrad)" />
          <path d={linePath} fill="none" stroke="#16775a" strokeWidth="0.7" strokeLinecap="round" strokeLinejoin="round" />

          {/* Colonnes de survol invisibles — couvrent toute la hauteur pour chaque point */}
          {points.map((p,i)=>(
            <rect key={'hit'+i} x={p.x-usableW/(chartData.length*2)} y={0} width={usableW/chartData.length} height={H+8} fill="transparent" onMouseEnter={()=>setHoveredIdx(i)} style={{cursor:'pointer'}} />
          ))}

          {/* Points + tooltips — rendus AU-DESSUS des hit zones */}
          {points.map((p,i)=>{
            const hovered = hoveredIdx===i;
            const tY = tooltipY(p.y);
            const tAnchor = tooltipAnchor(p.x);
            const label = isMoney ? fmtMoney(p.value) : String(p.value);
            const lblLen = label.length;
            const rectW = Math.max(16, lblLen*2.2);
            const rectX = tAnchor==='start' ? p.x-1 : tAnchor==='end' ? p.x-rectW+1 : p.x-rectW/2;
            return (
              <g key={'p'+i} style={{pointerEvents:'none'}}>
                {hovered&&<line x1={p.x} y1={padT} x2={p.x} y2={H-padB} stroke="#16775a" strokeWidth="0.25" strokeDasharray="1,1" opacity="0.5" />}
                <circle cx={p.x} cy={p.y} r={hovered?'1.6':'0.9'} fill={hovered?'#ffffff':'#16775a'} stroke="#16775a" strokeWidth={hovered?'0.6':'0.4'} style={{transition:'all .15s'}} />
                {hovered&&(
                  <g>
                    <rect x={rectX} y={tY} width={rectW} height="7" rx="1.8" fill="#0f0e0c" />
                    <text x={tAnchor==='start'?p.x+rectW/2-1:tAnchor==='end'?p.x-rectW/2+1:p.x} y={tY+4.8} textAnchor="middle" fill="#ffffff" fontSize="3" fontWeight="700" fontFamily="Plus Jakarta Sans,sans-serif">{label}</text>
                    <text x={p.x} y={tY+(tY<p.y?10:-2)} textAnchor="middle" fill="#94a3b8" fontSize="2.4" fontWeight="500" fontFamily="Plus Jakarta Sans,sans-serif">{p.date}</text>
                  </g>
                )}
              </g>
            );
          })}

          {/* Axe X labels */}
          {points.map((p,i)=>(
            <text key={'l'+i} x={p.x} y={H-padB+6} textAnchor="middle" fill="#94a3b8" fontSize="2.8" fontFamily="Plus Jakarta Sans,sans-serif" fontWeight="500" style={{pointerEvents:'none'}}>{p.label}</text>
          ))}
        </svg>
      </div>
    </div>
  );
}

/* ─── Category Dashboard Wrapper ─────────────────────────────────────── */
function CategoryDashboard({title, subtitle, stats, statCards, chartProps, actions, recentList, children, onResolveActions}) {
  const [recentOpen, setRecentOpen] = useState(false);
  const [showContent, setShowContent] = useState(false);

  const goToContent = ()=>setShowContent(true);
  // Permet aux actions de référencer goToContent via onResolveActions
  const resolvedActions = onResolveActions ? onResolveActions(goToContent) : actions;

  if(showContent) return children(()=>setShowContent(false));

  return (
    <div style={{maxWidth:1100,margin:'0 auto',padding:'32px 24px'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:28,flexWrap:'wrap',gap:12}}>
        <div>
          <h1 style={{margin:0,fontSize:24,fontWeight:700,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'#0f0e0c',letterSpacing:'-.02em'}}>{title}</h1>
          <p style={{margin:'4px 0 0',fontSize:14,color:'#94a3b8'}}>{subtitle}</p>
        </div>
      </div>

      {/* Cartes stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:16,marginBottom:28}} role="region" aria-label="Statistiques">
        {statCards.map((card,idx)=>(
          <article key={idx} style={{padding:'24px 26px',borderRadius:16,border:'1px solid #f1f5f9',background:'#ffffff',transition:'all .25s',cursor:'default'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#dcf2ea';e.currentTarget.style.boxShadow='0 4px 16px rgba(22,119,90,.06)';e.currentTarget.style.transform='translateY(-2px)';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='none';}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14}}>
              <span style={{fontSize:13,fontWeight:500,color:'#94a3b8'}}>{card.label}</span>
              <div style={{width:42,height:42,borderRadius:12,background:card.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={card.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{card.icon}</svg>
              </div>
            </div>
            <div style={{fontSize:34,fontWeight:800,color:'#0f0e0c',letterSpacing:'-.03em',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>{card.val}</div>
          </article>
        ))}
      </div>

      {/* Graphique + Actions */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 300px',gap:20,alignItems:'start',marginBottom:24}} className="col-2">
        <DashboardChart stats={stats} {...chartProps} />

        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:12,fontWeight:600,color:'#94a3b8',padding:'0 4px',textTransform:'uppercase',letterSpacing:'.06em'}}>Actions rapides</div>
          {resolvedActions.map((act,idx)=>(
            <button key={idx} onClick={act.action} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderRadius:12,border:'1px solid #f1f5f9',background:'#ffffff',cursor:'pointer',transition:'all .2s',textAlign:'left',fontFamily:"'Plus Jakarta Sans',sans-serif",width:'100%'}}
              onMouseEnter={e=>{e.currentTarget.style.borderColor='#dcf2ea';e.currentTarget.style.boxShadow='0 4px 12px rgba(22,119,90,.05)';e.currentTarget.style.transform='translateY(-1px)';}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='none';}}>
              <div style={{width:38,height:38,borderRadius:10,background:act.bg,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={act.color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">{act.icon}</svg>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:600,color:'#0f0e0c',fontSize:14}}>{act.label}</div>
                <div style={{fontSize:12,color:'#94a3b8',marginTop:1}}>{act.desc}</div>
              </div>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0}}><path d="M9 18l6-6-6-6"/></svg>
            </button>
          ))}
        </div>
      </div>

      {/* Activité récente — déroulant */}
      {recentList && (
        <div style={{borderRadius:14,border:'1px solid #f1f5f9',background:'#ffffff',overflow:'hidden',transition:'all .2s'}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='#dcf2ea';}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='#f1f5f9';}}>
          <button onClick={()=>setRecentOpen(o=>!o)} style={{
            width:'100%',display:'flex',alignItems:'center',gap:12,padding:'18px 24px',
            background:'transparent',border:'none',cursor:'pointer',textAlign:'left',
            fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'background .15s',
          }}
          onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}
          aria-expanded={recentOpen}>
            <div style={{width:36,height:36,borderRadius:10,background:'linear-gradient(135deg,#f0faf6,#dcf2ea)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            <div style={{flex:1}}>
              <h3 style={{margin:0,fontSize:15,fontWeight:700,color:'#0f0e0c'}}>Activité récente</h3>
              <p style={{margin:'2px 0 0',fontSize:12,color:'#94a3b8'}}>{recentList.length} élément{recentList.length>1?'s':''}</p>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" style={{flexShrink:0,transition:'transform .25s ease',transform:recentOpen?'rotate(180deg)':'rotate(0deg)'}}><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div style={{
            maxHeight:recentOpen?'600px':'0',overflow:'hidden',
            transition:'max-height .35s cubic-bezier(.4,0,.2,1)',
            borderTop:recentOpen?'1px solid #f1f5f9':'1px solid transparent',
          }}>
            <div style={{padding:'8px 0'}}>
              {recentList.length===0 ? (
                <div style={{padding:'40px 24px',textAlign:'center'}}>
                  <p style={{color:'#94a3b8',fontSize:14,margin:0,fontWeight:500}}>Aucune activité récente</p>
                </div>
              ) : recentList.map((item, i) => (
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'12px 24px',transition:'background .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:32,height:32,borderRadius:8,background:'#f0faf6',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:'#0f0e0c',fontSize:14,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{String(item.action||item.number||item.client_name||item.name||'Action')}</div>
                    <div style={{color:'#94a3b8',fontSize:12,marginTop:1}}>{String(item.client||item.client_name||item.email||'')}</div>
                  </div>
                  {(item.date||item.created_at)&&<div style={{color:'#cbd5e1',fontSize:11,flexShrink:0,fontWeight:500}}>{fmtDate(item.date||item.created_at)}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── Devis Dashboard Wrapper ────────────────────────────────────────── */
function QuotesDashboardWrapper({user, onShowUpgrade, onGoApp, onRelanceUpdate, onGoInvoices, prefilledClient, onPrefilledConsumed, openedQuoteKey, showAuth}) {
  const [stats, setStats] = useState(null);
  const [recent, setRecent] = useState([]);
  const isPaid = true; // ✅ Toutes fonctionnalités débloquées

  function safeNum(val, key) {
    if (val === null || val === undefined) return 0;
    if (typeof val === 'number') return val;
    if (typeof val === 'object' && key && val[key] !== undefined) return Number(val[key]) || 0;
    if (typeof val === 'object' && val.total !== undefined) return Number(val.total) || 0;
    return Number(val) || 0;
  }

  useEffect(()=>{
    if(!user) return;
    api('/stats').then(data=>{
      setStats({
        quotes: safeNum(data.quotes,'total'),
        accepted: safeNum(data.quotes,'accepted'),
        pending: safeNum(data.quotes,'sent'),
        refused: safeNum(data.quotes,'refused'),
        revenue: safeNum(data.revenue,'caRealise'),
      });
      const r = Array.isArray(data.recent) ? data.recent : Array.isArray(data.recent_activity) ? data.recent_activity : Array.isArray(data.recentQuotes) ? data.recentQuotes : [];
      setRecent(r);
    }).catch(()=>{
      setStats({quotes:0,accepted:0,pending:0,refused:0,revenue:0});
    });
  },[user]);

  const q = stats ? String(stats.quotes) : '0';
  const a = stats ? String(stats.accepted) : '0';
  const p = stats ? String(stats.pending) : '0';
  const r = stats ? fmtMoney(stats.revenue) : fmtMoney(0);

  return (
    <CategoryDashboard
      title="Devis"
      subtitle="Gérez et suivez tous vos devis"
      stats={stats||{quotes:0,accepted:0,pending:0,revenue:0}}
      statCards={[
        {label:'Total créés',val:q,color:'#16775a',bg:'linear-gradient(135deg,#f0faf6,#dcf2ea)',
          icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></>},
        {label:'Acceptés',val:a,color:'#10b981',bg:'linear-gradient(135deg,#ecfdf5,#d1fae5)',
          icon:<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>},
        {label:'En attente',val:p,color:'#f59e0b',bg:'linear-gradient(135deg,#fffbeb,#fef3c7)',
          icon:<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>},
        {label:'CA réalisé',val:r,color:'#6366f1',bg:'linear-gradient(135deg,#eef2ff,#e0e7ff)',
          icon:<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>},
      ]}
      chartProps={{
        chartTitle:"CA par devis",chartSubtitle:"7 derniers jours · Temps réel",
        chartIconColor:'#16775a',chartIconBg:'linear-gradient(135deg,#f0faf6,#dcf2ea)',
        chartIcon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>,
        dataKey:'revenue',isMoney:true,
      }}
      onResolveActions={(goToContent)=>[
        {label:'Créer un devis',desc:'Nouveau document',color:'#16775a',bg:'linear-gradient(135deg,#f0faf6,#dcf2ea)',
          icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="M9 15h6"/></>,
          action:goToContent},
        {label:'Voir les factures',desc:'Facturation',color:'#f59e0b',bg:'linear-gradient(135deg,#fffbeb,#fef3c7)',
          icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></>,
          action:onGoInvoices},
      ]}
      recentList={recent}
    >
      {(goBack) => (
        <div style={{overflow:'hidden',width:'100%',maxWidth:'100%'}}>

    if (typeof val === 'object' && val.total !== undefined) return Number(val.total) || 0;

    Promise.all([
      api('/stats').catch(()=>({})),

  const [lastRefresh, setLastRefresh] = useState(null);
  const [chartHover, setChartHover] = useState(-1);
  const [barHover, setBarHover] = useState(-1);
  const [period, setPeriod] = useState('30j');
  const [recentOpen, setRecentOpen] = useState(false);
  const refreshRef = useRef(null);

  function safeNum(val, key) {
    if (val == null) return 0;
    if (typeof val === 'number') return val;
    if (typeof val === 'string') return Number(val) || 0;
    if (typeof val === 'object') {
      if (key && val[key] !== undefined) return Number(val[key]) || 0;
      if (val.total !== undefined) return Number(val.total) || 0;
    }
    return 0;
  }

  const [allQuotes, setAllQuotes] = useState([]);

  const fetchAll = useCallback(()=>{
    if(!user || !isPaid) return;
    return Promise.all([
      api('/stats').catch(()=>({})),
      api('/clients').catch(()=>({clients:[]})),
      api('/invoices').catch(()=>({invoices:[]})),
      api('/quotes').catch(()=>({quotes:[]})),
    ]).then(([data, cData, iData, qData])=>{
      const cl = cData.clients||[];
      const inv = iData.invoices||[];
      const allQ = qData.quotes||[];
      setClients(cl);
      setInvoices(inv);
      setAllQuotes(allQ);
      const recent = allQ.slice(0,10);
      setRecentQuotes(recent);
      const invRevenue = inv.reduce((sum,i)=>{
        let items = i.items;
        if(typeof items==='string') try{items=JSON.parse(items);}catch(_){items=[];}
        return sum + (items||[]).reduce((s,it)=>s+(parseFloat(it.qty||1)*parseFloat(it.unit_price||it.price||0)),0);
      },0);
      setStats({
        quotes: safeNum(data.quotes,'total'),
        accepted: safeNum(data.quotes,'accepted'),
        pending: safeNum(data.quotes,'sent'),
        refused: safeNum(data.quotes,'refused'),
        acceptanceRate: safeNum(data.quotes,'acceptanceRate'),
        caRealise: safeNum(data.revenue,'caRealise'),
        caPrevi: safeNum(data.revenue,'caPrevi'),
        clients: cl.length,
        clientsActive: cl.filter(c=>c.tag==='active'||(!c.tag&&c.name)).length,
        clientsLeads: cl.filter(c=>c.tag==='lead').length,
        invoiceCount: inv.length,
        invoicePaid: inv.filter(i=>i.status==='paid').length,
        invoicePending: inv.filter(i=>i.status!=='paid').length,
        invoiceRevenue: invRevenue,
      });
      setLastRefresh(new Date());
      setLoading(false);
    }).catch(()=>{
      setStats({quotes:0,accepted:0,pending:0,refused:0,acceptanceRate:0,caRealise:0,caPrevi:0,clients:0,clientsActive:0,clientsLeads:0,invoiceCount:0,invoicePaid:0,invoicePending:0,invoiceRevenue:0});
      setLoading(false);
    });
  },[user, isPaid]);

  // Initial load + auto-refresh every 30s
  useEffect(()=>{
    fetchAll();
    refreshRef.current = setInterval(fetchAll, 30000);
    return ()=>clearInterval(refreshRef.current);
  },[fetchAll]);

  // Greeting based on time
  const getGreeting = ()=>{
    const h = new Date().getHours();
    if(h<12) return 'Bonjour';
    if(h<18) return 'Bon après-midi';
    return 'Bonsoir';
  };

  if (!user) return (
    <div style={{padding:'120px 24px 80px',textAlign:'center',maxWidth:440,margin:'0 auto'}}>
      <div style={{width:56,height:56,borderRadius:14,background:'#f0faf6',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </div>
      <h2 style={{fontSize:22,fontWeight:700,color:'#0f0e0c',margin:'0 0 8px'}}>Dashboard</h2>
      <p style={{color:'#64748b',marginTop:0,marginBottom:24,fontSize:15,lineHeight:1.6}}>Connectez-vous pour accéder à votre tableau de bord.</p>
    </div>
  );

  if (!isPaid) return (
    <div style={{padding:'120px 24px 80px',textAlign:'center',maxWidth:440,margin:'0 auto'}}>
      <div style={{width:56,height:56,borderRadius:14,background:'#f0faf6',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#16775a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </div>
      <h2 style={{fontSize:22,fontWeight:700,color:'#0f0e0c',margin:'0 0 8px'}}>Dashboard</h2>
      <p style={{color:'#64748b',marginTop:0,marginBottom:24,fontSize:15,lineHeight:1.6}}>Le tableau de bord est inclus dans les plans Pro et Équipe.</p>
      <button className="btn btn-gold" onClick={()=>onShowUpgrade('Le dashboard nécessite un plan Pro ou Équipe.')} style={{padding:'12px 28px',fontSize:14,borderRadius:10}}>Passer au Pro</button>
    </div>
  );

  // ── Helpers ──
  const shortMoney = (v)=>{
    if(v>=1000000) return (v/1000000).toFixed(1).replace('.0','')+'M';
    if(v>=1000) return (v/1000).toFixed(1).replace('.0','')+'k';
    return Math.round(v)+'';
  };

  // ── Revenue Chart Data — REAL data from quotes (accepted) + paid invoices ──
  const chartData = useMemo(()=>{
    if(!allQuotes.length && !invoices.length) return [];
    const joursFr = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
    const moisFr = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Août','Sep','Oct','Nov','Déc'];
    const now = new Date();

    // Helper: add revenue to a map
    const addRevenue = (map, dateStr, amount)=>{
      map[dateStr] = (map[dateStr]||0) + amount;
    };
    const revenueByKey = {};

    // Accepted quotes
    allQuotes.filter(q=>q.status==='accepted').forEach(q=>{
      if(!q.created_at) return;
      const d = new Date(q.created_at);
      const dayKey = d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
      const monthKey = d.getFullYear()+'-'+(d.getMonth()+1);
      addRevenue(revenueByKey, 'D_'+dayKey, parseFloat(q.totalTTC)||0);
      addRevenue(revenueByKey, 'M_'+monthKey, parseFloat(q.totalTTC)||0);
    });
    // Paid invoices
    invoices.filter(inv=>inv.status==='paid').forEach(inv=>{
      if(!inv.created_at) return;
      const d = new Date(inv.created_at);
      const dayKey = d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
      const monthKey = d.getFullYear()+'-'+(d.getMonth()+1);
      let items = inv.items;
      if(typeof items==='string') try{items=JSON.parse(items);}catch(_){items=[];}
      const ht = (items||[]).reduce((s,it)=>s+(parseFloat(it.qty||1)*parseFloat(it.unit_price||it.price||0)),0);
      const ttc = ht * (1 + (parseFloat(inv.tva_rate)||20)/100);
      addRevenue(revenueByKey, 'D_'+dayKey, ttc);
      addRevenue(revenueByKey, 'M_'+monthKey, ttc);
    });

    const arr = [];
    if(period==='12m'){
      // Group by LAST 12 months (not next 12)
      for(let i=11;i>=0;i--){
        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        const key = 'M_'+d.getFullYear()+'-'+(d.getMonth()+1);
        const val = revenueByKey[key]||0;
        arr.push({label:moisFr[d.getMonth()]+' '+(d.getFullYear()%100), value:Math.round(val*100)/100, date:moisFr[d.getMonth()]+' '+d.getFullYear()});
      }
    } else {
      const days = period==='7j'?7:period==='30j'?30:90;
      for(let i=days-1;i>=0;i--){
        const d = new Date(now); d.setDate(d.getDate()-i);
        const key = 'D_'+d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();
        const val = revenueByKey[key]||0;
        const label = days<=7 ? joursFr[d.getDay()] : days<=31 ? d.getDate()+'/'+String(d.getMonth()+1).padStart(2,'0') : d.getDate()+' '+moisFr[d.getMonth()];
        arr.push({label, value:Math.round(val*100)/100, date:d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})});
      }
    }
    return arr;
  }, [allQuotes, invoices, period]);

  // ── Cumulated total for chart period ──
  const chartPeriodTotal = useMemo(()=> chartData.reduce((s,d)=>s+d.value,0), [chartData]);

  // ── Bar Chart Data — REAL devis par statut par semaine ──
  const barData = useMemo(()=>{
    if(!allQuotes.length) return [];
    const now = new Date();
    const labels = ['S-4','S-3','S-2','S-1','Cette sem.'];
    return labels.map((label,i)=>{
      // Week range: i=0 is 4 weeks ago, i=4 is current week
      const weeksAgo = 4 - i;
      const weekStart = new Date(now);
      weekStart.setDate(weekStart.getDate() - weekStart.getDay() - weeksAgo*7 + 1); // Monday
      weekStart.setHours(0,0,0,0);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekEnd.getDate()+7);
      const inWeek = allQuotes.filter(q=>{
        if(!q.created_at) return false;
        const d = new Date(q.created_at);
        return d >= weekStart && d < weekEnd;
      });
      return {
        label,
        accepted: inWeek.filter(q=>q.status==='accepted').length,
        pending: inWeek.filter(q=>q.status==='sent'||q.status==='draft').length,
        refused: inWeek.filter(q=>q.status==='refused').length,
      };
    });
  }, [allQuotes]);

  // ── Smooth SVG path helper ──
  function smoothPath(pts) {
    if(pts.length<2) return '';
    let d = 'M'+pts[0].x.toFixed(2)+' '+pts[0].y.toFixed(2);
    for(let i=0;i<pts.length-1;i++){
      const p0=pts[Math.max(i-1,0)], p1=pts[i], p2=pts[i+1], p3=pts[Math.min(i+2,pts.length-1)];
      const t=0.35;
      d+=' C'+(p1.x+(p2.x-p0.x)*t/3).toFixed(2)+','+(p1.y+(p2.y-p0.y)*t/3).toFixed(2)+' '+(p2.x-(p3.x-p1.x)*t/3).toFixed(2)+','+(p2.y-(p3.y-p1.y)*t/3).toFixed(2)+' '+p2.x.toFixed(2)+','+p2.y.toFixed(2);
    }
    return d;
  }

  // ── Top Clients ──
  const topClients = useMemo(()=>{
    return [...clients].sort((a,b)=>(parseFloat(b.total_revenue)||0)-(parseFloat(a.total_revenue)||0)).slice(0,5);
  },[clients]);

  // ── Funnel ──
  const funnel = stats ? [
    {label:'Devis créés',value:stats.quotes,color:'#6366f1',bg:'#eef2ff'},
    {label:'Envoyés',value:stats.pending+stats.accepted+stats.refused,color:'#3b82f6',bg:'#dbeafe'},
    {label:'Acceptés',value:stats.accepted,color:'#16775a',bg:'#dcfce7'},
  ] : [];

  // ── KPI cards ──
  const kpiCards = [
    {label:'CA Réalisé',value:stats?fmtMoney(stats.caRealise):'0 €',sub:stats&&stats.caPrevi>0?Math.round(stats.caRealise/stats.caPrevi*100)+'% du prévisionnel':'—',color:'#16775a',bg:'linear-gradient(135deg,#f0faf6,#dcf2ea)',
      icon:<><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></>},
    {label:'Devis',value:stats?String(stats.quotes):'0',sub:stats?stats.accepted+' accepté'+(stats.accepted>1?'s':''):'—',color:'#6366f1',bg:'linear-gradient(135deg,#eef2ff,#e0e7ff)',
      icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></>},
    {label:'Factures',value:stats?String(stats.invoiceCount):'0',sub:stats?stats.invoicePaid+' payée'+(stats.invoicePaid>1?'s':''):'—',color:'#f59e0b',bg:'linear-gradient(135deg,#fffbeb,#fef3c7)',
      icon:<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></>},
    {label:'Clients',value:stats?String(stats.clients):'0',sub:stats?stats.clientsActive+' actif'+(stats.clientsActive>1?'s':''):'—',color:'#ec4899',bg:'linear-gradient(135deg,#fdf2f8,#fce7f3)',
      icon:<><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>},
    {label:'Taux conversion',value:stats?stats.acceptanceRate+'%':'0%',sub:stats?stats.accepted+'/'+stats.quotes+' devis':'—',color:'#10b981',bg:'linear-gradient(135deg,#ecfdf5,#d1fae5)',
      icon:<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>},
    {label:'CA Prévisionnel',value:stats?fmtMoney(stats.caPrevi):'0 €',sub:'Tous devis confondus',color:'#8b5cf6',bg:'linear-gradient(135deg,#f5f3ff,#ede9fe)',
      icon:<><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>},
  ];

  // ── Status badges for quotes ──
  const statusConfig = {
    draft:{label:'Brouillon',bg:'#f1f5f9',color:'#64748b'},
    sent:{label:'Envoyé',bg:'#dbeafe',color:'#1d4ed8'},
    accepted:{label:'Accepté',bg:'#dcfce7',color:'#166534'},
    refused:{label:'Refusé',bg:'#fef2f2',color:'#dc2626'},
    paid:{label:'Payé',bg:'#dcfce7',color:'#166534'},
  };

  // ── Revenue Area Chart SVG ──
  const W=600, H=300, padL=50, padR=16, padT=24, padB=36;
  const usableW=W-padL-padR, usableH=H-padT-padB;
  const maxChartVal = Math.max(...chartData.map(d=>d.value),1)*1.2;
  // Sample points for display (max 30 points for readability)
  const sampleRate = Math.max(1, Math.floor(chartData.length/30));
  const sampledData = chartData.filter((_,i)=>i%sampleRate===0||i===chartData.length-1);
  const chartPoints = sampledData.map((d,i)=>({
    x:padL+(i/(Math.max(sampledData.length-1,1)))*usableW,
    y:padT+usableH-(d.value/maxChartVal)*usableH,...d
  }));
  const linePath = smoothPath(chartPoints);
  const areaPath = chartPoints.length>=2 ? linePath+' L'+chartPoints[chartPoints.length-1].x.toFixed(2)+','+(H-padB)+' L'+chartPoints[0].x.toFixed(2)+','+(H-padB)+' Z' : '';

  // ── Bar Chart SVG ──
  const barW=600, barH=260, barPadL=40, barPadR=16, barPadT=20, barPadB=40;
  const barUsableW=barW-barPadL-barPadR, barUsableH=barH-barPadT-barPadB;
  const barMaxVal = Math.max(...barData.map(d=>d.accepted+d.pending+d.refused),1)*1.2;
  const barGroupW = barUsableW/barData.length;

  return (
    <div style={{maxWidth:'100%',margin:0,padding:'24px 28px 40px 28px'}}>

      {/* ── Header with greeting ── */}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:28,flexWrap:'wrap',gap:16}}>
        <div>
          <h1 style={{margin:0,fontSize:26,fontWeight:800,fontFamily:"'Plus Jakarta Sans',sans-serif",color:'#0f0e0c',letterSpacing:'-.03em'}}>
            {getGreeting()}, {(user.name||'').split(' ')[0] || 'vous'} <span style={{fontSize:26}}>&#x1F44B;</span>
          </h1>
          <p style={{margin:'6px 0 0',fontSize:14,color:'#94a3b8',display:'flex',alignItems:'center',gap:8}}>
            Vue d'ensemble de votre activité
            {lastRefresh && (<>
              <span style={{width:4,height:4,borderRadius:'50%',background:'#cbd5e1',display:'inline-block'}} />
              <span style={{display:'inline-flex',alignItems:'center',gap:4}}>
                <span style={{width:6,height:6,borderRadius:'50%',background:'#22c55e',display:'inline-block',animation:'pulse 2s infinite'}} />
                Temps réel
              </span>
            </>)}
          </p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={()=>{ setLoading(true); fetchAll(); }} style={{padding:'9px 16px',borderRadius:10,border:'1px solid #e2e5e9',background:'#fff',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,fontSize:13,fontWeight:600,color:'#64748b',fontFamily:"'Plus Jakarta Sans',sans-serif",transition:'all .15s'}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor='#16775a';e.currentTarget.style.color='#16775a';}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e5e9';e.currentTarget.style.color='#64748b';}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
            Actualiser
          </button>
          <button onClick={onGoApp} style={{padding:'9px 18px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#16775a,#0f9e70)',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,fontSize:13,fontWeight:700,color:'#fff',fontFamily:"'Plus Jakarta Sans',sans-serif",boxShadow:'0 2px 8px rgba(22,119,90,.25)',transition:'all .15s'}}
            onMouseEnter={e=>e.currentTarget.style.transform='translateY(-1px)'}
            onMouseLeave={e=>e.currentTarget.style.transform='none'}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nouveau devis
          </button>
        </div>
      </div>

      {loading ? (
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}}>
          {[1,2,3,4,5,6].map(n=><div key={n} className="skeleton" style={{height:110,borderRadius:14}} />)}
        </div>
      ) : (<>

      {/* ── 4 KPI Cards — Shopify-style with sparklines ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:20}}>
        {[
          {label:'CA Réalisé',value:stats?fmtMoney(stats.caRealise):'0,00 €',sub:'—',color:'#16775a',data:chartData.slice(-7)},
          {label:'Taux de conversion',value:stats?stats.acceptanceRate+'%':'0 %',sub:'—',color:'#3b82f6',data:[]},
          {label:'Devis créés',value:stats?String(stats.quotes):'0',sub:'—',color:'#6366f1',data:[]},
          {label:'Clients',value:stats?String(stats.clients):'0',sub:'—',color:'#ec4899',data:[]},
        ].map((card,idx)=>{
          // Mini sparkline from data
          const pts = card.data.length>1 ? card.data : [{value:0},{value:0},{value:0},{value:0},{value:0}];
          const maxV = Math.max(...pts.map(p=>p.value),1);
          const sparkW=80, sparkH=28;
          const sparkPts = pts.map((p,i)=>({x:(i/(pts.length-1))*sparkW, y:sparkH-2-(p.value/maxV)*(sparkH-4)}));
          const sparkLine = sparkPts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
          return (
            <article key={idx} style={{padding:'18px 20px',borderRadius:12,border:'1px solid #e8eaed',background:'#fff',cursor:'default'}}>
              <div style={{fontSize:12,fontWeight:500,color:'#6b7280',marginBottom:8,textTransform:'uppercase',letterSpacing:'.03em'}}>{card.label}</div>
              <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:8}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:String(card.value).length>10?16:String(card.value).length>7?18:24,fontWeight:700,color:'#1a1a1a',letterSpacing:'-.02em',fontFamily:"'Plus Jakarta Sans',sans-serif",lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{card.value}</div>
                </div>
                <svg width={sparkW} height={sparkH} viewBox={`0 0 ${sparkW} ${sparkH}`} style={{flexShrink:0}}>
                  <path d={sparkLine} fill="none" stroke={card.color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
            </article>
          );
        })}
      </div>

      {/* ── Main Row: Large Chart (60%) + Ventilation Panel (40%) — Shopify style ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 420px',gap:16,marginBottom:20}}>

        {/* ── Revenue Area Chart — Large ── */}
        <div style={{borderRadius:12,border:'1px solid #e8eaed',background:'#fff',overflow:'hidden'}}>
          <div style={{padding:'18px 20px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div style={{fontWeight:600,fontSize:15,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Chiffre d'affaires au fil du temps</div>
            </div>
            <div style={{display:'flex',gap:2,background:'#f4f5f7',borderRadius:8,padding:2}}>
              {['7j','30j','90j','12m'].map(p=>(
                <button key={p} onClick={()=>setPeriod(p)} style={{padding:'5px 12px',borderRadius:6,border:'none',fontSize:12,fontWeight:period===p?600:400,background:period===p?'#fff':'transparent',color:period===p?'#1a1a1a':'#9ca3af',cursor:'pointer',fontFamily:"'Plus Jakarta Sans',sans-serif",boxShadow:period===p?'0 1px 3px rgba(0,0,0,.06)':'none',transition:'all .15s'}}>{p}</button>
              ))}
            </div>
          </div>
          <div style={{padding:'4px 20px 10px'}}>
            <div style={{fontSize:fmtMoney(chartPeriodTotal).length>12?18:fmtMoney(chartPeriodTotal).length>8?20:26,fontWeight:700,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif",letterSpacing:'-.02em',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fmtMoney(chartPeriodTotal)}</div>
          </div>
          <div style={{padding:'0 8px 14px',position:'relative'}} onMouseLeave={()=>setChartHover(-1)}>
            <svg viewBox={'0 0 '+W+' '+H} style={{width:'100%',height:'auto',display:'block'}} preserveAspectRatio="xMinYMin meet">
              <defs>
                <linearGradient id="dashGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#3b82f6" stopOpacity="0.12"/>
                  <stop offset="100%" stopColor="#3b82f6" stopOpacity="0"/>
                </linearGradient>
              </defs>
              {[0,0.25,0.5,0.75,1].map((pct,i)=>{
                const y=padT+usableH-pct*usableH;
                return <g key={i}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke="#f0f0f0" strokeWidth="1"/>
                  <text x={padL-8} y={y+4} textAnchor="end" fill="#9ca3af" fontSize="11" fontFamily="Plus Jakarta Sans,sans-serif">{shortMoney(maxChartVal*pct)+' €'}</text></g>;
              })}
              {areaPath && <path d={areaPath} fill="url(#dashGrad)"/>}
              {linePath && <path d={linePath} fill="none" stroke="#3b82f6" strokeWidth="2" strokeLinecap="round"/>}
              {chartPoints.map((p,i)=>(
                <g key={i}>
                  <rect x={p.x-usableW/(sampledData.length*2)} y={0} width={usableW/sampledData.length} height={H} fill="transparent" onMouseEnter={()=>setChartHover(i)} style={{cursor:'pointer'}}/>
                  {chartHover===i&&<line x1={p.x} y1={padT} x2={p.x} y2={H-padB} stroke="#3b82f6" strokeWidth="1" strokeDasharray="4,4" opacity=".4"/>}
                  <circle cx={p.x} cy={p.y} r={chartHover===i?5:0} fill="#3b82f6" stroke="#fff" strokeWidth="2" style={{transition:'all .12s'}}/>
                  {chartHover===i&&<><rect x={p.x-45} y={p.y-30} width="90" height="22" rx="6" fill="#1a1a1a"/><text x={p.x} y={p.y-14} textAnchor="middle" fill="#fff" fontSize="11" fontWeight="600" fontFamily="Plus Jakarta Sans">{fmtMoney(p.value)}</text><text x={p.x} y={p.y+16} textAnchor="middle" fill="#9ca3af" fontSize="10" fontFamily="Plus Jakarta Sans">{p.date}</text></>}
                </g>
              ))}
              {sampledData.filter((_,i)=>i%Math.max(1,Math.floor(sampledData.length/7))===0||i===sampledData.length-1).map((d,i)=>{
                const idx = sampledData.indexOf(d);
                const p = chartPoints[idx];
                return p ? <text key={i} x={p.x} y={H-8} textAnchor="middle" fill="#9ca3af" fontSize="11" fontFamily="Plus Jakarta Sans">{d.label}</text> : null;
              })}
            </svg>
          </div>
          {/* Legend */}
          <div style={{padding:'8px 20px 14px',display:'flex',gap:20,borderTop:'1px solid #f5f5f5'}}>
            <span style={{display:'flex',alignItems:'center',gap:6,fontSize:12,color:'#6b7280'}}>
              <span style={{width:10,height:3,borderRadius:2,background:'#3b82f6',display:'inline-block'}}/>
              Période actuelle
            </span>
          </div>
        </div>

        {/* ── Ventilation Panel — Shopify style ── */}
        <div style={{borderRadius:12,border:'1px solid #e8eaed',background:'#fff',padding:0}}>
          <div style={{padding:'18px 20px 14px',borderBottom:'1px solid #f5f5f5'}}>
            <div style={{fontWeight:600,fontSize:15,color:'#1a1a1a',fontFamily:"'Plus Jakarta Sans',sans-serif"}}>Ventilation générale</div>
          </div>
          <div style={{padding:0}}>
            {[
              {label:'CA Réalisé',value:stats?fmtMoney(stats.caRealise):'0,00 €',color:'#16775a'},
              {label:'CA Prévisionnel',value:stats?fmtMoney(stats.caPrevi):'0,00 €',color:'#8b5cf6'},
              {label:'Devis acceptés',value:stats?String(stats.accepted):'0',color:'#10b981'},
              {label:'Devis en attente',value:stats?String(stats.pending):'0',color:'#f59e0b'},
              {label:'Devis refusés',value:stats?String(stats.refused):'0',color:'#ef4444'},
              {label:'Factures émises',value:stats?String(stats.invoiceCount):'0',color:'#3b82f6'},
              {label:'Factures payées',value:stats?String(stats.invoicePaid):'0',color:'#16775a'},
              {label:'Clients actifs',value:stats?String(stats.clientsActive):'0',color:'#ec4899'},
              {label:'Taux conversion',value:stats?stats.acceptanceRate+'%':'0%',color:'#6366f1'},
            ].map((row,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'13px 22px',borderBottom:i<8?'1px solid #f4f4f5':'none',transition:'background .1s'}}
                onMouseEnter={e=>e.currentTarget.style.background='#fafbfc'}
